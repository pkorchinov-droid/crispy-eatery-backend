<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crispy Eatery — Kitchen</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #1a1510;
    color: #f5f0e8;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Header ─────────────────────────────────────── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    background: #2a2318;
    border-bottom: 2px solid #b5753a;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 22px;
    font-weight: 700;
    color: #e8c477;
    letter-spacing: 1px;
  }

  .logo span {
    font-weight: 400;
    color: #c49a5c;
    font-size: 14px;
    margin-left: 10px;
    text-transform: uppercase;
    letter-spacing: 3px;
  }

  .stats {
    display: flex;
    gap: 20px;
    align-items: center;
  }

  .stat {
    text-align: center;
    padding: 4px 14px;
    background: #352c20;
    border-radius: 8px;
  }

  .stat-num {
    font-size: 24px;
    font-weight: 700;
    color: #e8c477;
    line-height: 1;
  }

  .stat-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #a09080;
    margin-top: 2px;
  }

  .status-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 6px;
    animation: pulse 2s infinite;
  }

  .status-dot.live { background: #4caf50; }
  .status-dot.error { background: #f44336; animation: none; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .conn-status {
    font-size: 12px;
    color: #a09080;
    display: flex;
    align-items: center;
  }

  /* ── Header nav buttons ─────────────────────────── */
  .header-actions {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .header-actions a {
    color: #c49a5c;
    text-decoration: none;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    padding: 7px 14px;
    border: 1px solid #4a3d2e;
    border-radius: 6px;
    transition: border-color 0.2s, color 0.2s;
  }
  .header-actions a:hover { border-color: #b5753a; color: #e8c477; }

  /* ── Order grid ─────────────────────────────────── */
  .orders-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 16px;
    padding: 20px 24px;
  }

  /* ── Order card ─────────────────────────────────── */
  .order-card {
    background: #2a2318;
    border-radius: 12px;
    border: 1px solid #3d3428;
    overflow: hidden;
    transition: all 0.3s ease;
    animation: slideIn 0.4s ease;
  }

  .order-card.new-arrival {
    border-color: #e8c477;
    box-shadow: 0 0 20px rgba(232, 196, 119, 0.3);
  }

  .order-card.preparing {
    border-color: #ff9800;
    box-shadow: 0 0 12px rgba(255, 152, 0, 0.2);
  }

  .order-card.preparing .card-header {
    background: #3d2e10;
  }

  .order-card.preparing .table-badge {
    background: #ff9800;
  }

  .order-card.preparing .status-badge {
    display: inline-block;
  }

  .order-card.ready {
    border-color: #2196f3;
    box-shadow: 0 0 12px rgba(33, 150, 243, 0.2);
  }

  .order-card.ready .card-header {
    background: #1a2a3d;
  }

  .order-card.ready .table-badge {
    background: #2196f3;
  }

  .order-card.ready .status-badge {
    display: inline-block;
    background: #2196f3;
  }

  .order-card.picked_up {
    border-color: #9c27b0;
    box-shadow: 0 0 12px rgba(156, 39, 176, 0.2);
  }

  .order-card.picked_up .card-header {
    background: #2d1a33;
  }

  .order-card.picked_up .table-badge {
    background: #9c27b0;
  }

  .order-card.picked_up .status-badge {
    display: inline-block;
    background: #9c27b0;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .order-card.done {
    opacity: 0;
    transform: scale(0.9);
    transition: all 0.4s ease;
  }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 18px;
    background: #352c20;
  }

  .table-badge {
    background: #b5753a;
    color: #fff;
    font-size: 20px;
    font-weight: 800;
    padding: 6px 16px;
    border-radius: 8px;
    min-width: 56px;
    text-align: center;
  }

  .status-badge {
    display: none;
    background: #ff9800;
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-left: 10px;
    animation: pulse 1.5s infinite;
  }

  .order-meta {
    text-align: right;
  }

  .order-id {
    font-size: 11px;
    color: #8a7a68;
    font-family: monospace;
  }

  .order-time {
    font-size: 18px;
    font-weight: 600;
    color: #e8c477;
  }

  .order-phone {
    font-size: 13px;
    color: #64b5f6;
    margin-top: 3px;
    font-weight: 500;
    letter-spacing: 0.5px;
  }

  .order-phone a {
    color: #64b5f6;
    text-decoration: none;
  }

  .order-phone a:hover {
    text-decoration: underline;
  }

  .elapsed {
    font-size: 12px;
    color: #a09080;
    margin-top: 2px;
  }

  .card-body {
    padding: 14px 18px;
  }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 6px 0 4px;
    margin-top: 4px;
    border-top: 1px dashed #4a3d2e;
    color: #ff9800;
  }
  .section-label:first-child { border-top: none; margin-top: 0; }
  .section-label.barista { color: #64b5f6; }

  .item-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 8px 0;
    border-bottom: 1px solid #3d3428;
  }

  .item-row:last-child { border-bottom: none; }

  .item-row.tappable {
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 6px;
    padding: 8px 6px;
    margin: 0 -6px;
  }

  .item-row.tappable:hover {
    background: rgba(33, 150, 243, 0.1);
  }

  .item-row.tappable:active {
    transform: scale(0.98);
  }

  .item-row.picked {
    opacity: 0.4;
    text-decoration: line-through;
    text-decoration-color: #4caf50;
    text-decoration-thickness: 2px;
  }

  .item-row.picked .item-qty {
    background: #2e4a2e;
    color: #4caf50;
  }

  /* Per-item ready (cooking) tracking */
  .item-row.cookable {
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 6px;
    padding: 8px 6px;
    margin: 0 -6px;
  }

  .item-row.cookable:hover {
    background: rgba(255, 152, 0, 0.1);
  }

  .item-row.cookable:active {
    transform: scale(0.98);
  }

  .item-row.cooked {
    opacity: 0.5;
  }

  .item-row.cooked .item-qty {
    background: #2e4a2e;
    color: #4caf50;
  }

  .item-row .cook-check {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 2px solid #5a4a38;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-left: 8px;
    flex-shrink: 0;
    transition: all 0.2s;
    font-size: 14px;
    color: transparent;
  }

  .item-row.cooked .cook-check {
    background: #4caf50;
    border-color: #4caf50;
    color: #fff;
  }

  .cook-hint {
    text-align: center;
    font-size: 12px;
    color: #ff9800;
    padding: 6px 0 2px;
    opacity: 0.8;
    letter-spacing: 0.5px;
  }

  .cook-progress {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: #a09080;
  }

  .cook-progress .prog-bar {
    flex: 1;
    height: 4px;
    background: #3d3428;
    border-radius: 2px;
    overflow: hidden;
  }

  .cook-progress .prog-fill {
    height: 100%;
    background: #ff9800;
    border-radius: 2px;
    transition: width 0.3s ease;
  }

  .pickup-hint {
    text-align: center;
    font-size: 12px;
    color: #2196f3;
    padding: 6px 0 2px;
    opacity: 0.8;
    letter-spacing: 0.5px;
  }

  .pickup-progress {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: #a09080;
  }

  .pickup-progress .prog-bar {
    flex: 1;
    height: 4px;
    background: #3d3428;
    border-radius: 2px;
    overflow: hidden;
  }

  .pickup-progress .prog-fill {
    height: 100%;
    background: #4caf50;
    border-radius: 2px;
    transition: width 0.3s ease;
  }

  .item-qty {
    background: #4a3d2e;
    color: #e8c477;
    font-weight: 700;
    min-width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
    font-size: 14px;
    margin-right: 10px;
    flex-shrink: 0;
  }

  .item-name {
    flex: 1;
    font-size: 15px;
    font-weight: 500;
    color: #f0e8d8;
    line-height: 1.3;
  }

  .item-variant {
    font-weight: 400;
    color: #a09080;
    font-size: 13px;
  }

  .item-notes {
    font-size: 12px;
    color: #e8a040;
    font-style: italic;
    margin-top: 3px;
  }

  .item-price {
    color: #8a7a68;
    font-size: 14px;
    margin-left: 10px;
    flex-shrink: 0;
  }

  .order-notes {
    background: #3d3020;
    border-left: 3px solid #e8a040;
    padding: 8px 12px;
    margin: 10px 0 4px;
    border-radius: 0 6px 6px 0;
    font-size: 13px;
    color: #e8a040;
  }

  .card-footer {
    padding: 12px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid #3d3428;
  }

  .order-total {
    font-size: 18px;
    font-weight: 700;
    color: #e8c477;
  }

  .btn-group {
    display: flex;
    gap: 8px;
  }

  .btn-prep {
    background: #ff9800;
    color: #fff;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.2s;
  }

  .btn-prep:hover { background: #f57c00; transform: scale(1.02); }
  .btn-prep:active { transform: scale(0.98); }

  .btn-ready {
    background: #2196f3;
    color: #fff;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.2s;
  }

  .btn-ready:hover { background: #1976d2; transform: scale(1.02); }
  .btn-ready:active { transform: scale(0.98); }

  .btn-done {
    background: #4caf50;
    color: #fff;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.2s;
  }

  .btn-done:hover { background: #43a047; transform: scale(1.02); }
  .btn-done:active { transform: scale(0.98); }

  .btn-pickup {
    background: #9c27b0;
    color: #fff;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.2s;
  }

  .btn-pickup:hover { background: #7b1fa2; transform: scale(1.02); }
  .btn-pickup:active { transform: scale(0.98); }

  .btn-paid {
    background: #4caf50;
    color: #fff;
    border: none;
    padding: 10px 28px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.2s;
    width: 100%;
  }

  .btn-paid:hover { background: #43a047; transform: scale(1.02); }
  .btn-paid:active { transform: scale(0.98); }

  /* ── Empty state ────────────────────────────────── */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 20px;
    color: #6a5a48;
  }

  .empty-icon {
    font-size: 64px;
    margin-bottom: 16px;
    opacity: 0.5;
  }

  .empty-text {
    font-size: 20px;
    font-family: Georgia, serif;
    font-style: italic;
  }

  .empty-sub {
    font-size: 13px;
    margin-top: 6px;
    color: #5a4a38;
  }

  /* ── Flash animation for new orders ─────────────── */
  @keyframes flashBorder {
    0%, 100% { border-color: #e8c477; }
    50% { border-color: #ff9800; }
  }

  .order-card.flash {
    animation: flashBorder 0.5s ease 3;
  }

  /* ── Order history section ─────────────────────── */
  .history-section {
    padding: 0 24px 40px;
  }

  .history-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 0 12px;
    border-top: 1px solid #3d3428;
    margin-top: 20px;
  }

  .history-title {
    font-family: Georgia, serif;
    font-size: 18px;
    color: #8a7a68;
    font-style: italic;
  }

  .history-toggle {
    background: none;
    border: 1px solid #3d3428;
    color: #8a7a68;
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.2s;
  }

  .history-toggle:hover {
    border-color: #8a7a68;
    color: #c49a5c;
  }

  .history-list {
    display: none;
  }

  .history-list.open {
    display: block;
  }

  .history-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    background: #221c14;
    border-radius: 8px;
    margin-bottom: 6px;
    border: 1px solid #2a2318;
    opacity: 0.7;
  }

  .history-item .hi-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .history-item .hi-table {
    background: #3d3428;
    color: #8a7a68;
    font-size: 14px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 6px;
  }

  .history-item .hi-items {
    font-size: 13px;
    color: #8a7a68;
  }

  .history-item .hi-right {
    text-align: right;
  }

  .history-item .hi-total {
    font-size: 14px;
    color: #6a5a48;
    font-weight: 600;
  }

  .history-item .hi-time {
    font-size: 11px;
    color: #5a4a38;
  }

  .history-item .hi-phone {
    font-size: 12px;
    color: #64b5f6;
    margin-top: 2px;
  }
  .history-item .hi-phone a {
    color: #64b5f6;
    text-decoration: none;
  }
  .history-item .hi-phone a:hover {
    text-decoration: underline;
  }

  .history-empty {
    text-align: center;
    padding: 20px;
    color: #5a4a38;
    font-size: 13px;
    font-style: italic;
  }

  /* ── View filter tabs ────────────────────────────── */
  .filter-bar {
    display: flex;
    gap: 8px;
    padding: 14px 24px 0;
    background: #1a1510;
  }

  .filter-btn {
    background: #2a2318;
    border: 1px solid #3d3428;
    color: #a09080;
    padding: 8px 20px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.2s;
  }

  .filter-btn:hover {
    border-color: #8a7a68;
    color: #c49a5c;
  }

  .filter-btn.active {
    background: #b5753a;
    border-color: #b5753a;
    color: #fff;
  }

  .filter-btn.active[data-filter="kitchen"] {
    background: #ff9800;
    border-color: #ff9800;
  }

  .filter-btn.active[data-filter="barista"] {
    background: #42a5f5;
    border-color: #42a5f5;
  }

  /* Filter-based hiding */
  body.filter-kitchen .order-card:not([data-has-kitchen="true"]) { display: none; }
  body.filter-kitchen .item-row[data-type="barista"] { display: none; }
  body.filter-kitchen .section-label { display: none; }

  body.filter-barista .order-card:not([data-has-barista="true"]) { display: none; }
  body.filter-barista .item-row[data-type="kitchen"] { display: none; }
  body.filter-barista .section-label { display: none; }

  /* ── Responsive ─────────────────────────────────── */
  @media (max-width: 768px) {
    .orders-grid {
      grid-template-columns: 1fr;
      padding: 12px;
      gap: 12px;
    }
    header { padding: 12px 16px; flex-wrap: wrap; gap: 10px; }
    .logo span { display: block; margin-left: 0; }
    .header-actions { order: 3; width: 100%; justify-content: flex-start; }
    .header-actions a { padding: 6px 10px; font-size: 11px; letter-spacing: 1px; }
    .filter-bar { padding: 10px 12px 0; }
    .filter-btn { padding: 8px 14px; font-size: 13px; }
    .history-section { padding: 0 12px 30px; }
  }

  /* ── Kitchen-ticket print ── */
  .btn-print {
    background: transparent; border: 1px solid #4a3d2e; color: #c49a5c;
    margin-left: 8px; padding: 3px 9px; border-radius: 7px; font-size: 15px;
    cursor: pointer; line-height: 1.2; transition: all 0.2s;
  }
  .btn-print:hover { border-color: #b5753a; color: #e8c477; background: #352c20; }
  .btn-print:active { transform: scale(0.94); }
  #toast {
    position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%) translateY(20px);
    background: #2a2318; color: #f5f0e8; border: 1px solid #b5753a;
    padding: 12px 20px; border-radius: 10px; font-size: 14px; z-index: 9999;
    box-shadow: 0 10px 30px rgba(0,0,0,.5); opacity: 0; pointer-events: none;
    transition: opacity .25s, transform .25s; max-width: 82vw; text-align: center; line-height: 1.45;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast.err { border-color: #ef5350; color: #ffd9d7; }
  #toast.ok  { border-color: #4caf50; color: #dff5df; }

  /* ── Group / corporate Upcoming overlay ── */
  #groupsOverlay{position:fixed;inset:0;z-index:3000;background:rgba(24,18,12,.62);overflow:auto;}
  .g-panel{max-width:780px;margin:26px auto;background:#fffdf8;border-radius:16px;padding:20px 22px;box-shadow:0 30px 60px -20px rgba(0,0,0,.5);}
  .g-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
  .g-head h2{font-size:20px;margin:0;color:#2b1f17;}
  .g-x{border:none;background:#eee;border-radius:999px;width:34px;height:34px;font-size:15px;cursor:pointer;}
  .g-newform{display:flex;gap:8px;flex-wrap:wrap;background:#f6efe2;border-radius:12px;padding:12px;margin-bottom:16px;}
  .g-newform input{flex:1;min-width:120px;border:1px solid #e6dcc7;border-radius:8px;padding:9px 11px;font-size:14px;}
  .g-card{border:1px solid #e6dcc7;border-radius:12px;padding:14px;margin-bottom:14px;background:#fff;}
  .g-card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
  .g-co{font-weight:700;font-size:17px;color:#2b1f17;}
  .g-meta{color:#8a7558;font-size:13px;margin-top:2px;}
  .g-code{color:#b7a994;font-size:11px;letter-spacing:.08em;margin-top:2px;}
  .g-status{color:#fff;border-radius:999px;padding:3px 11px;font-size:11px;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;height:fit-content;}
  .g-mems{margin:10px 0;}
  .g-mem{padding:6px 0;font-size:13.5px;color:#4a3c2e;border-top:1px dashed #f0e9da;}
  .g-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
  .g-btn{border:1px solid #e6dcc7;background:#fff;border-radius:999px;padding:8px 14px;font-size:12px;font-weight:600;cursor:pointer;color:#2b1f17;}

  .g-btn-danger{color:#b04a3a;}
  .g-empty{padding:30px;text-align:center;color:#999;}
</style>
</head>
<body>

<section class="history-section">

  </div>
  <div class="history-list" id="historyList">
    <div class="history-empty" id="historyEmpty">No completed orders yet</div>
  </div>
</section>

<script>
(function() {
  // ── Config ──
  const BACKEND = window.location.origin;
  const POLL_INTERVAL = 3000;

  // ── Auth: capture staff token from URL, persist in localStorage ──
  (function captureToken() {
    var urlParams = new URLSearchParams(window.location.search);
    var t = urlParams.get('token');
    if (t) {
      localStorage.setItem('staffToken', t);
      // Strip the token from the URL bar so it's not shoulder-surfed.
      urlParams.delete('token');
      var rest = urlParams.toString();
      var clean = window.location.pathname + (rest ? '?' + rest : '') + window.location.hash;
      window.history.replaceState(null, '', clean);
    }
  })();

  // ── Propagate token to the menu-admin link so it can capture on first visit ──
  (function wireNavLinks() {
    var t = localStorage.getItem('staffToken');
    if (!t) return;
    var menuAdminLink = document.getElementById('menuAdminLink');
    if (menuAdminLink) menuAdminLink.href = 'menu-admin.html?token=' + encodeURIComponent(t);
  })();
  function authHeaders(extra) {
    var h = Object.assign({}, extra || {});
    var t = localStorage.getItem('staffToken');
    if (t) h['Authorization'] = 'Bearer ' + t;
    return h;
  }

  // ── HTML / JS-string escapers (XSS hardening) ──
  function escHtml(s) {
    if (s === null || s === undefined) return '';
    var d = document.createElement('div');
    d.textContent = String(s);
    return d.innerHTML;
  }
  function escAttr(s) { return escHtml(s); }
  function escTelHref(s) {
    // Allow + and digits; strip everything else for safety.
    return String(s || '').replace(/[^+0-9]/g, '').slice(0, 20);
  }
  function jsStr(s) {
    // Safe to interpolate inside a single-quoted JS string in an inline handler.
    return String(s == null ? '' : s)
      .replace(/\\/g, '\\\\')
      .replace(/'/g, "\\'")
      .replace(/</g, '\\u003c')
      .replace(/>/g, '\\u003e')
      .replace(/&/g, '\\u0026')
      .replace(/\r/g, '\\r')
      .replace(/\n/g, '\\n');
  }
  window.__escHtml = escHtml; // expose for ad-hoc use

  // ── Drink detection (barista items) ──
  const DRINK_KEYWORDS = [
    'flat white', 'long black', 'short black', 'americano', 'latte', 'cappuccino',
    'mocha', 'espresso', 'macchiato', 'coffee', 'matcha', 'chai',
    'tea', 'hot chocolate', 'turmeric', 'smoothie',
    'iced auckland', 'iced ferrero', 'iced berry black', 'iced orange',
    'iced mango', 'iced coconut', 'iced lychee', 'iced strawberry',
    'iced tonic passion', 'iced yuzu', 'iced london fog', 'iced peach',
    'iced bumblebee', 'milkshake'
  ];

  // Strip a trailing " (size / options ...)" so set lines like
  // "Breakfast Set for Two (Mushroom Crepe • Long Black)" match on the base name only.
  function baseName(name) {
    var s = String(name == null ? '' : name);
    var p = s.indexOf(' (');
    return p >= 0 ? s.slice(0, p) : s;
  }
  function isDrink(itemName) {
    var lower = baseName(itemName).toLowerCase();
    return DRINK_KEYWORDS.some(function(kw) { return lower.indexOf(kw) !== -1; });
  }

  // Authoritative barista/kitchen routing by MENU CATEGORY (not fuzzy name). Order
  // items keep their menu id, so we map id -> category from /menu; items in these
  // categories go to the barista, everything else (incl. SETS & desserts) is kitchen
  // food. Add a slug here if a new drink category is created.
  var DRINK_CATEGORIES = { coffee: 1, tea: 1, signature: 1 };
  var ITEM_CATEGORY = {}; // menuItemId -> categorySlug
  function loadMenuCategories() {
    try {
      fetch(BACKEND + '/menu').then(function (r) { return r.json(); }).then(function (m) {
        var cats = (m && m.categories) || {};
        Object.keys(cats).forEach(function (slug) {
          (cats[slug].items || []).forEach(function (it) { if (it && it.id) ITEM_CATEGORY[it.id] = slug; });
        });
      }).catch(function () {});
    } catch (e) {}
  }
  loadMenuCategories();

  // Classify a whole order ITEM (object): category wins; fall back to base-name
  // keywords for items without a known id/category.
  function isDrinkItem(item) {
    if (!item) return false;
    var cat = item && item.id ? ITEM_CATEGORY[item.id] : null;
    if (cat) return !!DRINK_CATEGORIES[cat];
    return isDrink((item && item.name) || '');
  }

  // ── State ──
  let knownOrderIds = new Set();
  let orderData = {};
  let prepCount = 0;
  let doneCount = 0;
  let isFirstLoad = true;
  let completedOrders = [];
  let currentFilter = 'all';
  // N9: serverTimeOffset = (serverNow - clientNow) at last poll; used to compute
  // elapsed times against the server clock so cafe iPad skew doesn't show "-2m".
  let serverTimeOffset = 0;
  // N3/N4: orders that markPaid is currently flushing — don't double-count or
  // chime-resurrect them via the polling cleanup path.
  let paidInFlight = new Set();

  // ── View filter ──
  window.setFilter = function(filter) {
    currentFilter = filter;
    document.body.classList.remove('filter-kitchen', 'filter-barista');
    if (filter !== 'all') {
      document.body.classList.add('filter-' + filter);
    }
    // Update active button
    document.querySelectorAll('.filter-btn').forEach(function(btn) {
      btn.classList.toggle('active', btn.getAttribute('data-filter') === filter);
    });
    // Update header subtitle
    const subtitles = { all: 'Kitchen', kitchen: 'Kitchen', barista: 'Barista' };
    document.querySelector('.logo span').textContent = subtitles[filter] || 'Kitchen';
    updateStats();
  };

  // ── Audio ──
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  let audioCtx = null;

  function ensureAudio() {
    if (!audioCtx) audioCtx = new AudioCtx();
  }

  function playChime() {
    try {
      ensureAudio();
      const now = audioCtx.currentTime;
      [660, 880].forEach((freq, i) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.3, now + i * 0.15);
        gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.15 + 0.5);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(now + i * 0.15);
        osc.stop(now + i * 0.15 + 0.6);
        // N16: explicitly disconnect after the oscillator finishes so a
        // week-long iPad uptime doesn't accumulate stranded audio nodes.
        osc.onended = function() {
          try { osc.disconnect(); gain.disconnect(); } catch (_) {}
        };
      });
    } catch(e) {
      console.log('Audio not available');
    }
  }

  // ── Elapsed time ──
  // N9: use serverTimeOffset so a wrong client clock doesn't show "-2 min ago".
  function nowOnServer() { return Date.now() + serverTimeOffset; }
  function elapsed(iso) {
    let diff = Math.floor((nowOnServer() - new Date(iso).getTime()) / 1000);
    if (diff < 0) diff = 0; // clamp; never show negative time
    if (diff < 60) return 'just now';
    const mins = Math.floor(diff / 60);
    if (mins < 60) return mins + ' min ago';
    const hrs = Math.floor(mins / 60);
    return hrs + 'h ' + (mins % 60) + 'm ago';
  }

  function formatTime(iso) {
    return new Date(iso).toLocaleTimeString('en-NZ', {
      hour: '2-digit', minute: '2-digit', hour12: true
    });
  }

  // ── Render card ──
  // ────────────────────────────────────────────────────────────
  // ── Kitchen-ticket printing — Epson TM-m30 over LAN (ePOS-Print)
  //    The dashboard runs on a device on the cafe WiFi, so the browser
  //    can POST directly to the printer's ePOS-Print service. The page is
  //    HTTPS and the printer is HTTP, so the kitchen device's browser must
  //    allow "Insecure content" for this site (one-time setting).
  // ────────────────────────────────────────────────────────────
  const PRINT_LINE_WIDTH = 42; // 80mm Font A ≈ 48 cols; 42 is tidy & safe
  // Two print stations, each its own printer. Barista IP blank → one combined
  // ticket goes to the kitchen printer (original behaviour).
  // Kitchen/food ticket -> the dedicated WiFi kitchen printer (.160). NOT .101:
  // Lightspeed holds .101's mechanism, so ePOS-Print there times out. .160 is
  // dashboard-owned (uncontended).
  function getKitchenPrinterIP() {
    try { return localStorage.getItem('kitchenPrinterIP') || '192.168.1.160'; } catch (e) { return '192.168.1.160'; }
  }
  function getBaristaPrinterIP() {
    try { return (localStorage.getItem('baristaPrinterIP') || '192.168.1.76').trim(); } catch (e) { return '192.168.1.76'; }
  }
  // GST receipt prints to the dedicated GST/receipt printer (.66), separate from
  // the order-ticket printers.
  function getReceiptPrinterIP() {
    try { return localStorage.getItem('receiptPrinterIP') || '192.168.1.66'; } catch (e) { return '192.168.1.66'; }
  }
  // Full combined order ticket (food + drinks together) prints to the expo/pass
  // printer (.210), alongside the split kitchen (.160) / barista (.76) slips.
  function getFullPrinterIP() {
    try { return (localStorage.getItem('fullPrinterIP') || '192.168.1.210').trim(); } catch (e) { return '192.168.1.210'; }
  }
  function getPrinterIP() { return getKitchenPrinterIP(); } // back-compat default (test)
  function eposEsc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/[\x00-\x1f\x7f]/g, ' ');
  }
  function eposRule() { return '<text>' + new Array(PRINT_LINE_WIDTH + 1).join('-') + '&#10;</text>'; }

  // SOAP body for a station ticket (no prices). `items` is the subset for that
  // station; `stationLabel` is the banner ("KITCHEN" / "BARISTA").
  function buildStationTicketXml(order, items, stationLabel) {
    var when = new Date(order.createdAt || Date.now());
    var timeStr = when.toLocaleTimeString('en-NZ', { hour: '2-digit', minute: '2-digit', hour12: true });
    var L = [];
    L.push('<text align="center"/>');
    L.push('<text dw="true" dh="true" em="true">CRISPY EATERY&#10;</text>');
    L.push('<text dw="false" dh="false" em="false">* ' + eposEsc(stationLabel) + ' *&#10;</text>');
    L.push('<feed line="1"/>');
    L.push('<text align="left"/>');
    L.push(eposRule());
    L.push('<text dw="true" dh="true" em="true">TABLE ' + eposEsc(order.tableNumber) + '&#10;</text>');
    L.push('<text dw="false" dh="false" em="false">' + eposEsc(order.id) + '   ' + eposEsc(timeStr) + '&#10;</text>');
    L.push(eposRule());
    L.push('<feed line="1"/>');
    (items || []).forEach(function (it) {
      var qty = Number(it.qty) || 1;
      var line = qty + ' x ' + (it.name || '');
      if (it.size) line += ' (' + it.size + ')';
      L.push('<text dh="true" em="true">' + eposEsc(line) + '&#10;</text>');
      if (it.notes) L.push('<text dh="false" em="false">    &gt;&gt; ' + eposEsc(it.notes) + '&#10;</text>');
      L.push('<feed line="1"/>');
    });
    if (order.notes) {
      L.push(eposRule());
      L.push('<text em="true">ORDER NOTE:&#10;</text>');
      L.push('<text em="true">' + eposEsc(order.notes) + '&#10;</text>');
    }
    L.push('<feed line="2"/>');
    L.push('<cut type="feed"/>');
    var body = '<epos-print xmlns="http://www.epson-pos.com/schemas/2011/03/epos-print">' + L.join('') + '</epos-print>';
    return '<?xml version="1.0" encoding="utf-8"?>' +
      '<s:Envelope xmlns:s="http://schemas.xmlsoap.org/soap/envelope/"><s:Body>' +
      body + '</s:Body></s:Envelope>';
  }
  // back-compat: full-order kitchen ticket (used by the test print)
  function buildKitchenTicketXml(order) { return buildStationTicketXml(order, order.items || [], 'KITCHEN'); }

  function sendEposOnce(xml, ip) {
    // HTTPS (port 443) — required so an HTTPS dashboard page can reach the printer.
    // The printer must serve a certificate this device trusts (see 🖨 Printer setup).
    // Short 8s timeout so a contended printer fails fast and we can retry.
    var url = 'https://' + (ip || getKitchenPrinterIP()) + '/cgi-bin/epos/service.cgi?devid=local_printer&timeout=8000';
    return fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'text/xml; charset=utf-8', 'SOAPAction': '""' },
      body: xml,
    }).then(function (r) {
      return r.text().then(function (text) {
        if (/success="true"/.test(text)) return { ok: true };
        var m = text.match(/code="([^"]*)"/);
        return { ok: false, reason: (m && m[1] ? m[1] : 'printer error') };
      });
    });
  }
  // Retry a few times: a TM printer momentarily owned by Lightspeed returns
  // EX_TIMEOUT, and a retry usually lands in a free window between its jobs.
  function sendEpos(xml, ip, tries) {
    tries = tries || 3;
    function again() { return new Promise(function (r) { setTimeout(r, 700); }).then(function () { return sendEpos(xml, ip, tries - 1); }); }
    return sendEposOnce(xml, ip).then(function (res) {
      return (res.ok || tries <= 1) ? res : again();
    }).catch(function (e) {
      if (tries <= 1) throw e;
      return again();
    });
  }

  function toast(msg, kind) {
    var el = document.getElementById('toast');
    if (!el) { el = document.createElement('div'); el.id = 'toast'; document.body.appendChild(el); }
    el.className = 'show' + (kind ? ' ' + kind : '');
    el.textContent = msg;
    clearTimeout(el.__t);
    el.__t = setTimeout(function () { el.classList.remove('show'); }, kind === 'err' ? 9000 : 3000);
  }

  function printerHelp(ip) {
    ip = ip || getKitchenPrinterIP();
    return 'Could not reach the printer at https://' + ip + '. Check: (1) printer is on and on the cafe WiFi; ' +
      '(2) on THIS iPad the "Crispy Eatery Printer CA" is installed AND switched on under ' +
      'Settings > General > About > Certificate Trust Settings; (3) the IP is correct (tap 🖨 Printer). ' +
      'If you just finished setup, fully close this tab and reopen it. Quick check: open https://' + ip + ' in Safari — it should load with no certificate warning.';
  }

  // Tap 🖨 → food items print to the kitchen printer, coffee/drinks to the barista
  // printer. If no barista printer is set, the whole order prints as one ticket
  // to the kitchen printer (original behaviour).
  // ── Corporate / group pre-orders (staff "Upcoming" view) ──────
  var GROUPS_CACHE = [];
  function gMoney(n){ return '$' + (Number(n)||0).toFixed(2); }
  function gStatusColor(s){ return ({open:'#5b7553',locked:'#b0832f',preparing:'#c25a3a',done:'#7d7d7d',cancelled:'#a23b2a'})[s] || '#777'; }
  function gReq(method, path, body){
    return fetch(BACKEND + path, { method: method, headers: Object.assign({ 'Content-Type':'application/json' }, authHeaders()), body: body ? JSON.stringify(body) : undefined })
      .then(function(r){ return r.json().then(function(d){ return { ok:r.ok, status:r.status, d:d }; }, function(){ return { ok:r.ok, status:r.status, d:{} }; }); });
  }
  window.openGroups = function(){
    var ov = document.getElementById('groupsOverlay');
    ov.innerHTML =
      '<div class="g-panel">' +
        '<div class="g-head"><h2>Upcoming group orders</h2><button class="g-x" onclick="closeGroups()">&#10005;</button></div>' +
        '<div class="g-newform">' +
          '<input id="gNewCompany" placeholder="Company / group name">' +
          '<input id="gNewDate" type="date">' +
          '<input id="gNewTime" type="time">' +
          '<input id="gNewTable" placeholder="Table(s)">' +
          '<button class="g-btn g-btn-primary" onclick="groupCreate()">+ New group</button>' +
        '</div>' +
        '<div id="groupsList"></div>' +
      '</div>';
    ov.style.display = 'block';
    loadGroups();
  };
  window.closeGroups = function(){ var ov = document.getElementById('groupsOverlay'); if (ov) ov.style.display = 'none'; };
  function loadGroups(){
    var list = document.getElementById('groupsList');
    if (list) list.innerHTML = '<div class="g-empty">Loading…</div>';
    fetch(BACKEND + '/groups', { headers: authHeaders() })
      .then(function(r){ if (r.status === 401) throw new Error('auth'); return r.json(); })
      .then(function(data){ GROUPS_CACHE = Array.isArray(data) ? data : []; renderGroups(); })
      .catch(function(){ if (list) list.innerHTML = '<div class="g-empty" style="color:#b04a3a">Could not load groups — check the ?token= in the URL.</div>'; });
  }
  function renderGroups(){
    var list = document.getElementById('groupsList');
    if (!list) return;
    if (!GROUPS_CACHE.length){ list.innerHTML = '<div class="g-empty">No group bookings yet. Create one above, or share the Group QR with customers.</div>'; return; }
    list.innerHTML = GROUPS_CACHE.map(function(g){
      var members = (g.members||[]);
      var memHtml = members.length ? members.map(function(m){
        var items = (m.items||[]).map(function(it){ return (Number(it.qty)||1) + '&#215; ' + escHtml(it.name) + (it.size ? ' (' + escHtml(it.size) + ')' : ''); }).join(', ');
        return '<div class="g-mem"><b>' + escHtml(m.name) + '</b> &mdash; ' + (items || '<i>no items</i>') + '</div>';
      }).join('') : '<div class="g-mem" style="color:#999">No one has ordered yet.</div>';
      var locked = g.status !== 'open';
      return '<div class="g-card">' +
        '<div class="g-card-top">' +
          '<div><div class="g-co">' + escHtml(g.company) + '</div>' +
            '<div class="g-meta">' + escHtml(g.date) + ' &middot; ' + escHtml(g.arrivalTime) + (g.tableNumbers ? (' &middot; T' + escHtml(g.tableNumbers)) : '') + ' &middot; ' + members.length + (g.guestCount ? ('/' + g.guestCount) : '') + ' ordered &middot; ' + gMoney(g.total) + '</div>' +
            '<div class="g-code">CODE ' + escHtml(g.code) + '</div></div>' +
          '<span class="g-status" style="background:' + gStatusColor(g.status) + '">' + escHtml(g.status) + '</span>' +
        '</div>' +
        '<div class="g-mems">' + memHtml + '</div>' +
        '<div class="g-actions">' +
          '<button class="g-btn g-btn-primary" onclick="groupStartPrep(\'' + g.id + '\')">&#128424; Start prep</button>' +
          '<button class="g-btn" onclick="groupToggleLock(\'' + g.id + '\')">' + (locked ? 'Unlock' : 'Lock') + '</button>' +
          '<button class="g-btn" onclick="groupEditTable(\'' + g.id + '\')">Table&#8230;</button>' +
          '<button class="g-btn g-btn-danger" onclick="groupDelete(\'' + g.id + '\')">Delete</button>' +
        '</div>' +
      '</div>';
    }).join('');
  }
  window.groupCreate = function(){
    var company = (document.getElementById('gNewCompany').value||'').trim();
    var date = document.getElementById('gNewDate').value;
    var time = document.getElementById('gNewTime').value;
    var table = (document.getElementById('gNewTable').value||'').trim();
    if (!company || !date || !time){ toast('Company, date and time are required', 'err'); return; }
    gReq('POST','/groups',{ company:company, date:date, arrivalTime:time, tableNumbers:table }).then(function(res){
      if (!res.ok){ toast((res.d&&res.d.error)||'Could not create group','err'); return; }
      toast('Group ' + res.d.code + ' created', 'ok');
      document.getElementById('gNewCompany').value=''; document.getElementById('gNewTable').value='';
      loadGroups();
    }).catch(function(){ toast('Could not create group','err'); });
  };
  window.groupToggleLock = function(id){
    var g = GROUPS_CACHE.find(function(x){return x.id===id;}); if (!g) return;
    gReq('PATCH','/groups/'+encodeURIComponent(id),{ status: (g.status==='open'?'locked':'open') }).then(function(res){ if(!res.ok){toast('Update failed','err');return;} loadGroups(); });
  };
  window.groupEditTable = function(id){
    var g = GROUPS_CACHE.find(function(x){return x.id===id;}); if (!g) return;
    var t = prompt('Table number(s) for ' + g.company + ':', g.tableNumbers||''); if (t===null) return;
    gReq('PATCH','/groups/'+encodeURIComponent(id),{ tableNumbers: t }).then(function(res){ if(!res.ok){toast('Update failed','err');return;} loadGroups(); });
  };
  window.groupDelete = function(id){
    var g = GROUPS_CACHE.find(function(x){return x.id===id;}); if (!g) return;

  function buildGroupTicketXml(group, mode, stationLabel){
    var L=[];
    L.push('<text align="center"/><text dw="true" dh="true" em="true">CRISPY EATERY&#10;</text>');
    L.push('<text dw="false" dh="false" em="false">* ' + eposEsc(stationLabel) + ' &#8212; GROUP *&#10;</text><feed line="1"/><text align="left"/>');
    L.push(eposRule());
    L.push('<text dw="true" dh="true" em="true">' + eposEsc(group.company) + '&#10;</text>');
    L.push('<text dw="false" dh="false" em="false">' + eposEsc((group.tableNumbers?('TABLE '+group.tableNumbers+'   '):'') + group.date + '  ' + group.arrivalTime) + '&#10;</text>');
    L.push(eposRule()); L.push('<feed line="1"/>');
    var any=false;
    (group.members||[]).forEach(function(m){
      var items=(m.items||[]).filter(function(it){ if(mode==='food') return !isDrinkItem(it); if(mode==='drink') return isDrinkItem(it); return true; });
      if(!items.length) return;
      any=true;
      L.push('<text dh="true" em="true">' + eposEsc(m.name) + '&#10;</text>');
      items.forEach(function(it){ var q=Number(it.qty)||1; L.push('<text dh="true" em="false">' + eposEsc('  ' + q + ' x ' + (it.name||'') + (it.size?(' ('+it.size+')'):'')) + '&#10;</text>'); if(it.notes) L.push('<text em="false">' + eposEsc('      >> ' + it.notes) + '&#10;</text>'); });
      L.push('<feed line="1"/>');
    });
    if(!any) return null;
    L.push(eposRule()); L.push('<feed line="2"/><cut type="feed"/>');
    var body='<epos-print xmlns="http://www.epson-pos.com/schemas/2011/03/epos-print">'+L.join('')+'</epos-print>';
    return '<?xml version="1.0" encoding="utf-8"?><s:Envelope xmlns:s="http://schemas.xmlsoap.org/soap/envelope/"><s:Body>'+body+'</s:Body></s:Envelope>';
  }
  function printGroupTickets(group){
    var jobs=[];
    var k=buildGroupTicketXml(group,'food','KITCHEN'); if(k) jobs.push({ip:getKitchenPrinterIP(),xml:k,label:'kitchen'});
    var b=buildGroupTicketXml(group,'drink','BARISTA'); var bip=getBaristaPrinterIP(); if(b&&bip) jobs.push({ip:bip,xml:b,label:'barista'});
    var f=buildGroupTicketXml(group,'all','FULL ORDER'); var fip=getFullPrinterIP(); if(f&&fip) jobs.push({ip:fip,xml:f,label:'full'});
    if(!jobs.length){ toast('Nothing to print','err'); return; }
    toast('Printing group tickets for ' + group.company + '…');
    (function next(i){ if(i>=jobs.length){ toast('Group tickets sent','ok'); return; } sendEpos(jobs[i].xml,jobs[i].ip).then(function(res){ if(!res.ok) toast(jobs[i].label+': '+(res.reason||'error'),'err'); }).catch(function(){ toast(jobs[i].label+' failed','err'); }).then(function(){ next(i+1); }); })(0);
  }

  window.printTicket = function (orderId) {
    var order = orderData[orderId];
    if (!order) { toast('Order not found', 'err'); return; }
    var items = order.items || [];
    var kIp = getKitchenPrinterIP();
    var bIp = getBaristaPrinterIP();
    if (!bIp) {
      toast('Printing ticket for ' + order.id + '…');
      sendEpos(buildStationTicketXml(order, items, 'ORDER'), kIp)
        .then(function (res) { toast(res.ok ? '🖨 Printed ' + order.id : 'Print failed — ' + res.reason, res.ok ? 'ok' : 'err'); })
        .catch(function () { toast(printerHelp(kIp), 'err'); });
      return;
    }
    var food = items.filter(function (i) { return !isDrinkItem(i); });
    var drinks = items.filter(function (i) { return isDrinkItem(i); });
    var fIp = getFullPrinterIP();
    var jobs = [];
    if (food.length) jobs.push({ label: 'kitchen', ip: kIp, xml: buildStationTicketXml(order, food, 'KITCHEN') });
    if (drinks.length) jobs.push({ label: 'barista', ip: bIp, xml: buildStationTicketXml(order, drinks, 'BARISTA') });
    if (fIp && items.length) jobs.push({ label: 'full', ip: fIp, xml: buildStationTicketXml(order, items, 'FULL ORDER') });
    if (!jobs.length) { toast('Nothing to print', 'err'); return; }
    toast('Printing ' + order.id + '…');
    Promise.all(jobs.map(function (j) {
      return sendEpos(j.xml, j.ip)
        .then(function (res) { return { j: j, ok: res.ok, reason: res.reason }; })
        .catch(function () { return { j: j, ok: false, reason: 'unreachable' }; });
    })).then(function (rs) {
      var ok = rs.filter(function (r) { return r.ok; }).map(function (r) { return r.j.label; });
      var bad = rs.filter(function (r) { return !r.ok; });
      if (!bad.length) toast('🖨 ' + order.id + ' → ' + ok.join(' + '), 'ok');
      else toast((ok.length ? ok.join(' + ') + ' OK; ' : '') + bad[0].j.label + ' FAILED (' + bad[0].j.ip + ')', 'err');
    });
  };

  function askIP(label, cur) {
    var v = window.prompt(label, cur);
    if (v === null) return null;          // cancelled — keep current
    v = v.trim();
    if (v && !/^\d{1,3}(\.\d{1,3}){3}$/.test(v)) { toast('Not a valid IP: ' + v, 'err'); return false; }
    return v;                              // '' = clear
  }

  // ────────────────────────────────────────────────────────────
  // ── GST receipt / customer bill — full order WITH prices ──
  //    Mirrors the Lightspeed tax invoice. Prices are GST-inclusive (NZ 15%).
  //    GST is derived from the total and subtotal is the residual, so the
  //    three printed figures always reconcile to the cent.
  // ────────────────────────────────────────────────────────────
  function getReceiptInfo() {
    var d = {
      name: 'Crispy Eatery',
      legal: 'Twopeople Ltd',
      addr: '341 Remuera Road, Auckland 1050',
      gst: '136-528-536',
      web: 'www.crispyeatery.co.nz'
    };
    try {
      var s = localStorage.getItem('receiptInfo');
      if (s) { var o = JSON.parse(s); for (var k in d) { if (o && o[k] != null && o[k] !== '') d[k] = o[k]; } }
    } catch (e) {}
    return d;
  }
  // NZ GST 15%, prices GST-inclusive. Derive GST from the total (round half-up on
  // integer cents), then subtotal = total - GST so subtotal + GST === total exactly.
  function gstBreakdown(total) {
    var cents = Math.round((Number(total) || 0) * 100);
    var gst = Math.round(cents * 3 / 23);
    return { subtotal: (cents - gst) / 100, gst: gst / 100, total: cents / 100 };
  }
  function money(n) { return '$' + (Number(n) || 0).toFixed(2); }
  function eposRuleEq() { return '<text>' + new Array(PRINT_LINE_WIDTH + 1).join('=') + '&#10;</text>'; }
  // left text + right text, right flush to the line edge (manual pad — no tab stops)
  function padRow(left, right) {
    left = String(left); right = String(right);
    var maxLeft = PRINT_LINE_WIDTH - right.length - 1;
    if (left.length > maxLeft) left = left.slice(0, Math.max(0, maxLeft - 1)) + '.';
    var gap = PRINT_LINE_WIDTH - left.length - right.length;
    if (gap < 1) gap = 1;
    return left + new Array(gap + 1).join(' ') + right;
  }
