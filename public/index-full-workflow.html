<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crispy Eatery — Kitchen</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #1a1510;
    color: #f5f0e8;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Header ─────────────────────────────────────── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    background: #2a2318;
    border-bottom: 2px solid #b5753a;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 22px;
    font-weight: 700;
    color: #e8c477;
    letter-spacing: 1px;
  }

  .logo span {
    font-weight: 400;
    color: #c49a5c;
    font-size: 14px;
    margin-left: 10px;
    text-transform: uppercase;
    letter-spacing: 3px;
  }

  .stats {
    display: flex;
    gap: 20px;
    align-items: center;
  }

  .stat {
    text-align: center;
    padding: 4px 14px;
    background: #352c20;
    border-radius: 8px;
  }

  .stat-num {
    font-size: 24px;
    font-weight: 700;
    color: #e8c477;
    line-height: 1;
  }

  .stat-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #a09080;
    margin-top: 2px;
  }

  .status-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 6px;
    animation: pulse 2s infinite;
  }

  .status-dot.live { background: #4caf50; }
  .status-dot.error { background: #f44336; animation: none; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .conn-status {
    font-size: 12px;
    color: #a09080;
    display: flex;
    align-items: center;
  }

  /* ── Order grid ─────────────────────────────────── */
  .orders-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 16px;
    padding: 20px 24px;
  }

  /* ── Order card ─────────────────────────────────── */
  .order-card {
    background: #2a2318;
    border-radius: 12px;
    border: 1px solid #3d3428;
    overflow: hidden;
    transition: all 0.3s ease;
    animation: slideIn 0.4s ease;
  }

  .order-card.new-arrival {
    border-color: #e8c477;
    box-shadow: 0 0 20px rgba(232, 196, 119, 0.3);
  }

  .order-card.preparing {
    border-color: #ff9800;
    box-shadow: 0 0 12px rgba(255, 152, 0, 0.2);
  }

  .order-card.preparing .card-header {
    background: #3d2e10;
  }

  .order-card.preparing .table-badge {
    background: #ff9800;
  }

  .order-card.preparing .status-badge {
    display: inline-block;
  }

  .order-card.ready {
    border-color: #2196f3;
    box-shadow: 0 0 12px rgba(33, 150, 243, 0.2);
  }

  .order-card.ready .card-header {
    background: #1a2a3d;
  }

  .order-card.ready .table-badge {
    background: #2196f3;
  }

  .order-card.ready .status-badge {
    display: inline-block;
    background: #2196f3;
  }

  .order-card.picked_up {
    border-color: #9c27b0;
    box-shadow: 0 0 12px rgba(156, 39, 176, 0.2);
  }

  .order-card.picked_up .card-header {
    background: #2d1a33;
  }

  .order-card.picked_up .table-badge {
    background: #9c27b0;
  }

  .order-card.picked_up .status-badge {
    display: inline-block;
    background: #9c27b0;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .order-card.done {
    opacity: 0;
    transform: scale(0.9);
    transition: all 0.4s ease;
  }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 18px;
    background: #352c20;
  }

  .table-badge {
    background: #b5753a;
    color: #fff;
    font-size: 20px;
    font-weight: 800;
    padding: 6px 16px;
    border-radius: 8px;
    min-width: 56px;
    text-align: center;
  }

  .status-badge {
    display: none;
    background: #ff9800;
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-left: 10px;
    animation: pulse 1.5s infinite;
  }

  .order-meta {
    text-align: right;
  }

  .order-id {
    font-size: 11px;
    color: #8a7a68;
    font-family: monospace;
  }

  .order-time {
    font-size: 18px;
    font-weight: 600;
    color: #e8c477;
  }

  .order-phone {
    font-size: 13px;
    color: #64b5f6;
    margin-top: 3px;
    font-weight: 500;
    letter-spacing: 0.5px;
  }

  .order-phone a {
    color: #64b5f6;
    text-decoration: none;
  }

  .order-phone a:hover {
    text-decoration: underline;
  }

  .elapsed {
    font-size: 12px;
    color: #a09080;
    margin-top: 2px;
  }

  .card-body {
    padding: 14px 18px;
  }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 6px 0 4px;
    margin-top: 4px;
    border-top: 1px dashed #4a3d2e;
    color: #ff9800;
  }
  .section-label:first-child { border-top: none; margin-top: 0; }
  .section-label.barista { color: #64b5f6; }

  .item-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 8px 0;
    border-bottom: 1px solid #3d3428;
  }

  .item-row:last-child { border-bottom: none; }

  .item-row.tappable {
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 6px;
    padding: 8px 6px;
    margin: 0 -6px;
  }

  .item-row.tappable:hover {
    background: rgba(33, 150, 243, 0.1);
  }

  .item-row.tappable:active {
    transform: scale(0.98);
  }

  .item-row.picked {
    opacity: 0.4;
    text-decoration: line-through;
    text-decoration-color: #4caf50;
    text-decoration-thickness: 2px;
  }

  .item-row.picked .item-qty {
    background: #2e4a2e;
    color: #4caf50;
  }

  /* Per-item ready (cooking) tracking */
  .item-row.cookable {
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 6px;
    padding: 8px 6px;
    margin: 0 -6px;
  }

  .item-row.cookable:hover {
    background: rgba(255, 152, 0, 0.1);
  }

  .item-row.cookable:active {
    transform: scale(0.98);
  }

  .item-row.cooked {
    opacity: 0.5;
  }

  .item-row.cooked .item-qty {
    background: #2e4a2e;
    color: #4caf50;
  }

  .item-row .cook-check {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 2px solid #5a4a38;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-left: 8px;
    flex-shrink: 0;
    transition: all 0.2s;
    font-size: 14px;
    color: transparent;
  }

  .item-row.cooked .cook-check {
    background: #4caf50;
    border-color: #4caf50;
    color: #fff;
  }

  .cook-hint {
    text-align: center;
    font-size: 12px;
    color: #ff9800;
    padding: 6px 0 2px;
    opacity: 0.8;
    letter-spacing: 0.5px;
  }

  .cook-progress {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: #a09080;
  }

  .cook-progress .prog-bar {
    flex: 1;
    height: 4px;
    background: #3d3428;
    border-radius: 2px;
    overflow: hidden;
  }

  .cook-progress .prog-fill {
    height: 100%;
    background: #ff9800;
    border-radius: 2px;
    transition: width 0.3s ease;
  }

  .pickup-hint {
    text-align: center;
    font-size: 12px;
    color: #2196f3;
    padding: 6px 0 2px;
    opacity: 0.8;
    letter-spacing: 0.5px;
  }

  .pickup-progress {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: #a09080;
  }

  .pickup-progress .prog-bar {
    flex: 1;
    height: 4px;
    background: #3d3428;
    border-radius: 2px;
    overflow: hidden;
  }

  .pickup-progress .prog-fill {
    height: 100%;
    background: #4caf50;
    border-radius: 2px;
    transition: width 0.3s ease;
  }

  .item-qty {
    background: #4a3d2e;
    color: #e8c477;
    font-weight: 700;
    min-width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
    font-size: 14px;
    margin-right: 10px;
    flex-shrink: 0;
  }

  .item-name {
    flex: 1;
    font-size: 15px;
    font-weight: 500;
    color: #f0e8d8;
    line-height: 1.3;
  }

  .item-variant {
    font-weight: 400;
    color: #a09080;
    font-size: 13px;
  }

  .item-notes {
    font-size: 12px;
    color: #e8a040;
    font-style: italic;
    margin-top: 3px;
  }

  .item-price {
    color: #8a7a68;
    font-size: 14px;
    margin-left: 10px;
    flex-shrink: 0;
  }

  .order-notes {
    background: #3d3020;
    border-left: 3px solid #e8a040;
    padding: 8px 12px;
    margin: 10px 0 4px;
    border-radius: 0 6px 6px 0;
    font-size: 13px;
    color: #e8a040;
  }

  .card-footer {
    padding: 12px 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid #3d3428;
  }

  .order-total {
    font-size: 18px;
    font-weight: 700;
    color: #e8c477;
  }

  .btn-group {
    display: flex;
    gap: 8px;
  }

  .btn-prep {
    background: #ff9800;
    color: #fff;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.2s;
  }

  .btn-prep:hover { background: #f57c00; transform: scale(1.02); }
  .btn-prep:active { transform: scale(0.98); }

  .btn-ready {
    background: #2196f3;
    color: #fff;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.2s;
  }

  .btn-ready:hover { background: #1976d2; transform: scale(1.02); }
  .btn-ready:active { transform: scale(0.98); }

  .btn-done {
    background: #4caf50;
    color: #fff;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.2s;
  }

  .btn-done:hover { background: #43a047; transform: scale(1.02); }
  .btn-done:active { transform: scale(0.98); }

  .btn-pickup {
    background: #9c27b0;
    color: #fff;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.2s;
  }

  .btn-pickup:hover { background: #7b1fa2; transform: scale(1.02); }
  .btn-pickup:active { transform: scale(0.98); }

  .btn-paid {
    background: #4caf50;
    color: #fff;
    border: none;
    padding: 10px 28px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.2s;
    width: 100%;
  }

  .btn-paid:hover { background: #43a047; transform: scale(1.02); }
  .btn-paid:active { transform: scale(0.98); }

  /* ── Empty state ────────────────────────────────── */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 20px;
    color: #6a5a48;
  }

  .empty-icon {
    font-size: 64px;
    margin-bottom: 16px;
    opacity: 0.5;
  }

  .empty-text {
    font-size: 20px;
    font-family: Georgia, serif;
    font-style: italic;
  }

  .empty-sub {
    font-size: 13px;
    margin-top: 6px;
    color: #5a4a38;
  }

  /* ── Flash animation for new orders ─────────────── */
  @keyframes flashBorder {
    0%, 100% { border-color: #e8c477; }
    50% { border-color: #ff9800; }
  }

  .order-card.flash {
    animation: flashBorder 0.5s ease 3;
  }

  /* ── Order history section ─────────────────────── */
  .history-section {
    padding: 0 24px 40px;
  }

  .history-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 0 12px;
    border-top: 1px solid #3d3428;
    margin-top: 20px;
  }

  .history-title {
    font-family: Georgia, serif;
    font-size: 18px;
    color: #8a7a68;
    font-style: italic;
  }

  .history-toggle {
    background: none;
    border: 1px solid #3d3428;
    color: #8a7a68;
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.2s;
  }

  .history-toggle:hover {
    border-color: #8a7a68;
    color: #c49a5c;
  }

  .history-list {
    display: none;
  }

  .history-list.open {
    display: block;
  }

  .history-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    background: #221c14;
    border-radius: 8px;
    margin-bottom: 6px;
    border: 1px solid #2a2318;
    opacity: 0.7;
  }

  .history-item .hi-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .history-item .hi-table {
    background: #3d3428;
    color: #8a7a68;
    font-size: 14px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 6px;
  }

  .history-item .hi-items {
    font-size: 13px;
    color: #8a7a68;
  }

  .history-item .hi-right {
    text-align: right;
  }

  .history-item .hi-total {
    font-size: 14px;
    color: #6a5a48;
    font-weight: 600;
  }

  .history-item .hi-time {
    font-size: 11px;
    color: #5a4a38;
  }

  .history-item .hi-phone {
    font-size: 12px;
    color: #64b5f6;
    margin-top: 2px;
  }
  .history-item .hi-phone a {
    color: #64b5f6;
    text-decoration: none;
  }
  .history-item .hi-phone a:hover {
    text-decoration: underline;
  }

  .history-empty {
    text-align: center;
    padding: 20px;
    color: #5a4a38;
    font-size: 13px;
    font-style: italic;
  }

  /* ── View filter tabs ────────────────────────────── */
  .filter-bar {
    display: flex;
    gap: 8px;
    padding: 14px 24px 0;
    background: #1a1510;
  }

  .filter-btn {
    background: #2a2318;
    border: 1px solid #3d3428;
    color: #a09080;
    padding: 8px 20px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.2s;
  }

  .filter-btn:hover {
    border-color: #8a7a68;
    color: #c49a5c;
  }

  .filter-btn.active {
    background: #b5753a;
    border-color: #b5753a;
    color: #fff;
  }

  .filter-btn.active[data-filter="kitchen"] {
    background: #ff9800;
    border-color: #ff9800;
  }

  .filter-btn.active[data-filter="barista"] {
    background: #42a5f5;
    border-color: #42a5f5;
  }

  /* Filter-based hiding */
  body.filter-kitchen .order-card:not([data-has-kitchen="true"]) { display: none; }
  body.filter-kitchen .item-row[data-type="barista"] { display: none; }
  body.filter-kitchen .section-label { display: none; }

  body.filter-barista .order-card:not([data-has-barista="true"]) { display: none; }
  body.filter-barista .item-row[data-type="kitchen"] { display: none; }
  body.filter-barista .section-label { display: none; }

  /* ── Responsive ─────────────────────────────────── */
  @media (max-width: 768px) {
    .orders-grid {
      grid-template-columns: 1fr;
      padding: 12px;
      gap: 12px;
    }
    header { padding: 12px 16px; flex-wrap: wrap; gap: 10px; }
    .logo span { display: block; margin-left: 0; }
    .filter-bar { padding: 10px 12px 0; }
    .filter-btn { padding: 8px 14px; font-size: 13px; }
    .history-section { padding: 0 12px 30px; }
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">Crispy Eatery <span>Kitchen</span></div>
  </div>
  <div class="stats">
    <div class="stat">
      <div class="stat-num" id="activeCount">0</div>
      <div class="stat-label">Active</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="prepCount">0</div>
      <div class="stat-label">Preparing</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="readyCount">0</div>
      <div class="stat-label">Ready</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="pickedUpCount">0</div>
      <div class="stat-label">Picked Up</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="doneCount">0</div>
      <div class="stat-label">Paid</div>
    </div>
    <div class="conn-status">
      <span class="status-dot live" id="statusDot"></span>
      <span id="statusText">Live</span>
    </div>
  </div>
</header>

<div class="filter-bar" id="filterBar">
  <button class="filter-btn active" onclick="setFilter('all')" data-filter="all">All</button>
  <button class="filter-btn" onclick="setFilter('kitchen')" data-filter="kitchen">Kitchen</button>
  <button class="filter-btn" onclick="setFilter('barista')" data-filter="barista">Barista</button>
</div>

<main class="orders-grid" id="ordersGrid">
  <div class="empty-state" id="emptyState">
    <div class="empty-icon">&#x1F373;</div>
    <div class="empty-text">No active orders</div>
    <div class="empty-sub">New orders will appear here automatically</div>
  </div>
</main>

<section class="history-section">
  <div class="history-header">
    <div class="history-title">Order History</div>
    <button class="history-toggle" id="historyToggle" onclick="toggleHistory()">Show</button>
  </div>
  <div class="history-list" id="historyList">
    <div class="history-empty" id="historyEmpty">No completed orders yet</div>
  </div>
</section>

<script>
(function() {
  // ── Config ──
  const BACKEND = window.location.origin;
  const POLL_INTERVAL = 3000;

  // ── Auth: capture staff token from URL, persist in sessionStorage ──
  (function captureToken() {
    var urlParams = new URLSearchParams(window.location.search);
    var t = urlParams.get('token');
    if (t) {
      sessionStorage.setItem('staffToken', t);
      // Strip the token from the URL bar so it's not shoulder-surfed.
      urlParams.delete('token');
      var rest = urlParams.toString();
      var clean = window.location.pathname + (rest ? '?' + rest : '') + window.location.hash;
      window.history.replaceState(null, '', clean);
    }
  })();
  function authHeaders(extra) {
    var h = Object.assign({}, extra || {});
    var t = sessionStorage.getItem('staffToken');
    if (t) h['Authorization'] = 'Bearer ' + t;
    return h;
  }

  // ── HTML / JS-string escapers (XSS hardening) ──
  function escHtml(s) {
    if (s === null || s === undefined) return '';
    var d = document.createElement('div');
    d.textContent = String(s);
    return d.innerHTML;
  }
  function escAttr(s) { return escHtml(s); }
  function escTelHref(s) {
    // Allow + and digits; strip everything else for safety.
    return String(s || '').replace(/[^+0-9]/g, '').slice(0, 20);
  }
  function jsStr(s) {
    // Safe to interpolate inside a single-quoted JS string in an inline handler.
    return String(s == null ? '' : s)
      .replace(/\\/g, '\\\\')
      .replace(/'/g, "\\'")
      .replace(/</g, '\\u003c')
      .replace(/>/g, '\\u003e')
      .replace(/&/g, '\\u0026')
      .replace(/\r/g, '\\r')
      .replace(/\n/g, '\\n');
  }
  window.__escHtml = escHtml; // expose for ad-hoc use

  // ── Drink detection (barista items) ──
  const DRINK_KEYWORDS = [
    'flat white', 'long black', 'short black', 'americano', 'latte', 'cappuccino',
    'mocha', 'espresso', 'macchiato', 'coffee', 'matcha', 'chai',
    'tea', 'hot chocolate', 'turmeric', 'smoothie',
    'iced auckland', 'iced ferrero', 'iced berry black', 'iced orange',
    'iced mango', 'iced coconut', 'iced lychee', 'iced strawberry',
    'iced tonic passion', 'iced yuzu', 'iced london fog', 'iced peach',
    'iced bumblebee', 'milkshake'
  ];

  function isDrink(itemName) {
    const lower = itemName.toLowerCase();
    return DRINK_KEYWORDS.some(function(kw) { return lower.indexOf(kw) !== -1; });
  }

  // ── State ──
  let knownOrderIds = new Set();
  let orderData = {};
  let prepCount = 0;
  let doneCount = 0;
  let isFirstLoad = true;
  let completedOrders = [];
  let currentFilter = 'all';
  // N9: serverTimeOffset = (serverNow - clientNow) at last poll; used to compute
  // elapsed times against the server clock so cafe iPad skew doesn't show "-2m".
  let serverTimeOffset = 0;
  // N3/N4: orders that markPaid is currently flushing — don't double-count or
  // chime-resurrect them via the polling cleanup path.
  let paidInFlight = new Set();

  // ── View filter ──
  window.setFilter = function(filter) {
    currentFilter = filter;
    document.body.classList.remove('filter-kitchen', 'filter-barista');
    if (filter !== 'all') {
      document.body.classList.add('filter-' + filter);
    }
    // Update active button
    document.querySelectorAll('.filter-btn').forEach(function(btn) {
      btn.classList.toggle('active', btn.getAttribute('data-filter') === filter);
    });
    // Update header subtitle
    const subtitles = { all: 'Kitchen', kitchen: 'Kitchen', barista: 'Barista' };
    document.querySelector('.logo span').textContent = subtitles[filter] || 'Kitchen';
    updateStats();
  };

  // ── Audio ──
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  let audioCtx = null;

  function ensureAudio() {
    if (!audioCtx) audioCtx = new AudioCtx();
  }

  function playChime() {
    try {
      ensureAudio();
      const now = audioCtx.currentTime;
      [660, 880].forEach((freq, i) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.3, now + i * 0.15);
        gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.15 + 0.5);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(now + i * 0.15);
        osc.stop(now + i * 0.15 + 0.6);
        // N16: explicitly disconnect after the oscillator finishes so a
        // week-long iPad uptime doesn't accumulate stranded audio nodes.
        osc.onended = function() {
          try { osc.disconnect(); gain.disconnect(); } catch (_) {}
        };
      });
    } catch(e) {
      console.log('Audio not available');
    }
  }

  // ── Elapsed time ──
  // N9: use serverTimeOffset so a wrong client clock doesn't show "-2 min ago".
  function nowOnServer() { return Date.now() + serverTimeOffset; }
  function elapsed(iso) {
    let diff = Math.floor((nowOnServer() - new Date(iso).getTime()) / 1000);
    if (diff < 0) diff = 0; // clamp; never show negative time
    if (diff < 60) return 'just now';
    const mins = Math.floor(diff / 60);
    if (mins < 60) return mins + ' min ago';
    const hrs = Math.floor(mins / 60);
    return hrs + 'h ' + (mins % 60) + 'm ago';
  }

  function formatTime(iso) {
    return new Date(iso).toLocaleTimeString('en-NZ', {
      hour: '2-digit', minute: '2-digit', hour12: true
    });
  }

  // ── Render card ──
  function renderCard(order) {
    const isPreparing = order.status === 'preparing';
    const isReady = order.status === 'ready';
    const isPickedUp = order.status === 'picked_up';
    // Split items into kitchen (food) and barista (drinks)
    const kitchenIndices = [];
    const baristaIndices = [];
    order.items.forEach(function(item, idx) {
      if (isDrink(item.name)) { baristaIndices.push(idx); }
      else { kitchenIndices.push(idx); }
    });

    function renderItemRow(item, idx) {
      const itemType = isDrink(item.name) ? 'barista' : 'kitchen';
      const key = item.lineId || String(idx); // stable key for cooked/picked state
      const variant = item.size ? '<span class="item-variant"> &middot; ' + escHtml(item.size) + '</span>' : '';
      const notes = item.notes ? '<div class="item-notes">' + escHtml(item.notes) + '</div>' : '';
      const cookable = isPreparing ? ' cookable' : '';
      const cooked = (isPreparing && order.cookedItems && order.cookedItems[key]) ? ' cooked' : '';
      const cookAction = isPreparing ? ' onclick="toggleItemCooked(\'' + jsStr(order.id) + '\',\'' + jsStr(key) + '\')"' : '';
      const cookCheck = isPreparing ? '<span class="cook-check">&#10003;</span>' : '';
      const tappable = isReady ? ' tappable' : '';
      const picked = (isReady && order.pickedItems && order.pickedItems[key]) ? ' picked' : '';
      const tapAction = isReady ? ' onclick="toggleItemPickup(\'' + jsStr(order.id) + '\',\'' + jsStr(key) + '\')"' : '';
      const qty = Number(item.qty) || 0;
      const price = Number(item.price) || 0;
      return '<div class="item-row' + cookable + cooked + tappable + picked + '" data-key="' + escAttr(key) + '" data-idx="' + idx + '" data-type="' + itemType + '"' + cookAction + tapAction + '>' +
        '<span class="item-qty">' + qty + '</span>' +
        '<div class="item-name">' + escHtml(item.name) + variant + notes + '</div>' +
        '<span class="item-price">$' + (price * qty).toFixed(2) + '</span>' +
        cookCheck +
      '</div>';
    }

    let itemsHtml = '';
    const hasKitchen = kitchenIndices.length > 0;
    const hasBarista = baristaIndices.length > 0;
    if (hasKitchen && hasBarista) {
      itemsHtml += '<div class="section-label">🍳 Kitchen</div>';
      itemsHtml += kitchenIndices.map(function(idx) { return renderItemRow(order.items[idx], idx); }).join('');
      itemsHtml += '<div class="section-label barista">☕ Barista</div>';
      itemsHtml += baristaIndices.map(function(idx) { return renderItemRow(order.items[idx], idx); }).join('');
    } else {
      // All same type — no section headers needed
      itemsHtml = order.items.map(function(item, idx) { return renderItemRow(item, idx); }).join('');
    }

    // Count cooked/picked items only against items still present (lineIds may have been removed via add-items merges).
    function countTrueFor(map, items) {
      if (!map) return 0;
      var n = 0;
      items.forEach(function(it, i) {
        var k = it.lineId || String(i);
        if (map[k]) n++;
      });
      return n;
    }

    // Cook progress hint shown when preparing
    let cookHint = '';
    if (isPreparing) {
      const totalItems = order.items.length;
      const cookedCount = countTrueFor(order.cookedItems, order.items);
      const pct = totalItems > 0 ? Math.round((cookedCount / totalItems) * 100) : 0;
      cookHint = '<div class="cook-hint">Tap each item when cooked</div>' +
        '<div class="cook-progress">' +
          '<span>' + cookedCount + '/' + totalItems + '</span>' +
          '<div class="prog-bar"><div class="prog-fill" style="width:' + pct + '%"></div></div>' +
        '</div>';
    }

    // Pickup hint shown when order is ready
    let pickupHint = '';
    if (isReady) {
      const totalItems = order.items.length;
      const pickedCount = countTrueFor(order.pickedItems, order.items);
      const pct = totalItems > 0 ? Math.round((pickedCount / totalItems) * 100) : 0;
      pickupHint = '<div class="pickup-hint">Tap each item as staff picks up</div>' +
        '<div class="pickup-progress">' +
          '<span>' + pickedCount + '/' + totalItems + '</span>' +
          '<div class="prog-bar"><div class="prog-fill" style="width:' + pct + '%"></div></div>' +
        '</div>';
    }

    const orderNotes = order.notes
      ? '<div class="order-notes">' + escHtml(order.notes) + '</div>'
      : '';

    // Buttons based on status:
    const idJs = jsStr(order.id);
    let buttons = '';
    if (!isPreparing && !isReady && !isPickedUp) {
      buttons = '<button class="btn-prep" onclick="markPreparing(\'' + idJs + '\')">PREP</button>';
    } else if (isPreparing) {
      buttons = '<button class="btn-ready" onclick="markSectionDone(\'' + idJs + '\')">READY</button>';
    } else if (isReady) {
      buttons = '<button class="btn-pickup" onclick="markPickedUp(\'' + idJs + '\')">PICKED UP</button>';
    } else if (isPickedUp) {
      buttons = '<button class="btn-paid" onclick="markPaid(\'' + idJs + '\')">PAID BY CUSTOMER</button>';
    }

    // Status badge text and visibility
    let statusClass = '';
    let badgeText = '';
    let badgeVisible = false;
    if (isPreparing) {
      statusClass = ' preparing';
      badgeText = 'Preparing';
      badgeVisible = true;
    } else if (isReady) {
      statusClass = ' ready';
      badgeText = 'Ready';
      badgeVisible = true;
    } else if (isPickedUp) {
      statusClass = ' picked_up';
      badgeText = 'Picked Up';
      badgeVisible = true;
    }

    const safeId = escAttr(order.id);
    const phoneHtml = order.phoneNumber
      ? '<div class="order-phone"><a href="tel:' + escAttr(escTelHref(order.phoneNumber)) + '">' + escHtml(order.phoneNumber) + '</a></div>'
      : '';
    return '<div class="order-card' + statusClass + '" id="card-' + safeId + '" data-id="' + safeId + '" data-has-kitchen="' + hasKitchen + '" data-has-barista="' + hasBarista + '">' +
      '<div class="card-header">' +
        '<div style="display:flex;align-items:center">' +
          '<div class="table-badge">T' + escHtml(order.tableNumber) + '</div>' +
          '<span class="status-badge"' + (badgeVisible ? ' style="display:inline-block"' : '') + '>' + escHtml(badgeText) + '</span>' +
        '</div>' +
        '<div class="order-meta">' +
          '<div class="order-id">' + escHtml(order.id) + '</div>' +
          '<div class="order-time">' + escHtml(formatTime(order.createdAt)) + '</div>' +
          '<div class="elapsed" data-created="' + escAttr(order.createdAt) + '">' + escHtml(elapsed(order.createdAt)) + '</div>' +
          phoneHtml +
        '</div>' +
      '</div>' +
      '<div class="card-body">' + itemsHtml + orderNotes + cookHint + pickupHint + '</div>' +
      '<div class="card-footer">' +
        '<div class="order-total">$' + (Number(order.total) || 0).toFixed(2) + '</div>' +
        '<div class="btn-group">' +
          buttons +
        '</div>' +
      '</div>' +
    '</div>';
  }

  // ── Mark section done (filter-aware READY) ──
  window.markSectionDone = function(orderId) {
    var order = orderData[orderId];
    if (!order || order.status !== 'preparing') return;

    // If viewing ALL, just mark everything ready
    if (currentFilter === 'all') {
      markReady(orderId);
      return;
    }

    // Otherwise, batch-cook only items matching the current filter (keyed by lineId)
    if (!order.cookedItems) order.cookedItems = {};
    order.items.forEach(function(item, idx) {
      var itemIsDrink = isDrink(item.name);
      if ((currentFilter === 'barista' && itemIsDrink) || (currentFilter === 'kitchen' && !itemIsDrink)) {
        order.cookedItems[itemKey(item, idx)] = true;
      }
    });

    var card = document.getElementById('card-' + orderId);
    if (card) {
      order.items.forEach(function(item, idx) {
        if (!order.cookedItems[itemKey(item, idx)]) return;
        var row = card.querySelector('.item-row[data-idx="' + idx + '"]');
        if (row) row.classList.add('cooked');
      });
      var totalItems = order.items.length;
      var cookedCount = activeTrueCount(order.cookedItems, order.items);
      var pct = totalItems > 0 ? Math.round((cookedCount / totalItems) * 100) : 0;
      var progFill = card.querySelector('.cook-progress .prog-fill');
      if (progFill) progFill.style.width = pct + '%';
      var progText = card.querySelector('.cook-progress span');
      if (progText) progText.textContent = cookedCount + '/' + totalItems;
    }

    syncOrder(orderId, { status: 'preparing', cookedItems: order.cookedItems });

    if (activeTrueCount(order.cookedItems, order.items) === order.items.length) {
      setTimeout(function() { markReady(orderId); }, 500);
    }
  };

  // ── Mark order preparing ──
  window.markPreparing = async function(orderId) {
    const card = document.getElementById('card-' + orderId);
    if (card) {
      card.classList.add('preparing');
      // Show status badge
      const badge = card.querySelector('.status-badge');
      if (badge) badge.style.display = 'inline-block';
      // Replace all buttons with READY (ALL) override
      const btnGroup = card.querySelector('.btn-group');
      if (btnGroup) {
        btnGroup.innerHTML = '';
        const readyBtn = document.createElement('button');
        readyBtn.className = 'btn-ready';
        var labels = { all: 'READY (ALL)', kitchen: 'KITCHEN DONE', barista: 'BARISTA DONE' };
        readyBtn.textContent = labels[currentFilter] || 'READY (ALL)';
        readyBtn.onclick = function() { markSectionDone(orderId); };
        btnGroup.appendChild(readyBtn);
      }
      // Make items tappable for per-dish cooking (key by lineId via data-key)
      const items = card.querySelectorAll('.item-row');
      const totalItems = items.length;
      items.forEach(function(row, idx) {
        row.classList.add('cookable');
        var key = row.getAttribute('data-key') || String(idx);
        if (!row.querySelector('.cook-check')) {
          const check = document.createElement('span');
          check.className = 'cook-check';
          check.textContent = '✓';
          row.appendChild(check);
        }
        row.onclick = function() { toggleItemCooked(orderId, key); };
      });
      // Add cook hint + progress bar
      const cardBody = card.querySelector('.card-body');
      if (cardBody && !cardBody.querySelector('.cook-hint')) {
        const hint = document.createElement('div');
        hint.className = 'cook-hint';
        hint.textContent = 'Tap each item when cooked';
        cardBody.appendChild(hint);
        const prog = document.createElement('div');
        prog.className = 'cook-progress';
        prog.innerHTML = '<span>0/' + totalItems + '</span><div class="prog-bar"><div class="prog-fill" style="width:0%"></div></div>';
        cardBody.appendChild(prog);
      }
    }

    // Update local data
    if (orderData[orderId]) orderData[orderId].status = 'preparing';
    updateStats();

    await syncOrder(orderId, { status: 'preparing' });
  };

  // ── Mark order ready (kitchen done) ──
  window.markReady = async function(orderId) {
    const card = document.getElementById('card-' + orderId);
    if (card) {
      card.classList.remove('preparing');
      card.classList.add('ready');
      // Update status badge
      const badge = card.querySelector('.status-badge');
      if (badge) { badge.style.display = 'inline-block'; badge.textContent = 'Ready'; badge.style.background = '#2196f3'; }
      // Remove cook state (cookable items, checkmarks, cook hint/progress)
      card.querySelectorAll('.item-row').forEach(function(row) {
        row.classList.remove('cookable', 'cooked');
        row.onclick = null;
        const check = row.querySelector('.cook-check');
        if (check) check.remove();
      });
      const cookHintEl = card.querySelector('.cook-hint');
      if (cookHintEl) cookHintEl.remove();
      const cookProgEl = card.querySelector('.cook-progress');
      if (cookProgEl) cookProgEl.remove();
      // Clear cookedItems data
      if (orderData[orderId]) delete orderData[orderId].cookedItems;
      // Replace buttons with PICKED UP only
      const btnGroup = card.querySelector('.btn-group');
      if (btnGroup) {
        btnGroup.innerHTML = '';
        const pickupBtn = document.createElement('button');
        pickupBtn.className = 'btn-pickup';
        pickupBtn.textContent = 'PICKED UP';
        pickupBtn.onclick = function() { markPickedUp(orderId); };
        btnGroup.appendChild(pickupBtn);
      }
      // Make items tappable for per-dish pickup (key by lineId)
      const items = card.querySelectorAll('.item-row');
      const totalItems = items.length;
      items.forEach(function(row, idx) {
        row.classList.add('tappable');
        var key = row.getAttribute('data-key') || String(idx);
        row.onclick = function() { toggleItemPickup(orderId, key); };
      });
      // Add pickup hint + progress bar
      const cardBody = card.querySelector('.card-body');
      if (cardBody && !cardBody.querySelector('.pickup-hint')) {
        const hint = document.createElement('div');
        hint.className = 'pickup-hint';
        hint.textContent = 'Tap each item as staff picks up';
        cardBody.appendChild(hint);
        const prog = document.createElement('div');
        prog.className = 'pickup-progress';
        prog.innerHTML = '<span>0/' + totalItems + '</span><div class="prog-bar"><div class="prog-fill" style="width:0%"></div></div>';
        cardBody.appendChild(prog);
      }
    }

    if (orderData[orderId]) orderData[orderId].status = 'ready';
    updateStats();

    await syncOrder(orderId, { status: 'ready' });
  };

  // Count true entries in {key:bool} but only for keys that match an item still present.
  function activeTrueCount(stateMap, items) {
    if (!stateMap) return 0;
    let n = 0;
    items.forEach(function(it, i) {
      const k = it.lineId || String(i);
      if (stateMap[k]) n++;
    });
    return n;
  }

  function itemKey(item, idx) { return item.lineId || String(idx); }

  // ── Toggle individual item cooked (during preparing) ──
  window.toggleItemCooked = function(orderId, key) {
    const order = orderData[orderId];
    if (!order || order.status !== 'preparing') return;

    if (!order.cookedItems) order.cookedItems = {};
    order.cookedItems[key] = !order.cookedItems[key];

    const card = document.getElementById('card-' + orderId);
    if (!card) return;

    const row = card.querySelector('.item-row[data-key="' + (window.CSS && CSS.escape ? CSS.escape(key) : key.replace(/"/g, '\\"')) + '"]');
    if (row) row.classList.toggle('cooked', !!order.cookedItems[key]);

    const totalItems = order.items.length;
    const cookedCount = activeTrueCount(order.cookedItems, order.items);
    const pct = totalItems > 0 ? Math.round((cookedCount / totalItems) * 100) : 0;

    const progFill = card.querySelector('.cook-progress .prog-fill');
    if (progFill) progFill.style.width = pct + '%';
    const progText = card.querySelector('.cook-progress span');
    if (progText) progText.textContent = cookedCount + '/' + totalItems;

    syncOrder(orderId, { status: 'preparing', cookedItems: order.cookedItems });

    if (cookedCount === totalItems && totalItems > 0) {
      setTimeout(function() { markReady(orderId); }, 500);
    }
  };

  // ── Toggle individual item pickup ──
  window.toggleItemPickup = function(orderId, key) {
    const order = orderData[orderId];
    if (!order || order.status !== 'ready') return;

    if (!order.pickedItems) order.pickedItems = {};
    order.pickedItems[key] = !order.pickedItems[key];

    const card = document.getElementById('card-' + orderId);
    if (!card) return;

    const row = card.querySelector('.item-row[data-key="' + (window.CSS && CSS.escape ? CSS.escape(key) : key.replace(/"/g, '\\"')) + '"]');
    if (row) row.classList.toggle('picked', !!order.pickedItems[key]);

    const totalItems = order.items.length;
    const pickedCount = activeTrueCount(order.pickedItems, order.items);
    const pct = totalItems > 0 ? Math.round((pickedCount / totalItems) * 100) : 0;

    const progFill = card.querySelector('.pickup-progress .prog-fill');
    if (progFill) progFill.style.width = pct + '%';
    const progText = card.querySelector('.pickup-progress span');
    if (progText) progText.textContent = pickedCount + '/' + totalItems;

    syncOrder(orderId, { status: 'ready', pickedItems: order.pickedItems });

    if (pickedCount === totalItems && totalItems > 0) {
      setTimeout(function() { markPickedUp(orderId); }, 500);
    }
  };

  // ── Shared PATCH helper with auth ──
  function syncOrder(orderId, body) {
    return fetch(BACKEND + '/orders/' + encodeURIComponent(orderId), {
      method: 'PATCH',
      headers: authHeaders({ 'Content-Type': 'application/json' }),
      body: JSON.stringify(body)
    }).then(function(r) {
      if (!r.ok) console.error('PATCH', orderId, 'failed', r.status);
      return r;
    }).catch(function(e) { console.error('Failed to sync:', e); });
  }

  // ── Mark order picked up ──
  window.markPickedUp = async function(orderId) {
    const card = document.getElementById('card-' + orderId);
    if (card) {
      card.classList.remove('ready');
      card.classList.add('picked_up');
      // Update status badge
      const badge = card.querySelector('.status-badge');
      if (badge) { badge.style.display = 'inline-block'; badge.textContent = 'Picked Up'; badge.style.background = '#9c27b0'; }
      // Remove tappable state and pickup hint/progress
      card.querySelectorAll('.item-row').forEach(function(row) {
        row.classList.remove('tappable', 'picked');
        row.onclick = null;
      });
      const hint = card.querySelector('.pickup-hint');
      if (hint) hint.remove();
      const prog = card.querySelector('.pickup-progress');
      if (prog) prog.remove();
      // Replace PICKED UP button with PAID BY CUSTOMER (full width)
      const pickupBtn = card.querySelector('.btn-pickup');
      if (pickupBtn) {
        const paidBtn = document.createElement('button');
        paidBtn.className = 'btn-paid';
        paidBtn.textContent = 'PAID BY CUSTOMER';
        paidBtn.onclick = function() { markPaid(orderId); };
        pickupBtn.parentNode.insertBefore(paidBtn, pickupBtn);
        pickupBtn.remove();
      }
    }

    // N14: audit-trail preservation — if the cook taps PICKED UP without
    // having marked individual items, populate pickedItems with all lineIds
    // so the order record shows every item was handed off.
    if (orderData[orderId]) {
      orderData[orderId].status = 'picked_up';
      if (!orderData[orderId].pickedItems) orderData[orderId].pickedItems = {};
      orderData[orderId].items.forEach(function(item, idx) {
        const key = item.lineId || String(idx);
        orderData[orderId].pickedItems[key] = true;
      });
    }
    updateStats();

    await syncOrder(orderId, {
      status: 'picked_up',
      pickedItems: orderData[orderId] ? orderData[orderId].pickedItems : undefined,
    });
  };

  // ── Mark order paid (sends to history) ──
  // N3/N4 fix: await the PATCH, only commit local state on success. On failure
  // restore the card and surface the error to the cook instead of silently
  // re-adding it on the next poll (which used to look like a "new arrival"
  // chime for an order the cook thought they'd closed).
  window.markPaid = async function(orderId) {
    const card = document.getElementById('card-' + orderId);
    if (paidInFlight.has(orderId)) return;
    paidInFlight.add(orderId);
    // Visually disable both buttons in case there's a double-tap.
    if (card) card.classList.add('done');

    const resp = await syncOrder(orderId, { status: 'done' });
    if (!resp || !resp.ok) {
      // Revert the optimistic fade and tell the cook.
      paidInFlight.delete(orderId);
      if (card) {
        card.classList.remove('done');
        const status = resp ? resp.status : 'network';
        const banner = document.createElement('div');
        banner.style.cssText = 'background:#f44336;color:#fff;padding:8px;text-align:center;font-size:12px;border-radius:6px;margin:6px 12px';
        banner.textContent = "Couldn't mark paid (HTTP " + status + "). Try again.";
        card.appendChild(banner);
        setTimeout(function() { banner.remove(); }, 4000);
      }
      return;
    }

    // Server confirmed. Now archive locally.
    if (orderData[orderId]) {
      const order = orderData[orderId];
      order.completedAt = new Date().toISOString();
      completedOrders.unshift(order);
      if (completedOrders.length > 50) completedOrders.pop();
      renderHistory();
    }
    doneCount++;
    updateStats();
    setTimeout(() => {
      if (card) card.remove();
      delete orderData[orderId];
      paidInFlight.delete(orderId);
    }, 400);
  };

  // N13: dead-code removal — `window.markDone` was an unused legacy alias.

  // ── Toggle history ──
  window.toggleHistory = function() {
    const list = document.getElementById('historyList');
    const btn = document.getElementById('historyToggle');
    list.classList.toggle('open');
    btn.textContent = list.classList.contains('open') ? 'Hide' : 'Show';
  };

  // ── Render history ──
  function renderHistory() {
    const list = document.getElementById('historyList');
    const empty = document.getElementById('historyEmpty');

    if (completedOrders.length === 0) {
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';

    // Remove old history items (keep the empty div)
    const existing = list.querySelectorAll('.history-item');
    existing.forEach(el => el.remove());

    completedOrders.forEach(order => {
      const itemNames = order.items.map(i =>
        (Number(i.qty) || 0) + 'x ' + i.name + (i.size ? ' (' + i.size + ')' : '')
      ).join(', ');

      const phoneHtml = order.phoneNumber
        ? '<div class="hi-phone"><a href="tel:' + escAttr(escTelHref(order.phoneNumber)) + '">' + escHtml(order.phoneNumber) + '</a></div>'
        : '';

      const html = '<div class="history-item">' +
        '<div class="hi-left">' +
          '<span class="hi-table">T' + escHtml(order.tableNumber) + '</span>' +
          '<span class="hi-items">' + escHtml(itemNames) + '</span>' +
        '</div>' +
        '<div class="hi-right">' +
          '<div class="hi-total">$' + (Number(order.total) || 0).toFixed(2) + '</div>' +
          phoneHtml +
          '<div class="hi-time">' + escHtml(formatTime(order.completedAt || order.createdAt)) + '</div>' +
        '</div>' +
      '</div>';

      const temp = document.createElement('div');
      temp.innerHTML = html;
      list.appendChild(temp.firstChild);
    });
  }

  // ── Update stats ──
  function updateStats() {
    let activeC = 0;
    let prepC = 0;
    let readyC = 0;
    let pickedUpC = 0;
    knownOrderIds.forEach(id => {
      if (!orderData[id]) return;
      const order = orderData[id];
      // Filter check: skip orders that don't match current view
      if (currentFilter === 'kitchen' && !order.items.some(function(i) { return !isDrink(i.name); })) return;
      if (currentFilter === 'barista' && !order.items.some(function(i) { return isDrink(i.name); })) return;
      if (order.status === 'preparing') prepC++;
      if (order.status === 'ready') readyC++;
      if (order.status === 'picked_up') pickedUpC++;
      activeC++;
    });
    document.getElementById('activeCount').textContent = activeC;
    document.getElementById('prepCount').textContent = prepC;
    document.getElementById('readyCount').textContent = readyC;
    document.getElementById('pickedUpCount').textContent = pickedUpC;
    document.getElementById('doneCount').textContent = doneCount;
    document.getElementById('emptyState').style.display =
      activeC === 0 ? 'flex' : 'none';
  }

  // ── Poll orders ──
  let pollAbort = null;
  let pollTimer = null;
  let pollPending = false;

  async function pollOrders() {
    if (pollPending) return; // dedupe overlapping polls
    if (pollAbort) pollAbort.abort();
    pollAbort = new AbortController();
    pollPending = true;
    try {
      const resp = await fetch(BACKEND + '/orders', {
        headers: authHeaders(),
        signal: pollAbort.signal,
      });
      if (resp.status === 401) {
        document.getElementById('statusDot').className = 'status-dot error';
        document.getElementById('statusText').textContent = 'Auth required (add ?token=… to URL)';
        return;
      }
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const data = await resp.json();

      // N9: anchor elapsed-time math to the server clock so a wrong iPad clock
      // doesn't produce negative or wildly inflated "X min ago" values.
      if (data.serverTime) {
        serverTimeOffset = new Date(data.serverTime).getTime() - Date.now();
      }

      // Filter to active orders only
      const active = data.orders.filter(o => o.status !== 'done');
      let hasNew = false;

      active.forEach(order => {
        if (!knownOrderIds.has(order.id)) {
          knownOrderIds.add(order.id);
          orderData[order.id] = order;
          hasNew = true;

          const grid = document.getElementById('ordersGrid');
          const empty = document.getElementById('emptyState');

          const temp = document.createElement('div');
          temp.innerHTML = renderCard(order);
          const card = temp.firstChild;

          if (!isFirstLoad) {
            card.classList.add('new-arrival', 'flash');
            setTimeout(() => card.classList.remove('flash'), 1500);
            setTimeout(() => card.classList.remove('new-arrival'), 5000);
          }

          grid.insertBefore(card, grid.firstChild === empty ? empty : grid.firstChild);
        } else {
          const localOrder = orderData[order.id];
          if (!localOrder) return;
          const statusChanged = localOrder.status !== order.status;

          // N6: replace (don't merge) cooked/picked state from the server, so
          // a second dashboard tab that never observed a clear ends up clean.
          // If the server omits the field (e.g. after a status reset), clear
          // it locally too.
          localOrder.cookedItems = order.cookedItems || {};
          localOrder.pickedItems = order.pickedItems || {};

          // Mirror in-flight item-count changes from /add-items so the dashboard
          // sees newly added rows next render.
          if (Array.isArray(order.items)) localOrder.items = order.items;

          const card = document.getElementById('card-' + order.id);
          if (!card) return;

          if (statusChanged) {
            localOrder.status = order.status;
            // Clear all status classes
            card.classList.remove('preparing', 'ready', 'picked_up');

            // Clean up any existing per-item UI
            card.querySelectorAll('.item-row').forEach(function(row) {
              row.classList.remove('cookable', 'cooked', 'tappable', 'picked');
              row.onclick = null;
              var ck = row.querySelector('.cook-check'); if (ck) ck.remove();
            });
            var els = card.querySelectorAll('.cook-hint,.cook-progress,.pickup-hint,.pickup-progress');
            els.forEach(function(el) { el.remove(); });

            var capturedId = order.id; // close over a fresh reference for handlers
            if (order.status === 'preparing') {
              card.classList.add('preparing');
              var badge = card.querySelector('.status-badge');
              if (badge) { badge.style.display = 'inline-block'; badge.textContent = 'Preparing'; badge.style.background = '#ff9800'; }
              var btnGroup = card.querySelector('.btn-group');
              if (btnGroup) {
                btnGroup.innerHTML = '';
                var readyBtn = document.createElement('button');
                readyBtn.className = 'btn-ready';
                var labels = { all: 'READY (ALL)', kitchen: 'KITCHEN DONE', barista: 'BARISTA DONE' };
                readyBtn.textContent = labels[currentFilter] || 'READY (ALL)';
                readyBtn.onclick = function() { markSectionDone(capturedId); };
                btnGroup.appendChild(readyBtn);
              }
              var items = card.querySelectorAll('.item-row');
              var totalItems = items.length;
              items.forEach(function(row, idx) {
                row.classList.add('cookable');
                var key = row.getAttribute('data-key') || String(idx);
                var check = document.createElement('span');
                check.className = 'cook-check'; check.textContent = '✓';
                row.appendChild(check);
                row.onclick = function() { toggleItemCooked(capturedId, key); };
              });
              var cardBody = card.querySelector('.card-body');
              if (cardBody) {
                var hint = document.createElement('div');
                hint.className = 'cook-hint'; hint.textContent = 'Tap each item when cooked';
                cardBody.appendChild(hint);
                var prog = document.createElement('div');
                prog.className = 'cook-progress';
                prog.innerHTML = '<span>0/' + totalItems + '</span><div class="prog-bar"><div class="prog-fill" style="width:0%"></div></div>';
                cardBody.appendChild(prog);
              }
            } else if (order.status === 'ready') {
              card.classList.add('ready');
              var badge = card.querySelector('.status-badge');
              if (badge) { badge.style.display = 'inline-block'; badge.textContent = 'Ready'; badge.style.background = '#2196f3'; }
              var btnGroup = card.querySelector('.btn-group');
              if (btnGroup) {
                btnGroup.innerHTML = '';
                var pickupBtn = document.createElement('button');
                pickupBtn.className = 'btn-pickup';
                pickupBtn.textContent = 'PICKED UP';
                pickupBtn.onclick = function() { markPickedUp(capturedId); };
                btnGroup.appendChild(pickupBtn);
              }
              var items = card.querySelectorAll('.item-row');
              var totalItems = items.length;
              items.forEach(function(row, idx) {
                row.classList.add('tappable');
                var key = row.getAttribute('data-key') || String(idx);
                row.onclick = function() { toggleItemPickup(capturedId, key); };
              });
              var cardBody = card.querySelector('.card-body');
              if (cardBody) {
                var hint = document.createElement('div');
                hint.className = 'pickup-hint'; hint.textContent = 'Tap each item as staff picks up';
                cardBody.appendChild(hint);
                var prog = document.createElement('div');
                prog.className = 'pickup-progress';
                prog.innerHTML = '<span>0/' + totalItems + '</span><div class="prog-bar"><div class="prog-fill" style="width:0%"></div></div>';
                cardBody.appendChild(prog);
              }
            } else if (order.status === 'picked_up') {
              card.classList.add('picked_up');
              var badge = card.querySelector('.status-badge');
              if (badge) { badge.style.display = 'inline-block'; badge.textContent = 'Picked Up'; badge.style.background = '#9c27b0'; }
              var btnGroup = card.querySelector('.btn-group');
              if (btnGroup) {
                btnGroup.innerHTML = '';
                var paidBtn = document.createElement('button');
                paidBtn.className = 'btn-paid';
                paidBtn.textContent = 'PAID BY CUSTOMER';
                paidBtn.onclick = function() { markPaid(capturedId); };
                btnGroup.appendChild(paidBtn);
              }
            } else if (order.status === 'received') {
              // N2: status reverted (POST /add-items resets to received). Without
              // this branch the card had no buttons rebuilt and became unusable
              // until reload. Full re-render is cleanest because items may have
              // grown and we need fresh data-key attributes for the new lines.
              var fresh = document.createElement('div');
              fresh.innerHTML = renderCard(order);
              var newCard = fresh.firstChild;
              newCard.classList.add('flash');
              setTimeout(function() { newCard.classList.remove('flash'); }, 1500);
              card.parentNode.replaceChild(newCard, card);
            }
          }

          // Sync per-item visual state from server (keyed by data-key, which is lineId)
          if (order.status === 'preparing' && order.cookedItems) {
            var rows = card.querySelectorAll('.item-row');
            var totalItems = rows.length;
            var cookedCount = 0;
            rows.forEach(function(row) {
              var k = row.getAttribute('data-key');
              if (k && order.cookedItems[k]) {
                row.classList.add('cooked');
                cookedCount++;
              } else {
                row.classList.remove('cooked');
              }
            });
            var pct = totalItems > 0 ? Math.round((cookedCount / totalItems) * 100) : 0;
            var progFill = card.querySelector('.cook-progress .prog-fill');
            if (progFill) progFill.style.width = pct + '%';
            var progText = card.querySelector('.cook-progress span');
            if (progText) progText.textContent = cookedCount + '/' + totalItems;
          }
          if (order.status === 'ready' && order.pickedItems) {
            var rows = card.querySelectorAll('.item-row');
            var totalItems = rows.length;
            var pickedCount = 0;
            rows.forEach(function(row) {
              var k = row.getAttribute('data-key');
              if (k && order.pickedItems[k]) {
                row.classList.add('picked');
                pickedCount++;
              } else {
                row.classList.remove('picked');
              }
            });
            var pct = totalItems > 0 ? Math.round((pickedCount / totalItems) * 100) : 0;
            var progFill = card.querySelector('.pickup-progress .prog-fill');
            if (progFill) progFill.style.width = pct + '%';
            var progText = card.querySelector('.pickup-progress span');
            if (progText) progText.textContent = pickedCount + '/' + totalItems;
          }
        }
      });

      // Remove cards for orders that disappeared server-side.
      // N3 fix: don't double-count or double-archive — if markPaid is currently
      // handling this order (or already did), skip the archive/increment so we
      // don't end up with "2" in the Paid stat or duplicate history entries.
      const activeIds = new Set(active.map(o => o.id));
      knownOrderIds.forEach(id => {
        if (activeIds.has(id)) return;
        const card = document.getElementById('card-' + id);
        if (card) card.remove();
        // If markPaid owns this disappearance, do nothing else here.
        if (paidInFlight.has(id) || !orderData[id]) {
          knownOrderIds.delete(id);
          return;
        }
        // Otherwise: order disappeared via some other path (manual server
        // edit, DELETE /orders, etc.) — archive it once.
        orderData[id].completedAt = new Date().toISOString();
        completedOrders.unshift(orderData[id]);
        if (completedOrders.length > 50) completedOrders.pop();
        renderHistory();
        delete orderData[id];
        knownOrderIds.delete(id);
        doneCount++;
      });

      if (hasNew && !isFirstLoad) {
        playChime();
      }

      isFirstLoad = false;

      document.getElementById('statusDot').className = 'status-dot live';
      document.getElementById('statusText').textContent = 'Live';

      updateStats();
    } catch(e) {
      if (e && e.name === 'AbortError') return; // intentional cancel — not an error
      console.error('Poll error:', e);
      document.getElementById('statusDot').className = 'status-dot error';
      document.getElementById('statusText').textContent = 'Offline';
    } finally {
      pollPending = false;
    }
  }

  function startPolling() {
    if (pollTimer) return;
    pollOrders();
    pollTimer = setInterval(pollOrders, POLL_INTERVAL);
  }
  function stopPolling() {
    if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
    if (pollAbort) { pollAbort.abort(); pollAbort = null; }
  }
  document.addEventListener('visibilitychange', function() {
    if (document.hidden) stopPolling();
    else startPolling();
  });

  // ── Update elapsed times ──
  function updateElapsed() {
    document.querySelectorAll('.elapsed[data-created]').forEach(el => {
      el.textContent = elapsed(el.dataset.created);
    });
  }

  // ── Init ──
  document.addEventListener('click', function unlock() {
    ensureAudio();
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    document.removeEventListener('click', unlock);
  }, { once: true });

  startPolling();
  setInterval(updateElapsed, 30000);
})();
</script>

</body>
</html>
