/* ───────── persistence ───────── */
function save(k,v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} }
function load(k){ try{ const v=localStorage.getItem(k); return v?JSON.parse(v):null; }catch(e){ return null; } }
function persistSession(){ if(state.session) save(LS.session, state.session); }
function persistPrefs(){ save(LS.prefs, state.prefs); }
function persistCreds(){ save(LS.creds, CREDS); }

/* ───────── helpers ───────── */
function cafe(){ return CAFES[state.session.cafeSlug]; }
function money(n){ return '$'+Number(n).toFixed(2); }
function elapMin(at){ return Math.floor((Date.now()-at)/60000); }
function elapsed(at){ return elapMin(at)+'m'; }
function val(id){ const el=document.getElementById(id); return el?el.value:''; }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function clockStr(){ return new Date().toLocaleTimeString('en-NZ',{hour:'2-digit',minute:'2-digit',hour12:false}); }
function initialsOf(name){ return name.split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase(); }

function ic(paths, sw, size){
  const ps = (Array.isArray(paths)?paths:[paths]).map(d=>`<path d="${d}"/>`).join('');
  return `<svg width="${size||19}" height="${size||19}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="${sw||1.7}" stroke-linecap="round" stroke-linejoin="round">${ps}</svg>`;
}

/* ───────── theme ───────── */
// Accent = a manual override (prefs.accent) if set, else the active café's brand.
function accentObj(){
  const name = state.prefs.accent || (state.session && cafe().accent) || 'Terracotta';
  return ACCENTS[name] || ACCENTS.Terracotta;
}
function appearanceObj(){ return APPEARANCE[state.prefs.appearance] || APPEARANCE.Light; }
function kdsPalette(){ return KDS[appearanceObj().kds] || KDS.Midnight; }
function applyTheme(){
  const r=document.documentElement.style;
  const AC = state.session ? accentObj() : ACCENTS.Terracotta;
  const T = appearanceObj();
  const K = kdsPalette();
  const lightMode = (state.prefs.appearance||'Light')==='Light';
  r.setProperty('--accent',AC.a); r.setProperty('--accent-d',AC.d); r.setProperty('--accent-l',AC.l);
  r.setProperty('--accent-tint', lightMode ? AC.tint : (AC.tintDark||AC.tint));
  r.setProperty('--bg',T.bg); r.setProperty('--surface',T.surface); r.setProperty('--surface2',T.surface2);
  r.setProperty('--border',T.border); r.setProperty('--topbar-line',T.topbarLine);
  r.setProperty('--ink',T.ink); r.setProperty('--muted',T.muted); r.setProperty('--muted2',T.muted2);
  r.setProperty('--track',T.track); r.setProperty('--divider',T.divider); r.setProperty('--input',T.input);
  r.setProperty('--btn-bg',T.btnBg); r.setProperty('--btn-fg',T.btnFg); r.setProperty('--phone',T.phone);
  r.setProperty('--pos',T.pos); r.setProperty('--neg',T.neg);
  r.setProperty('--kds-bg',K.bg); r.setProperty('--kds-panel',K.panel); r.setProperty('--kds-line',K.line);
  r.setProperty('--kds-ink',K.ink); r.setProperty('--kds-muted',K.muted); r.setProperty('--kds-accent',K.accent);
  r.setProperty('--density', String(DENSITY[state.prefs.density]||1));
}

/* ───────── café loading ───────── */
function loadCafeData(slug){
  const seed = CAFES[slug].seed;
  const now = Date.now();
  state.orders = seed.orders.map(o=>({ id:o.id, where:o.where, stage:o.stage, at:now-o.mins*60000, items:o.items.map(it=>({...it})) }));
  state.menu = seed.menu.map(c=>({ title:c.title, items:c.items.map(it=>({...it})) }));
  state.sel = {c:0,i:0};
  state.billSel = 0; state.paidSet = new Set();
}
function loadCafe(slug){ state.session.cafeSlug = slug; loadCafeData(slug); persistSession(); }

/* ───────── auth ───────── */
function checkLogin(login,password){ return login.trim().toLowerCase()===CREDS.login.toLowerCase() && password===CREDS.password; }
function startSession(){
  const slug = ACCOUNT.cafes[0];
  state.session = { login:CREDS.login, cafeSlug:slug, exp:Date.now()+SESSION_TTL };
  persistSession();
  loadCafeData(slug);
  state.active='dashboard'; state.loginErr=''; state.switcherOpen=false; state.settingsOpen=false;
  render();
}
function signOut(){
  try{ localStorage.removeItem(LS.session); }catch(e){}
  state.session=null; state.settingsOpen=false; state.switcherOpen=false;
  render();
}

/* ============================================================================
   RENDER
============================================================================ */
function render(){
  applyTheme();
  document.getElementById('root').innerHTML = state.session ? appHTML() : loginHTML();
}

function switcherHTML(){
  const rows = ACCOUNT.cafes.map(slug=>{
    const cc = CAFES[slug];

    return `<button data-act="switchCafe" data-slug="${slug}" style="display:flex;align-items:center;gap:10px;width:100%;padding:9px 10px;border:none;border-radius:9px;cursor:pointer;background:${on?'var(--surface2)':'transparent'};text-align:left;">

      <span style="flex:1;min-width:0;font-size:13.5px;font-weight:500;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(cc.name)}</span>
      ${on?`<span style="color:${ac};display:flex;">${ic(ICON.check,2.2,15)}</span>`:''}

/* ───────── settings modal ───────── */
function seg(act, cur, opts){
  return opts.map(o=>`<button data-act="${act}" data-val="${o}" style="flex:1;padding:9px 6px;border:1px solid var(--border);border-radius:9px;cursor:pointer;font-family:inherit;font-size:12.5px;font-weight:600;background:${o===cur?'var(--accent)':'var(--input)'};color:${o===cur?'#fff':'var(--muted)'};">${o}</button>`).join('');

function accentSwatches(){
  const cur = state.prefs.accent || (state.session && cafe().accent);

}
function settingsHTML(){

      <button data-act="updateAccount" style="width:100%;padding:12px;border-radius:10px;border:none;background:var(--btn-bg);color:var(--btn-fg);font-family:inherit;font-size:11px;text-transform:uppercase;letter-spacing:.22em;font-weight:600;cursor:pointer;">Save account</button>

    </div>

}

/* ───────── dashboard ───────── */
function dashboardHTML(){
  const seed = cafe().seed;
  const kpis = seed.kpis.map(k=>{
    const ds = "font-size:12px;font-weight:600;padding:2px 8px;border-radius:20px;"+(k.up?"background:rgba(90,99,64,.16);color:var(--pos);":"background:rgba(194,90,58,.16);color:var(--neg);");
    return `<div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 18px 16px;box-shadow:0 14px 30px -22px rgba(0,0,0,.4);">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;">
        <div style="font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);">${k.label}</div>
        <span style="${ds}">${k.delta}</span>
      </div>
      <div style="font-family:'Fraunces',serif;font-size:33px;font-weight:500;margin-top:12px;line-height:1;color:var(--ink);">${k.value}</div>
      <div style="font-size:11.5px;color:var(--muted2);margin-top:7px;">${k.foot}</div>
    </div>`;
  }).join('');

  const stMap = { new:['New','#c78a3a','rgba(199,138,58,.16)'], cooking:['Cooking','var(--accent)','rgba(194,90,58,.16)'], ready:['Ready','var(--pos)','rgba(90,99,64,.18)'] };
  const recent = state.orders.slice(0,5).map(o=>{
    const [txt,col,bg]=stMap[o.stage];
    const total = money(o.items.reduce((s,i)=>s+i.qty*14,8));
    const summary = o.items.map(i=>i.qty+'× '+i.name).join(', ');
    return `<div style="display:flex;align-items:center;gap:14px;padding:13px 0;border-bottom:1px dotted var(--divider);">
      <div style="font-family:'Fraunces',serif;font-size:15px;color:var(--muted);width:42px;">${o.id}</div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:14px;font-weight:500;color:var(--ink);">${esc(o.where)}</div>
        <div style="font-size:12px;color:var(--muted2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(summary)}</div>
      </div>
      <div style="font-family:'Fraunces',serif;font-size:14px;color:var(--ink);">${total}</div>
      <span style="font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;background:${bg};color:${col};">${txt}</span>
    </div>`;
  }).join('');

  const tmax = Math.max(...seed.topToday.map(t=>t[1]));
  const top = seed.topToday.map(([name,count])=>`<div style="margin-bottom:15px;">
      <div style="display:flex;justify-content:space-between;gap:10px;font-size:13px;margin-bottom:6px;">
        <span style="font-weight:500;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;">${esc(name)}</span>
        <span style="color:var(--muted);white-space:nowrap;flex-shrink:0;">${count} sold</span>
      </div>
      <div style="height:7px;border-radius:5px;background:var(--track);overflow:hidden;">
        <div style="height:100%;width:${Math.round(count/tmax*100)}%;background:linear-gradient(90deg,var(--accent),var(--accent-l));border-radius:5px;"></div>
      </div>
    </div>`).join('');

  const hmax = Math.max(...seed.hourly.map(h=>h[1]));
  const hours = seed.hourly.map(([label,pct])=>`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;height:100%;justify-content:flex-end;">
      <div style="width:100%;height:${pct}%;border-radius:6px 6px 3px 3px;background:${pct===hmax?'var(--accent)':'#d6b98c'};"></div>
      <div style="font-size:10.5px;color:var(--muted2);">${label}</div>
    </div>`).join('');

  return `<div style="padding:26px 30px 60px;max-width:1180px;animation:fadeUp .35s ease;">
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;">${kpis}</div>
    <div style="display:grid;grid-template-columns:1.55fr 1fr;gap:18px;margin-top:18px;">
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px 22px;">
        <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:6px;">
          <div style="font-family:'Fraunces',serif;font-style:italic;font-size:18px;color:var(--ink);">Live orders</div>
          <button data-act="goKitchen" style="background:none;border:none;color:var(--accent);font-family:inherit;font-size:12.5px;font-weight:600;cursor:pointer;letter-spacing:.03em;">Open kitchen →</button>
        </div>
        ${recent}
      </div>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px 22px;">
        <div style="font-family:'Fraunces',serif;font-style:italic;font-size:18px;margin-bottom:14px;color:var(--ink);">Top sellers today</div>
        ${top}
      </div>
    </div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px 22px;margin-top:18px;">
      <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:18px;">
        <div style="font-family:'Fraunces',serif;font-style:italic;font-size:18px;color:var(--ink);">Sales by hour</div>
        <div style="font-size:12px;color:var(--muted2);">Today · opens ${esc(cafe().hours.split('—')[0].trim())}</div>
      </div>
      <div style="display:flex;align-items:flex-end;gap:9px;height:140px;">${hours}</div>
    </div>
  </div>`;
}

/* ───────── kitchen (KDS) ───────── */
function kitchenHTML(){
  return `<div style="min-height:100%;background:var(--kds-bg);padding:22px 24px 50px;animation:fadeUp .35s ease;"><div id="kds-content">${kitchenContentHTML()}</div></div>`;
}
function kitchenContentHTML(){
  const K = kdsPalette();
  const orders = state.orders;
  const cooking = orders.filter(o=>o.stage==='cooking').length;
  const oldest = orders.reduce((m,o)=>Math.max(m,elapMin(o.at)),0);
  const stats = [
    { label:'On the pass', value:String(orders.length), color:K.ink },
    { label:'Cooking', value:String(cooking), color:'#d9774e' },
    { label:'Oldest', value:oldest+'m', color:oldest>=12?'#ff6b4a':'#5fb87a' },
  ].map(s=>`<div style="text-align:right;">
      <div style="font-family:'Fraunces',serif;font-size:22px;color:${s.color};line-height:1;">${s.value}</div>
      <div style="font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--kds-muted);margin-top:3px;">${s.label}</div>
    </div>`).join('');

  const cols = [ {key:'new',title:'New',accent:K.accent}, {key:'cooking',title:'Cooking',accent:'#d9774e'}, {key:'ready',title:'Ready',accent:'#5fb87a'} ];
  const board = cols.map(col=>{
    const list = orders.map((o,idx)=>({o,idx})).filter(x=>x.o.stage===col.key);
    const cards = list.map(({o,idx})=>{
      const em = elapMin(o.at); const urgent = em>=12, warn = em>=7;
      const tc = col.key==='ready' ? '#5fb87a' : urgent ? '#ff6b4a' : warn ? K.accent : K.muted;
      const btn = { new:['Start cooking',K.accent,'#1a1208'], cooking:['Mark ready','#d9774e','#fff'], ready:['Bump — served','#5fb87a','#0c1a10'] }[col.key];
      const items = o.items.map(it=>`<div style="display:flex;gap:9px;align-items:baseline;">
          <span style="font-family:'Fraunces',serif;font-size:15px;color:var(--kds-accent);min-width:22px;">${it.qty}</span>
          <div style="flex:1;">
            <div style="font-size:14.5px;color:var(--kds-ink);line-height:1.25;">${esc(it.name)}</div>
            ${it.note?`<div style="font-size:12px;color:#d9774e;font-style:italic;margin-top:2px;">${esc(it.note)}</div>`:''}
          </div>
        </div>`).join('');
      return `<div style="background:var(--kds-panel);border:1px solid var(--kds-line);border-left:4px solid ${col.accent};border-radius:12px;padding:14px 15px;">
        <div style="display:flex;align-items:baseline;gap:10px;margin-bottom:11px;">
          <span style="font-family:'Fraunces',serif;font-size:17px;color:var(--kds-ink);">${o.id}</span>
          <span style="font-size:13px;color:var(--kds-muted);font-weight:500;white-space:nowrap;">${esc(o.where)}</span>
          <span style="margin-left:auto;font-family:'Fraunces',serif;font-size:15px;color:${tc};${urgent?'animation:blink 1s infinite;':''}">${elapsed(o.at)}</span>
        </div>
        <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:13px;">${items}</div>
        <button data-act="advance" data-idx="${idx}" style="width:100%;padding:11px;border:none;border-radius:9px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;letter-spacing:.04em;background:${btn[1]};color:${btn[2]};">${btn[0]}</button>
      </div>`;
    }).join('');

/* ───────── reports ───────── */
function reportsHTML(){
  const seed = cafe().seed;
  const kpis = seed.reportKpis.map(k=>{
    const col = k.up===null ? 'var(--muted2)' : k.up ? 'var(--pos)' : 'var(--neg)';
    return `<div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;">

      <div style="font-family:'Fraunces',serif;font-size:30px;font-weight:500;margin-top:11px;line-height:1;color:var(--ink);">${k.value}</div>
      <div style="font-size:12px;margin-top:9px;font-weight:500;color:${col};">${k.delta}</div>

  }).join('');

  const wmax = Math.max(...seed.weekly.map(d=>d[1]));
  const weekly = seed.weekly.map(([label,v])=>{

  const cmax = Math.max(...seed.catRev.map(c=>c[1]));
  const catRev = seed.catRev.map(([name,amt,pct])=>`<div style="margin-bottom:16px;">
      <div style="display:flex;justify-content:space-between;gap:10px;font-size:13px;margin-bottom:6px;">
        <span style="font-weight:500;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;">${esc(name)}</span>

  const peak = seed.peak.map(([label,v])=>`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end;">
      <div style="width:100%;height:${v}%;border-radius:4px;background:${v>=90?'var(--accent)':v>=60?'#dca877':'#e6d3b4'};"></div>
      <div style="font-size:9.5px;color:var(--muted2);">${label}</div>

  const topWeek = seed.topWeek.map(([name,qty,rev],i)=>`<div style="display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px dotted var(--divider);">
      <span style="font-family:'Fraunces',serif;font-size:14px;color:var(--accent);width:20px;">${i+1}</span>
      <span style="flex:1;min-width:0;font-size:13.5px;font-weight:500;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(name)}</span>
      <span style="font-size:13px;color:var(--muted);white-space:nowrap;flex-shrink:0;">${qty} sold</span>
      <span style="font-family:'Fraunces',serif;font-size:14px;width:74px;text-align:right;color:var(--ink);">$${rev.toLocaleString()}</span>
    </div>`).join('');

  return `<div style="padding:26px 30px 60px;max-width:1180px;animation:fadeUp .35s ease;">
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:18px;">${kpis}</div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px 24px;margin-bottom:18px;">
      <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:22px;">

      <div style="display:flex;align-items:flex-end;gap:16px;height:200px;">${weekly}</div>
    </div>

/* ============================================================================
   ACTIONS
============================================================================ */
function advance(idx){
  const o = state.orders[idx]; if(!o) return;
  if(o.stage==='new'){ o.stage='cooking'; o.at=Date.now(); }
  else if(o.stage==='cooking'){ o.stage='ready'; }
  else { state.orders.splice(idx,1); }
  render();
}
function bump(d){
  const it = state.menu[state.sel.c].items[state.sel.i];
  it.price = Math.max(0, Math.round((it.price+d)*100)/100);
  render();
}
function toggleAvail(){
  const it = state.menu[state.sel.c].items[state.sel.i];
  it.avail = !it.avail;
  render();
}
// Update the settings message in place (NOT a full render) so the user's
// unsaved login/password input is never wiped on a validation error.
function setSettingsMsg(msg){
  state.setMsg = msg;
  const el = document.getElementById('set-msg');
  if(el){ el.textContent = msg; el.style.color = msg.indexOf('Saved')===0 ? 'var(--pos)' : msg.indexOf('Nothing')===0 ? 'var(--muted)' : 'var(--neg)'; }
}
// Move the active highlight within a segmented control in place (no re-render).
function updateSeg(act, cur){
  document.querySelectorAll('[data-act="'+act+'"]').forEach(b=>{
    const on = b.getAttribute('data-val')===cur;
    b.style.background = on ? 'var(--accent)' : 'var(--input)';
    b.style.color = on ? '#fff' : 'var(--muted)';
  });
}
function updateAccentSwatches(){
  const cur = state.prefs.accent || (state.session && cafe().accent);
  document.querySelectorAll('[data-act="setAccent"]').forEach(b=>{
    b.style.border = '2px solid '+(b.getAttribute('data-val')===cur ? 'var(--ink)' : 'transparent');
  });
}
function refreshKitchenIfVisible(){ const k=document.getElementById('kds-content'); if(k) k.innerHTML=kitchenContentHTML(); }
function updateAccount(){
  const newLogin = val('set-login').trim();
  const np = val('set-newpw');
  const cur = val('set-curpw');
  const changingLogin = newLogin && newLogin.toLowerCase()!==CREDS.login.toLowerCase();
  const changingPw = !!np;
  if(!changingLogin && !changingPw){ setSettingsMsg('Nothing to change.'); return; }
  // Current password required for ANY change (login or password) — mirrors the
  // single currentPassword gate the wired POST /auth/credentials will enforce.
  if(cur!==CREDS.password){ setSettingsMsg('Current password is incorrect.'); return; }
  if(changingPw && np.length<4){ setSettingsMsg('New password must be at least 4 characters.'); return; }
  if(changingPw) CREDS.password = np;
  if(changingLogin){
    CREDS.login = newLogin;
    if(state.session) state.session.login = newLogin;
    state.lastLogin = newLogin; // keep the sign-in screen's prefill in sync
  }
  persistCreds(); persistSession();
  setSettingsMsg('Saved.');
  const cp=document.getElementById('set-curpw'); if(cp) cp.value='';
  const npf=document.getElementById('set-newpw'); if(npf) npf.value='';
}

/* ============================================================================
   BOOT
============================================================================ */
function tick(){
  if(!state.session) return;
  const c = document.getElementById('clock'); if(c) c.textContent = clockStr();
  const k = document.getElementById('kds-content'); if(k) k.innerHTML = kitchenContentHTML();
}
function handle(act, ds){
  switch(act){
    case 'login': {
      const lg = val('li-login'), pw = val('li-pass');
      state.lastLogin = lg;
      if(checkLogin(lg,pw)) startSession();
      else { state.loginErr='Wrong login or password.'; render(); }
      break;
    }
    case 'nav': state.active=ds.screen; state.switcherOpen=false; render(); break;
    case 'goKitchen': state.active='kitchen'; render(); break;
    case 'advance': advance(+ds.idx); break;
    case 'menuSelect': state.sel={c:+ds.c,i:+ds.i}; render(); break;
    case 'priceUp': bump(0.5); break;
    case 'priceDown': bump(-0.5); break;
    case 'toggleAvail': toggleAvail(); break;
    case 'billSelect': state.billSel=+ds.idx; render(); break;
    case 'pay': state.paidSet.add(state.billSel); render(); break;
    case 'toggleSwitcher': state.switcherOpen=!state.switcherOpen; render(); break;
    case 'switchCafe':
      state.prefs.accent=null; persistPrefs();      // reset accent override to the new café's brand
      loadCafe(ds.slug); state.active='dashboard'; state.switcherOpen=false; render(); break;
    case 'openSettings': state.settingsOpen=true; state.setMsg=''; render(); break;
    case 'closeSettings': state.settingsOpen=false; state.setMsg=''; render(); break;
    // Display changes apply LIVE via CSS vars + in-place highlight — no full
    // render(), so unsaved Account inputs in the open modal are never wiped.
    case 'setAppearance': state.prefs.appearance=ds.val; persistPrefs(); applyTheme(); updateSeg('setAppearance', ds.val); refreshKitchenIfVisible(); break;
    case 'setAccent': state.prefs.accent=ds.val; persistPrefs(); applyTheme(); updateAccentSwatches(); refreshKitchenIfVisible(); break;
    case 'setDensity': state.prefs.density=ds.val; persistPrefs(); applyTheme(); updateSeg('setDensity', ds.val); break;
    case 'updateAccount': updateAccount(); break;
    case 'signOut': signOut(); break;
    case 'stub': case 'saveStub': break; // intentionally unwired (matches handoff)
  }
}
function boot(){
  const p = load(LS.prefs); if(p) state.prefs = { appearance:p.appearance||'Light', accent:p.accent||null, density:p.density||'Standard' };
  const cr = load(LS.creds); if(cr && cr.login && cr.password) CREDS = { login:cr.login, password:cr.password };
  const s = load(LS.session);
  if(s && s.exp>Date.now() && CAFES[s.cafeSlug] && s.login && s.login.toLowerCase()===CREDS.login.toLowerCase()){
    state.session = s; loadCafeData(s.cafeSlug);
    state.lastLogin = s.login;
  } else {
    state.lastLogin = CREDS.login;
  }

  const root = document.getElementById('root');
  root.addEventListener('click', e=>{
    const el = e.target.closest('[data-act]');
    if(!el) return;
    const act = el.getAttribute('data-act');
    if(act==='login') return; // login goes through submit
    handle(act, el.dataset);
  });
  root.addEventListener('submit', e=>{
    const f = e.target.closest('form[data-act]');
    if(!f) return;
    e.preventDefault();
    handle(f.getAttribute('data-act'), f.dataset);
  });

  render();
  setInterval(tick, 1000);
}
boot();
</script>
