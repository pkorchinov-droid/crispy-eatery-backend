<style>
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{font-family:'Inter Tight',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg,#1a1510);color:var(--ink,#f4ede0);-webkit-font-smoothing:antialiased;transition:background .2s ease;}
  input{font-family:inherit;}
  ::-webkit-scrollbar{width:10px;height:10px;}
  ::-webkit-scrollbar-thumb{background:rgba(127,110,90,.3);border-radius:8px;border:2px solid transparent;background-clip:padding-box;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}
  @keyframes fadeUp{from{transform:translateY(8px);}to{transform:none;}}
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}
  @keyframes spin{to{transform:rotate(360deg);}}
  #toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);z-index:60;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none;}
  .toast{padding:11px 18px;border-radius:50px;font-size:13.5px;font-weight:600;box-shadow:0 14px 30px -12px rgba(0,0,0,.5);animation:fadeUp .2s ease;max-width:80vw;}
  .toast.ok{background:#2b1f17;color:#f4ede0;}
  .toast.err{background:#a84a2e;color:#fff;}
  .toast.info{background:#4a3a2c;color:#f4ede0;}
  .spin{display:inline-block;width:16px;height:16px;border:2px solid currentColor;border-right-color:transparent;border-radius:50%;animation:spin .7s linear infinite;}
  /* ── layout hooks for responsive overrides ── */
  .app-shell{display:flex;height:100vh;width:100%;overflow:hidden;}
  .app-sidebar{width:248px;flex-shrink:0;}
  .app-header{padding:18px 30px;}
  .app-body{flex:1;min-height:0;overflow-y:auto;}
  .bottom-nav{display:none;}
  .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
  .split-grid{display:grid;gap:18px;}
  @keyframes ringpulse{0%,100%{box-shadow:0 0 0 0 rgba(255,90,60,.55);}50%{box-shadow:0 0 0 6px rgba(255,90,60,0);}}
  @media (max-width:768px){
    .app-sidebar{display:none !important;}
    .app-header{padding:14px 16px;}
    .app-body{padding-bottom:68px;}        /* clear the fixed bottom nav */
    .pad-screen{padding:18px 16px 40px !important;}
    .kpi-grid{grid-template-columns:1fr 1fr;}
    .split-grid{grid-template-columns:1fr !important;}
    .bottom-nav{display:flex;position:fixed;left:0;right:0;bottom:0;z-index:40;
      background:#2b1f17;border-top:1px solid #3f3025;padding:6px 4px;
      padding-bottom:calc(6px + env(safe-area-inset-bottom));}
    .menu-split{flex-direction:column !important;}
    .menu-aside{width:100% !important;border-left:none !important;border-top:1px solid var(--border);}
    .menu-grid{grid-template-columns:1fr !important;}
    .bill-split{flex-direction:column !important;align-items:stretch !important;gap:18px !important;padding:18px 16px 40px !important;}
    .bill-split > div{width:100% !important;max-width:480px;margin-left:auto;margin-right:auto;}
  }
</style>

<script>
"use strict";
/* ============================================================================
   Crispy Ops Console — unified staff app (Dashboard, Kitchen KDS, Reports, Menu,
   Billing) behind one login. Wired to the real backend (same-origin, /console).
   Auth: POST /auth/login → session (Bearer). /me → branding + cafes[]. Data:
   /orders, /reports/{today,week}, /menu?raw=1 + PATCH writes. Printing: ePOS to
   the tenant's station printers (from /menu printerStations), gated on features.
   Spec: docs/superpowers/specs/2026-06-18-crispy-ops-console-design.md
============================================================================ */

/* ───────── theme: named accent palettes + appearance themes ───────── */
const ACCENTS = {
  Terracotta: { a:'#c25a3a', d:'#a84a2e', l:'#e2a472', tint:'#fff4ec', tintDark:'#3a2318' },
  Slate:      { a:'#4f6d8c', d:'#3a5572', l:'#88a6c2', tint:'#eef2f6', tintDark:'#22303d' },
  Forest:     { a:'#3f7a52', d:'#2f5e3e', l:'#83b693', tint:'#eef5ef', tintDark:'#203a2b' },
  Plum:       { a:'#8a4f7e', d:'#6d3c63', l:'#c08fb5', tint:'#f7eef5', tintDark:'#352433' },
};
const KDS = {
  Midnight: { bg:'#1a1510', panel:'#2a2318', line:'#3d3428', ink:'#f4ede0', muted:'#d8c9a8', accent:'#e8c477' },
  Charcoal: { bg:'#16181c', panel:'#21242b', line:'#363b45', ink:'#eef1f5', muted:'#9aa3b0', accent:'#e8c477' },
  Daylight: { bg:'#e7ddcb', panel:'#fbf6ec', line:'#ddd0b6', ink:'#2b1f17', muted:'#8a7558', accent:'#b9852f' },
};
const APPEARANCE = {
  Light:    { bg:'#ebe2d2', surface:'#fbf6ec', surface2:'#f4ede0', border:'#e6dcc7', topbarLine:'#e0d4bd', ink:'#2b1f17', muted:'#8a7558', muted2:'#a8997f', track:'#ece1cd', divider:'#e2d6bf', input:'#ffffff', btnBg:'#2b1f17', btnFg:'#f4ede0', phone:'#2b1f17', pos:'#5a6340', neg:'#a84a2e', kds:'Daylight' },
  Dark:     { bg:'#1a1510', surface:'#2a2318', surface2:'#221c14', border:'#3d3428', topbarLine:'#3d3428', ink:'#f4ede0', muted:'#d8c9a8', muted2:'#b6a489', track:'#322a1e', divider:'#3d3428', input:'#211b14', btnBg:'#f4ede0', btnFg:'#2a2318', phone:'#0d0a07', pos:'#8fb36a', neg:'#e0875f', kds:'Midnight' },
  Charcoal: { bg:'#16181c', surface:'#21242b', surface2:'#1c1f25', border:'#363b45', topbarLine:'#363b45', ink:'#eef1f5', muted:'#9aa3b0', muted2:'#79828f', track:'#2b2f37', divider:'#2b2f37', input:'#262a31', btnBg:'#eef1f5', btnFg:'#21242b', phone:'#0c0d10', pos:'#8fb36a', neg:'#e0875f', kds:'Charcoal' },
};
const DENSITY = { Dense:0.85, Standard:1, Spacious:1.18 };

/* ───────── hex helpers (derive accent shades from a café's themeColor) ───── */
function hex2rgb(h){ h=String(h||'#c25a3a').replace('#',''); if(h.length===3) h=h.split('').map(c=>c+c).join(''); const n=parseInt(h,16)||0; return [(n>>16)&255,(n>>8)&255,n&255]; }
function rgb2hex(r,g,b){ return '#'+[r,g,b].map(x=>Math.max(0,Math.min(255,Math.round(x))).toString(16).padStart(2,'0')).join(''); }
function mixHex(hex,target,amt){ const a=hex2rgb(hex),b=hex2rgb(target); return rgb2hex(a[0]+(b[0]-a[0])*amt,a[1]+(b[1]-a[1])*amt,a[2]+(b[2]-a[2])*amt); }
function accentFromHex(hex){ return { a:hex, d:mixHex(hex,'#000000',0.24), l:mixHex(hex,'#ffffff',0.38), tint:mixHex(hex,'#ffffff',0.88), tintDark:mixHex(hex,'#000000',0.78) }; }

/* ───────── persistence (prefs + session) ───────── */
const LS = { session:'cmc_session', prefs:'cmc_prefs', last:'cmc_lastlogin' };
let SESSION = '';

/* ───────── new-order sound alert (Web Audio, no files) ───────── */
let _audioCtx = null, _alertTimer = null;
function unlockAudio(){
  try { if(!_audioCtx) _audioCtx = new (window.AudioContext||window.webkitAudioContext)(); if(_audioCtx.state==='suspended') _audioCtx.resume(); } catch(e){}
}
function playChimeOnce(){
  if(!_audioCtx) return;
  const ctx = _audioCtx; const now = ctx.currentTime;
  [[880,0],[660,0.22]].forEach(function(pair){
    const osc = ctx.createOscillator(); const g = ctx.createGain();
    osc.type='square'; osc.frequency.value=pair[0];
    osc.connect(g); g.connect(ctx.destination);
    const t = now + pair[1];
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.5, t+0.03);
    g.gain.exponentialRampToValueAtTime(0.0001, t+0.2);
    osc.start(t); osc.stop(t+0.22);
  });
}
function startAlert(){
  if(state.alerting) return;
  state.alerting = true;
  unlockAudio();
  (function loop(){
    if(!state.alerting){ _alertTimer=null; return; }
    playChimeOnce();
    _alertTimer = setTimeout(loop, 1800);
  })();
  // Reflect the ringing state without tearing down a modal that has live inputs
  // (Settings / tender / Import) — a background poll must not wipe what the user
  // is typing. The chime/loop above is unaffected; only the repaint is gated.
  if(state.active==='kitchen') refreshKitchenInPlace();
  else if(!(state.settingsOpen||state.tender||state.importOpen)) render();
}
function stopAlert(){
  state.alerting = false;
  if(_alertTimer){ clearTimeout(_alertTimer); _alertTimer=null; }
}
function checkNewOrderAlert(){
  const hasNew = (state.orders||[]).some(function(o){ return o.status==='received'; });
  if(hasNew && !state.alerting) startAlert();
  else if(!hasNew && state.alerting) stopAlert();
}
function lsSet(k,v){ try{ localStorage.setItem(k, typeof v==='string'?v:JSON.stringify(v)); }catch(e){} }
function lsGet(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } }
function lsJSON(k){ try{ const v=localStorage.getItem(k); return v?JSON.parse(v):null; }catch(e){ return null; } }

/* ───────── state ───────── */
const state = {
  ready:false, me:null, cafe:null, cafes:[], activeSlug:'',
  orders:[], menu:null, reportsToday:null, reportsYesterday:null, reportsWeek:null,
  customers: [], custByEmail: {},
  rep:null, fee:null,   // reports: custom sales range + monthly dev-fee chart range (lazy-init)
  active:'dashboard', sel:{cat:0,item:0}, billSel:0, alerting:false,
  prefs:{ appearance:'Dark', accent:null, density:'Standard' },
  switcherOpen:false, settingsOpen:false, tender:null, importOpen:false,
  loginErr:'', lastLogin:'', setMsg:'',
  loading:{ orders:false, menu:false, reports:false },
  err:{},
};

/* ───────── API ───────── */
function enc(s){ return encodeURIComponent(String(s)); }
async function api(path, opts){
  opts = opts || {};
  const headers = Object.assign({}, opts.headers || {});
  if (SESSION) headers['Authorization'] = 'Bearer ' + SESSION;
  let body = opts.body;
  if (body && typeof body !== 'string'){ headers['Content-Type'] = 'application/json'; body = JSON.stringify(body); }
  const r = await fetch(path, { method: opts.method || 'GET', headers, body });
  const txt = await r.text();
  let data = null; try { data = txt ? JSON.parse(txt) : null; } catch(e){ data = { error: txt }; }
  if (!r.ok){
    // Central recovery: a mid-session 401 (expired/revoked token) drops us back to
    // the login screen instead of leaving a dead shell. Skip for the login call itself.
    if (r.status===401 && SESSION && path.indexOf('/auth/login')<0){
      SESSION=''; lsSet(LS.session,''); state.me=null; state.settingsOpen=false; state.tender=null;
      stopAlert();
      try { render(); } catch(e){}
    }
    const e = new Error((data && data.error) || ('HTTP ' + r.status)); e.status = r.status; e.data = data; throw e;
  }
  return data;
}

/* ───────── toast ───────── */
let _toastT = null;
function toast(msg, kind){
  const box = document.getElementById('toast'); if(!box) return;
  box.innerHTML = '<div class="toast '+(kind||'info')+'">'+esc(msg)+'</div>';
  if(_toastT) clearTimeout(_toastT);
  _toastT = setTimeout(()=>{ box.innerHTML=''; }, kind==='err'?6000:2600);
}

/* ───────── helpers ───────── */
function cfg(){ return (state.cafe && state.cafe.config) || {}; }
// /me's cafe.config omits hours/address; /menu carries them — prefer that, fall back to cfg.
function cafeHours(){ return (state.menu && state.menu.hours) || cfg().hours || {}; }
function cafeAddress(){ return (state.menu && state.menu.address) || cfg().address || ''; }
function gstRate(){ const r = cfg().gstRate; return typeof r==='number' ? r : 0.15; }
function cur(){ return cfg().currency || '$'; }
function money(n){ return cur() + (Number(n)||0).toFixed(2); }
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function val(id){ const el=document.getElementById(id); return el?el.value:''; }
function clockStr(){ return new Date().toLocaleTimeString('en-NZ',{hour:'2-digit',minute:'2-digit',hour12:false}); }
function initialsOf(name){ return String(name||'?').split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase(); }
function elapMin(iso){ return Math.max(0, Math.floor((Date.now()-new Date(iso).getTime())/60000)); }
function orderWhere(o){ return isPickupOrder(o) ? ('Pickup · '+(o.customerName||'')) : ('Table '+(o.tableNumber||'?')); }
function phoneLine(o, color){
  const p = o && o.phoneNumber ? String(o.phoneNumber).trim() : '';
  if(!p) return '';
  const c = color || 'var(--muted2)';
  return '<a href="tel:'+esc(p.replace(/[^+\d]/g,''))+'" style="font-size:11.5px;color:'+c+';text-decoration:none;white-space:nowrap;">\u{1F4DE} '+esc(p)+'</a>';
}
function markOf(name){ return (String(name||'?').trim()[0]||'?').toUpperCase(); }
// Dish photos: a stored imgUrl wins; otherwise use the café's customer app bundle
// (<customer-origin>/images/<img or id>.jpg) — same source the customer menu uses.
function imgBase(){
  try { const u = state.me && state.me.cafe && state.me.cafe.customerUrl; return u ? (new URL(u).origin + '/images/') : ''; }
  catch(e){ return ''; }
}
function imageFor(it){ if(!it) return ''; if(it.imgUrl) return it.imgUrl; const b=imgBase(); return b ? (b + (it.img || (it.id + '.jpg'))) : ''; }
// Photo overlaid on a placeholder tile; if the image 404s, it removes itself → placeholder shows.
function imgOverlay(it){ const s=imageFor(it); return s ? '<img src="'+esc(s)+'" loading="lazy" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;" onerror="this.remove()">' : ''; }

function ic(paths, sw, size){
  const ps = (Array.isArray(paths)?paths:[paths]).map(d=>'<path d="'+d+'"/>').join('');
  return '<svg width="'+(size||19)+'" height="'+(size||19)+'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="'+(sw||1.7)+'" stroke-linecap="round" stroke-linejoin="round">'+ps+'</svg>';
}
function icPlate(size, sw){ return '<svg width="'+(size||19)+'" height="'+(size||19)+'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="'+(sw||1.2)+'"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4.4"/></svg>'; }
const ICON = {
  gear:['M12 9a3 3 0 1 0 0 6 3 3 0 0 0 0-6z','M19 12a7 7 0 0 0-.1-1.2l2-1.6-2-3.4-2.4 1a7 7 0 0 0-2-1.2L14 2h-4l-.5 2.6a7 7 0 0 0-2 1.2l-2.4-1-2 3.4 2 1.6A7 7 0 0 0 5 12a7 7 0 0 0 .1 1.2l-2 1.6 2 3.4 2.4-1a7 7 0 0 0 2 1.2L10 22h4l.5-2.6a7 7 0 0 0 2-1.2l2.4 1 2-3.4-2-1.6c.06-.4.1-.8.1-1.2z'],
  chevron:['M6 9l6 6 6-6'], check:['M5 12l5 5L20 7'],
  print:['M6 9V2h12v7','M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2','M6 14h12v8H6z'],
  receipt:['M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1-2-1z','M8 7h8','M8 11h8','M8 15h5'],
};
const NAV = [
  { id:'dashboard', label:'Dashboard', d:['M3 3h7v7H3z','M14 3h7v7h-7z','M14 14h7v7h-7z','M3 14h7v7H3z'] },
  { id:'kitchen', label:'Kitchen', d:['M12 2c1.4 2.4 1 4-.2 5.2C10.8 8.4 10 9.6 10 11a2 2 0 0 0 4 0c0-.6-.2-1-.4-1.4 1.8 1 3 2.8 3 5a4.6 4.6 0 0 1-9.2 0c0-3.4 2.4-5 3.8-7.4C12 5.6 12.4 3.8 12 2z'] },
  { id:'reports', label:'Reports', d:['M3 3v18h18','M7 14l3-3 3 3 5-7'] },
  { id:'menu', label:'Menu', d:['M6 3v18','M6 8c2.4 0 2.4-5 0-5','M18 3c-1.8 0-3 2-3 5s1.2 4 3 4','M18 12v9'] },
  { id:'billing', label:'Billing', d:['M5 3h14v18l-3-2-2 2-2-2-2 2-2-2-3 2z','M9 8h6','M9 12h6','M9 16h4'] },
  { id:'customers', label:'Regulars', d:['M9 11a3 3 0 1 0 0-6 3 3 0 0 0 0 6z','M3 20a6 6 0 0 1 12 0','M16 3.5a3 3 0 0 1 0 5.8','M21 20a6 6 0 0 0-4-5.6'] },
];

/* ───────── theme application ───────── */
function accentObj(){
  if (state.prefs.accent && ACCENTS[state.prefs.accent]) return ACCENTS[state.prefs.accent];
  const tc = cfg().themeColor;
  if (tc) return accentFromHex(tc);
  return ACCENTS.Terracotta;
}
function appearanceObj(){ return APPEARANCE[state.prefs.appearance] || APPEARANCE.Dark; }
function kdsPalette(){ return KDS[appearanceObj().kds] || KDS.Midnight; }
function applyTheme(){
  const r = document.documentElement.style;
  const AC = state.me ? accentObj() : ACCENTS.Terracotta;
  const T = appearanceObj(); const K = kdsPalette();
  const lightMode = (state.prefs.appearance||'Light')==='Light';
  r.setProperty('--accent',AC.a); r.setProperty('--accent-d',AC.d); r.setProperty('--accent-l',AC.l);
  r.setProperty('--accent-tint', lightMode ? AC.tint : (AC.tintDark||AC.tint));
  r.setProperty('--bg',T.bg); r.setProperty('--surface',T.surface); r.setProperty('--surface2',T.surface2);
  r.setProperty('--border',T.border); r.setProperty('--topbar-line',T.topbarLine);
  r.setProperty('--ink',T.ink); r.setProperty('--muted',T.muted); r.setProperty('--muted2',T.muted2);
  r.setProperty('--track',T.track); r.setProperty('--divider',T.divider); r.setProperty('--input',T.input);
  r.setProperty('--btn-bg',T.btnBg); r.setProperty('--btn-fg',T.btnFg); r.setProperty('--phone',T.phone);
  r.setProperty('--pos',T.pos); r.setProperty('--neg',T.neg);
  r.setProperty('--kds-bg',K.bg); r.setProperty('--kds-panel',K.panel); r.setProperty('--kds-line',K.line);
  r.setProperty('--kds-ink',K.ink); r.setProperty('--kds-muted',K.muted); r.setProperty('--kds-accent',K.accent);
  r.setProperty('--density', String(DENSITY[state.prefs.density]||1));
}

/* ════════════════════════════════════════════════════════════════════════
   PRINTING — ported from the live dashboard (index-full-workflow.html).
   ePOS-Print over HTTPS to the tenant's station printers. Config from /menu.
═══════════════════════════════════════════════════════════════════════════ */
const PRINT_LINE_WIDTH = 42;
let PRINTING_ENABLED = false;
let TENANT_PRINTER_IPS = {};
let TENANT_GST_RATE = 0.15, TENANT_CURRENCY = '$', TENANT_DEV_FEE_LABEL = 'Developer fee';

function printerHelp(ip){ return 'Could not reach the printer at https://'+ip+'. Check it is on the café WiFi, its certificate is trusted on this iPad, and the IP is right.'; }
const printStatusById = {};   // orderId -> 'printing' | 'printed' | 'failed' (session-only)
function buildPrintJobs(order){
  const items = order.items||[];
  const kIp=getStation('food'), bIp=getStation('drinks'), fIp=getStation('expo');
  if(!kIp && !bIp && !fIp) return [];
  if(!bIp && kIp){ return [{label:'kitchen',ip:kIp,xml:buildStationTicketXml(order,items,'ORDER')}]; }
  const food=items.filter(function(i){ return !isDrinkItem(i); });
  const drinks=items.filter(function(i){ return isDrinkItem(i); });
  const jobs=[];
  if(food.length&&kIp) jobs.push({label:'kitchen',ip:kIp,xml:buildStationTicketXml(order,food,'KITCHEN')});
  if(drinks.length&&bIp) jobs.push({label:'barista',ip:bIp,xml:buildStationTicketXml(order,drinks,'BARISTA')});
  if(fIp&&items.length) jobs.push({label:'full',ip:fIp,xml:buildStationTicketXml(order,items,'FULL ORDER')});
  return jobs;
}
function runPrintJobs(jobs){
  return Promise.all(jobs.map(function(j){ return sendEpos(j.xml,j.ip).then(function(res){ return {j:j,ok:res.ok,reason:res.reason}; }).catch(function(){ return {j:j,ok:false,reason:'unreachable'}; }); }));
}
function printTicket(orderId){
  if(!PRINTING_ENABLED){ toast('Printing is off for this café','err'); return; }
  var order=state.orders.find(function(o){ return o.id===orderId; }); if(!order){ toast('Order not found','err'); return; }
  var jobs=buildPrintJobs(order);
  if(!jobs.length){ toast('No station printers configured','err'); return; }
  toast('Printing '+order.id+'…');
  runPrintJobs(jobs).then(function(rs){
    var ok=rs.filter(function(r){ return r.ok; }).map(function(r){ return r.j.label; });
    var bad=rs.filter(function(r){ return !r.ok; });
    printStatusById[order.id]= bad.length?'failed':'printed';
    if(!bad.length) toast('🖨 '+order.id+' → '+ok.join(' + '),'ok');
    else toast((ok.length?ok.join(' + ')+' OK; ':'')+bad[0].j.label+' FAILED ('+bad[0].j.ip+')','err');
    if(state.active==='kitchen') refreshKitchenInPlace();
  });
}
function autoPrintOrder(order){
  if(!PRINTING_ENABLED || !order) return;
  var jobs=buildPrintJobs(order);
  if(!jobs.length) return;                 // no printers configured → no status shown
  printStatusById[order.id]='printing';
  if(state.active==='kitchen') refreshKitchenInPlace();
  runPrintJobs(jobs).then(function(rs){
    var bad=rs.filter(function(r){ return !r.ok; });
    printStatusById[order.id]= bad.length?'failed':'printed';
    if(bad.length) toast(order.id+' print failed — '+bad[0].j.label,'err');
    if(state.active==='kitchen') refreshKitchenInPlace();
  });
}
function printReceipt(orderId){
  if(!PRINTING_ENABLED){ toast('Printing is off for this café','err'); return; }
  var order=state.orders.find(function(o){ return o.id===orderId; }); if(!order){ toast('Order not found','err'); return; }
  var rIp=getStation('receipt'); if(!rIp){ toast('No receipt printer configured','err'); return; }
  toast('Printing receipt '+order.id+'…');
  sendEpos(buildReceiptXml(order),rIp).then(function(res){ toast(res.ok?'🧾 Receipt printed '+order.id:'Print failed — '+res.reason,res.ok?'ok':'err'); }).catch(function(){ toast(printerHelp(rIp),'err'); });
}

async function loadMe(){
  const me = await api('/me');
  state.me = me;
  state.cafes = me.cafes || [];
  state.activeSlug = (me.cafe && me.cafe.slug) || (me.cafes && me.cafes[0] && me.cafes[0].slug) || '';
  state.cafe = me.cafe || null;
  state.prefs.accent = null; // café brand drives accent
}
async function loadMenu(){
  state.loading.menu = true;
  try {
    const m = await api('/menu?raw=1');
    state.menu = m;
    applyMenuToPrintConfig(m);
    state.err.menu = null;
  } catch(e){ state.err.menu = e.message; }
  state.loading.menu = false;
}
async function loadOrders(){
  try {
    const d = await api('/orders'); state.orders = (d && d.orders) || []; state.err.orders = null;
    // Prune session-only print status for orders that have left the board by any
    // path (served here, advanced elsewhere, or deleted) — keep the map bounded.
    const live = {}; state.orders.forEach(function(o){ live[o.id]=1; });
    Object.keys(printStatusById).forEach(function(id){ if(!live[id]) delete printStatusById[id]; });
  }
  catch(e){ state.err.orders = e.message; }
}
async function loadCustomers(){
  try {
    const d = await api('/customers');
    state.customers = (d && d.customers) || [];
    state.custByEmail = {};
    state.customers.forEach(function(c){ state.custByEmail[c.email] = c; });
  } catch(e){ /* non-fatal */ }
}
async function loadReportsToday(){ try { state.reportsToday = await api('/reports/today'); state.err.reports=null; } catch(e){ state.err.reports = e.message; } }
async function loadReportsYesterday(){ try { state.reportsYesterday = await api('/reports/yesterday'); } catch(e){ state.reportsYesterday = null; } }
async function loadReportsWeek(){ try { state.reportsWeek = await api('/reports/week'); state.err.reports=null; } catch(e){ state.err.reports = e.message; } }

// Load whatever the active screen needs, then render.
async function refreshActive(initial){
  const A = state.active;
  const jobs = [];
  if (A==='dashboard'){ jobs.push(loadOrders(), loadReportsToday(), loadReportsYesterday()); }
  else if (A==='kitchen' || A==='billing'){ jobs.push(loadOrders()); if (A==='billing') jobs.push(loadCustomers()); }
  else if (A==='customers'){ jobs.push(loadCustomers()); if(!state.menu) jobs.push(loadMenu()); }
  else if (A==='reports'){ jobs.push(loadReportsWeek(), loadOrders()); if(!state.menu) jobs.push(loadMenu()); }
  else if (A==='menu'){ jobs.push(loadMenu()); } // reload each entry → unsaved local edits discarded
  await Promise.all(jobs);
  render();
}

async function doLogin(login, password){
  const d = await api('/auth/login', { method:'POST', body:{ login, password } });
  SESSION = d.session; lsSet(LS.session, SESSION); lsSet(LS.last, login);
  await afterAuth();
}
async function afterAuth(){
  await loadMe();
  await loadMenu();              // needed for print config + menu screen + category map
  state.active = 'dashboard';
  state.loginErr=''; state.switcherOpen=false; state.settingsOpen=false;
  await refreshActive(true);
}
function logout(){
  SESSION=''; lsSet(LS.session,'');
  stopAlert();
  state.me=null; state.cafe=null; state.cafes=[]; state.orders=[]; state.menu=null;
  state.reportsToday=null; state.reportsWeek=null; state.settingsOpen=false; state.switcherOpen=false;
  render();
}
async function switchCafe(slug){
  try {
    const d = await api('/auth/switch', { method:'POST', body:{ slug } });
    SESSION = d.session; lsSet(LS.session, SESSION);
    state.switcherOpen=false; state.menu=null;
    await loadMe(); await loadMenu();
    state.active='dashboard';
    await refreshActive(true);
    toast('Switched to '+(state.cafe&&state.cafe.name||slug),'ok');
  } catch(e){ toast(e.message,'err'); }
}

/* ════════════════════════════════════════════════════════════════════════
   SCREENS (real data)
═══════════════════════════════════════════════════════════════════════════ */
const OPEN_STATUSES = { received:1, preparing:1, ready:1 };
function activeTickets(){ return (state.orders||[]).filter(function(o){ return OPEN_STATUSES[o.status]; }); }
function hasTag(it, tag){ return Array.isArray(it.tags) && it.tags.indexOf(tag)>=0; }
function menuCategoriesOrdered(){
  const m = state.menu; if(!m||!m.categories) return [];
  const order = m.categoryOrder && m.categoryOrder.length ? m.categoryOrder : Object.keys(m.categories);
  const real = order.filter(function(k){ return m.categories[k]; }).map(function(k){ return { key:k, label:(m.categories[k].label)||prettyCat(k), items:(m.categories[k].items||[]) }; });
  const newItems = real.reduce(function(acc,c){ return acc.concat((c.items||[]).filter(function(it){ return hasTag(it,'new'); })); }, []);
  if(newItems.length){ return [{ key:'new-items', label:'New on the Menu', items:newItems, virtual:true }].concat(real); }
  return real;
}
function menuItemCount(){ return menuCategoriesOrdered().filter(function(c){ return !c.virtual; }).reduce(function(s,c){ return s+c.items.length; },0); }
function prettyCat(k){ return String(k||'').replace(/-/g,' ').replace(/\b\w/g,function(c){ return c.toUpperCase(); }); }
function itemPrice(it){ if(typeof it.price==='number') return it.price; if(it.sizes){ const vs=Object.values(it.sizes).map(Number).filter(function(x){return !isNaN(x);}); if(vs.length) return Math.min.apply(null,vs); } return 0; }
function itemPriceLabel(it){ if(typeof it.price==='number') return money(it.price); if(it.sizes){ const vs=Object.values(it.sizes).map(Number).filter(function(x){return !isNaN(x);}); if(vs.length) return 'from '+money(Math.min.apply(null,vs)); } return '—'; }
function statusPill(status){
  const map = { received:['New','#c78a3a','rgba(199,138,58,.16)'], preparing:['Cooking','var(--accent)','rgba(194,90,58,.16)'], ready:['Ready','var(--pos)','rgba(90,99,64,.18)'], picked_up:['Served','var(--muted)','rgba(140,120,100,.16)'], done:['Done','var(--muted)','rgba(140,120,100,.16)'] };
  return map[status] || ['—','var(--muted)','rgba(140,120,100,.16)'];
}

function deltaBadge(today, yest){
  if(yest==null || !isFinite(yest) || yest===0 || today==null) return '';
  const pct = Math.round((today - yest) / yest * 100);
  if(pct===0) return '<div style="font-size:11px;color:var(--muted2);margin-top:3px;">= vs yesterday</div>';
  const up = pct>0;
  return '<div style="font-size:11px;font-weight:600;margin-top:3px;color:'+(up?'var(--pos)':'var(--neg)')+';">'+(up?'↑ ':'↓ ')+Math.abs(pct)+'% vs yesterday</div>';
}
function dashboardHTML(){
  const rt = state.reportsToday;
  if (!rt && state.loading.reports!==false) { /* fallthrough renders below */ }
  const ry = state.reportsYesterday;
  // Day-scoped tender split from /reports/today (NOT state.orders, which is the
  // unbounded store — it would mix prior days under a "today" header).
  const pmToday = (rt && rt.paymentMethods) || null;
  const cashN = pmToday ? (pmToday.cash||0) : 0;
  const cardN = pmToday ? (pmToday.card||0) : 0;
  const devFeeLine = (rt && rt.developerFeeTotal!=null) ? '<div style="font-size:11.5px;font-weight:600;color:var(--accent);margin-top:6px;">'+money(rt.developerFeeTotal)+' developer fee</div>' : '';
  const kpis = [
    { label:'Sales today', value: rt?money(rt.totalRevenue):'—', foot:(rt?rt.totalOrders:0)+' orders', delta: rt&&ry?deltaBadge(rt.totalRevenue, ry.totalRevenue):'', extra: devFeeLine },
    { label:'Orders', value: rt?String(rt.totalOrders):'—', foot:'today', delta: rt&&ry?deltaBadge(rt.totalOrders, ry.totalOrders):'' },
    { label:'Avg ticket', value: rt?money(rt.avgOrder):'—', foot:'per order', delta: rt&&ry?deltaBadge(rt.avgOrder, ry.avgOrder):'' },
    { label:'Payments', value: (cashN+cardN)?String(cashN+cardN):'—', foot:'Cash '+cashN+' · Card '+cardN, delta:'' },
  ].map(function(k){ return '<div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 18px 16px;box-shadow:0 14px 30px -22px rgba(0,0,0,.4);"><div style="font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);">'+k.label+'</div><div style="font-family:\'Fraunces\',serif;font-size:33px;font-weight:500;margin-top:12px;line-height:1;color:var(--ink);">'+k.value+'</div><div style="font-size:11.5px;color:var(--muted2);margin-top:7px;">'+esc(k.foot)+'</div>'+k.delta+(k.extra||'')+'</div>'; }).join('');

  const open = activeTickets().slice(0,6);
  const recent = open.length ? open.map(function(o){
    const sp = statusPill(o.status);
    const summary = (o.items||[]).map(function(i){ return (i.qty||1)+'× '+i.name; }).join(', ');
    return '<div style="display:flex;align-items:center;gap:14px;padding:13px 0;border-bottom:1px dotted var(--divider);"><div style="font-family:\'Fraunces\',serif;font-size:15px;color:var(--muted);width:46px;">'+esc(o.id)+'</div><div style="flex:1;min-width:0;"><div style="font-size:14px;font-weight:500;color:var(--ink);">'+esc(orderWhere(o))+'</div><div style="font-size:12px;color:var(--muted2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+esc(summary)+'</div>'+(o.phoneNumber?'<div style="margin-top:2px;">'+phoneLine(o)+'</div>':'')+'</div><div style="font-family:\'Fraunces\',serif;font-size:14px;color:var(--ink);">'+money(o.total)+'</div><span style="font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;background:'+sp[2]+';color:'+sp[1]+';">'+sp[0]+'</span></div>';
  }).join('') : '<div style="padding:24px 0;text-align:center;color:var(--muted2);font-size:13px;">No open orders right now.</div>';

  const items = (rt && rt.itemsSold) || [];
  const tmax = Math.max.apply(null, items.slice(0,5).map(function(t){ return t.qty; }).concat([1]));

function openHourWindow(){
  const h = cafeHours();

  let o = hr(h.open), c = hr(h.close);
  if(o==null) o=7; if(c==null) c=20; if(c<o) c=20;
  const arr=[]; for(let x=o;x<=c;x++) arr.push(x); return arr;
}
function hourlyBars(hourly, hoursWindow){
  const byHour = {}; (hourly||[]).forEach(function(h){ byHour[h.hour]=h; });

}

/* ── Reports: custom sales range + monthly developer-fee chart ──
   All client-side from state.orders (the full /orders history, refreshed every
   poll). No backend change — each order already carries developerFee + total. */
function rPad2(n){ return String(n).padStart(2,'0'); }
function rIsoDate(d){ return d.getFullYear()+'-'+rPad2(d.getMonth()+1)+'-'+rPad2(d.getDate()); }
function rIsoDT(d){ return rIsoDate(d)+'T'+rPad2(d.getHours())+':'+rPad2(d.getMinutes()); }
function rMonday(d){ var x=new Date(d.getFullYear(),d.getMonth(),d.getDate()); var k=(x.getDay()+6)%7; x.setDate(x.getDate()-k); x.setHours(0,0,0,0); return x; }
function rEod(d){ return new Date(d.getFullYear(),d.getMonth(),d.getDate(),23,59,59); }
function rMonShort(y,m){ return new Date(y,m,1).toLocaleDateString('en-NZ',{month:'short',year:'2-digit'}); }
function rScheme(){ return (state.prefs && state.prefs.appearance==='Light') ? 'light' : 'dark'; }
function ensureRanges(){
  if(!state.rep){ var n=new Date(); state.rep={ from:rIsoDT(rMonday(n)), to:rIsoDT(n), quick:'this-week' }; }
  if(!state.fee){ var m=new Date(); state.fee={ from:rIsoDate(new Date(m.getFullYear(),m.getMonth()-5,1)), to:rIsoDate(m), quick:6 }; }
}
function ordersInRange(fromStr,toStr){
  var f=fromStr?new Date(fromStr).getTime():-Infinity, t=toStr?new Date(toStr).getTime():Infinity;
  if(isNaN(f))f=-Infinity; if(isNaN(t))t=Infinity;
  return (state.orders||[]).filter(function(o){ var x=new Date(o.createdAt).getTime(); return !isNaN(x)&&x>=f&&x<=t; });
}
function rangeStats(list){
  var rev=0,fee=0,paid=0;
  list.forEach(function(o){ rev+=Number(o.total)||0; fee+=Number(o.developerFee)||0; if((o.paymentStatus||'')==='paid')paid++; });
  return { count:list.length, rev:rev, fee:fee, paid:paid, avg:list.length?rev/list.length:0 };
}
// Day axis for the range chart: fill every calendar day when the span ≤ 45 days,
// otherwise just the days that actually have orders (keeps wide ranges readable).
function rangeDayBars(list,fromStr,toStr){
  var byKey={};
  list.forEach(function(o){ var d=new Date(o.createdAt); if(isNaN(d))return; var k=rIsoDate(d); if(!byKey[k])byKey[k]={rev:0,count:0}; byKey[k].rev+=Number(o.total)||0; byKey[k].count++; });
  var f=fromStr?new Date(fromStr):null, t=toStr?new Date(toStr):null, keys=[];
  if(f&&!isNaN(f)&&t&&!isNaN(t)){
    var s=new Date(f.getFullYear(),f.getMonth(),f.getDate()), e=new Date(t.getFullYear(),t.getMonth(),t.getDate()), span=Math.round((e-s)/86400000)+1;
    if(e>=s && span<=45){ for(var d=new Date(s),g=0; d<=e&&g++<60; d.setDate(d.getDate()+1)) keys.push(rIsoDate(d)); }
  }
  if(!keys.length) keys=Object.keys(byKey).sort();
  return keys.map(function(k){ var d=new Date(k+'T00:00'); return { key:k, label:d.toLocaleDateString('en-NZ',{weekday:'short',day:'numeric'}), rev:(byKey[k]?byKey[k].rev:0), count:(byKey[k]?byKey[k].count:0) }; });
}
function feeMonths(){
  var from=state.fee.from, to=state.fee.to;
  var start=(from&&!isNaN(new Date(from+'T00:00')))?new Date(from+'T00:00'):new Date();
  var end=(to&&!isNaN(new Date(to+'T00:00')))?new Date(to+'T00:00'):new Date();
  var months=[],byKey={},y=start.getFullYear(),m=start.getMonth(),ey=end.getFullYear(),em=end.getMonth(),g=0;
  while((y<ey||(y===ey&&m<=em))&&g++<120){ var b={key:y+'-'+rPad2(m+1),label:rMonShort(y,m),fee:0,count:0}; months.push(b); byKey[b.key]=b; m++; if(m>11){m=0;y++;} }
  var fT=(from&&!isNaN(new Date(from+'T00:00')))?new Date(from+'T00:00').getTime():-Infinity;
  var tT=(to&&!isNaN(new Date(to+'T00:00')))?rEod(new Date(to+'T00:00')).getTime():Infinity;
  (state.orders||[]).forEach(function(o){ var d=new Date(o.createdAt),x=d.getTime(); if(isNaN(x)||x<fT||x>tT)return; var k=d.getFullYear()+'-'+rPad2(d.getMonth()+1); if(byKey[k]){byKey[k].fee+=Number(o.developerFee)||0;byKey[k].count++;} });
  return months;
}
function rQuickBtn(act,val,label,curv){

function rDateField(label,name,type,value){

function customRangePanel(){

  var kpis=kpiDefs.map(function(k){ return '<div style="background:var(--input);border:1px solid var(--border);border-radius:12px;padding:14px 16px;"><div style="font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted2);">'+k[0]+'</div><div style="font-family:\'Fraunces\',serif;font-size:24px;font-weight:500;margin-top:7px;line-height:1;color:'+(k[0]==='Developer fee'?'var(--accent)':'var(--ink)')+';">'+k[1]+'</div>'+(k[2]?'<div style="font-size:11px;margin-top:6px;color:var(--muted2);">'+esc(k[2])+'</div>':'')+'</div>'; }).join('');
  var bars=rangeDayBars(list,r.from,r.to);

  var chart = bars.length ? bars.map(function(b){ var hi=b.rev===bmax&&b.rev>0; var bw=bars.length>14?'min-width:34px;':''; return '<div style="flex:1;'+bw+'display:flex;flex-direction:column;align-items:center;gap:8px;height:100%;justify-content:flex-end;"><div style="font-family:\'Fraunces\',serif;font-size:11px;color:var(--muted);white-space:nowrap;">'+(b.rev>=1000?'$'+(b.rev/1000).toFixed(1)+'k':money(b.rev))+'</div><div title="'+esc(b.label)+' · '+b.count+' orders" style="width:100%;max-width:46px;height:'+Math.max(Math.round(b.rev/bmax*100),2)+'%;border-radius:7px 7px 3px 3px;background:'+(hi?'linear-gradient(180deg,var(--accent),var(--accent-d))':'linear-gradient(180deg,#dca877,#cf9a64)')+';"></div><div style="font-size:11px;color:var(--muted2);white-space:nowrap;">'+esc(b.label)+'</div></div>'; }).join('') : '<div style="color:var(--muted2);font-size:13px;margin:auto;">No sales in this range.</div>';
  return '<div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:22px 24px;margin-bottom:18px;">'

function billDayKey(d){ const t=new Date(d).getTime(); return isNaN(t)?'':new Date(d).toLocaleDateString('en-NZ'); }
function billDayLabel(d){
  const key=billDayKey(d); if(!key) return 'Earlier';
  const today=new Date(); const y=new Date(today); y.setDate(today.getDate()-1);
  if(key===today.toLocaleDateString('en-NZ')) return 'Today';
  if(key===y.toLocaleDateString('en-NZ')) return 'Yesterday';
  return new Date(d).toLocaleDateString('en-NZ',{weekday:'short',day:'numeric',month:'short'});
}
function billTime(d){ const t=new Date(d).getTime(); return isNaN(t)?'':new Date(d).toLocaleTimeString('en-NZ',{hour:'numeric',minute:'2-digit'}); }

async function advance(orderId, next){
  const o = state.orders.find(function(x){ return x.id===orderId; }); if(!o) return;
  try {
    await api('/orders/'+enc(orderId), { method:'PATCH', body:{ status: next } });
    if(next==='picked_up'){ delete printStatusById[orderId]; state.orders = state.orders.filter(function(x){ return x.id!==orderId; }); }
    else { o.status = next; }
    checkNewOrderAlert();
    if(next==='preparing') autoPrintOrder(o);     // auto-print on accept
    render();
    loadOrders().then(function(){ if(state.active==='kitchen') refreshKitchenInPlace(); });
  } catch(e){ toast(e.message,'err'); }
}
function refreshKitchenInPlace(){ const el=document.getElementById('kds-content'); if(el) el.innerHTML=kitchenContentHTML(); }

let _localPrice = {};
function bump(d){
  const cats = menuCategoriesOrdered(); const it = cats[state.sel.cat] && cats[state.sel.cat].items[state.sel.item];
  if(!it || typeof it.price!=='number') return;
  it.price = Math.max(0, Math.round((it.price+d)*100)/100);
  const el=document.getElementById('ed-price'); if(el) el.textContent=money(it.price);
}
// 86 is a decisive, immediate action — PATCH it right away so the customer menu
// reflects it now (no "looks 86'd but isn't" trap), and revert the toggle on failure.
async function toggleAvail(){
  const cats = menuCategoriesOrdered(); const it = cats[state.sel.cat] && cats[state.sel.cat].items[state.sel.item];
  if(!it) return;
  const next = !it.outOfStock;
  try { await api('/menu/items/'+enc(it.id), { method:'PATCH', body:{ outOfStock: next } }); it.outOfStock = next; render(); toast((next?'86’d · ':'Available · ')+it.name,'ok'); }
  catch(e){ toast('Couldn’t update — '+e.message,'err'); }
}
// Re-anchor state.sel to a given item id after the category list reshapes (e.g.
// the virtual "New on the Menu" section appearing/disappearing shifts indices).
// Prefer the item's real category over the virtual section so the editor stays on it.
function selectItemById(id){
  if(!id) return;
  const cats = menuCategoriesOrdered();
  let found = null;
  for(let c=0;c<cats.length;c++){
    if(cats[c].virtual) continue;
    for(let i=0;i<cats[c].items.length;i++){ if(cats[c].items[i].id===id){ found={cat:c,item:i}; break; } }
    if(found) break;
  }
  if(found) state.sel = found;
}
// "New on the Menu" — toggles the `new` tag and PATCHes immediately, like 86.
async function toggleNew(){
  const cats = menuCategoriesOrdered(); const it = cats[state.sel.cat] && cats[state.sel.cat].items[state.sel.item];
  if(!it) return;
  const id = it.id;
  const tags = Array.isArray(it.tags) ? it.tags.slice() : [];
  const i = tags.indexOf('new');
  if(i>=0) tags.splice(i,1); else tags.push('new');
  try { await api('/menu/items/'+enc(it.id), { method:'PATCH', body:{ tags: tags } }); it.tags = tags; selectItemById(id); render(); toast((i>=0?'Removed from New · ':'Added to New · ')+it.name,'ok'); }
  catch(e){ toast('Couldn’t update — '+e.message,'err'); }
}
// Save only commits the PRICE (86 is already live). On success OR failure we reload
// the menu from the server, so a failed/partial save never leaves a stale local price.
async function saveItem(){
  const cats = menuCategoriesOrdered(); const it = cats[state.sel.cat] && cats[state.sel.cat].items[state.sel.item];
  if(!it) return;
  if(typeof it.price!=='number'){ toast('Edit size prices in the full menu admin','info'); return; }
  try { await api('/menu/items/'+enc(it.id), { method:'PATCH', body:{ price: it.price } }); toast('Saved '+it.name,'ok'); }
  catch(e){ toast('Save failed — '+e.message,'err'); }
  await loadMenu(); render();
}
async function runImport(){
  let items;
  try { items = JSON.parse(val('imp-json')); }
  catch(e){ toast('That isn’t valid JSON — paste exactly what you were given','err'); return; }
  if(!Array.isArray(items)) items = [items];
  if(!items.length){ toast('Nothing to import','info'); return; }
  try {
    const d = await api('/menu/import', { method:'POST', body:{ items } });
    const added=(d.added||[]).length, skipped=(d.skipped||[]).length;
    toast('Imported '+added+' dish'+(added===1?'':'es')+(skipped?(' · '+skipped+' skipped'):''), added?'ok':'info');
    state.importOpen=false; await loadMenu(); render();
  } catch(e){ toast('Import failed — '+e.message,'err'); }
}
async function tenderPay(method){
  const id = state.tender; if(!id) return;
  try { await api('/orders/'+enc(id), { method:'PATCH', body:{ paymentStatus:'paid', paymentMethod:method } }); state.tender=null; toast('Marked paid · '+method,'ok'); await loadOrders(); render(); }
  catch(e){ toast(e.message,'err'); }
}
async function applyDiscount(id){

  const raw = window.prompt('Amount (negative for a discount, e.g. -5.00):'); if(raw==null) return;

  catch(e){ toast(e.message,'err'); }
}

// ── Reports range controls (Sales explorer + monthly dev-fee chart) ──
function repQuick(which){
  ensureRanges();
  var now=new Date(), from, to=now;
  if(which==='this-week'){ from=rMonday(now); }
  else if(which==='last-week'){ var m=rMonday(now); m.setDate(m.getDate()-7); from=m; to=rEod(new Date(m.getFullYear(),m.getMonth(),m.getDate()+6)); }
  else if(which==='this-month'){ from=new Date(now.getFullYear(),now.getMonth(),1); }
  else if(which==='last-month'){ from=new Date(now.getFullYear(),now.getMonth()-1,1); to=rEod(new Date(now.getFullYear(),now.getMonth(),0)); }
  else return;
  state.rep={ from:rIsoDT(from), to:rIsoDT(to), quick:which }; render();
}
function feeQuick(n){
  ensureRanges();
  var now=new Date(); var from, to=now;
  if(n==='ytd'){ from=new Date(now.getFullYear(),0,1); }
  else if(n==='all'){
    var earliest=(state.orders||[]).reduce(function(min,o){ var t=new Date(o.createdAt).getTime(); return isNaN(t)?min:Math.min(min,t); }, Infinity);
    from=isFinite(earliest)?new Date(earliest):new Date(now.getFullYear(),now.getMonth()-5,1);
  } else { var k=Number(n)||6; from=new Date(now.getFullYear(),now.getMonth()-(k-1),1); }
  state.fee={ from:rIsoDate(from), to:rIsoDate(to), quick:n }; render();
}
function handleInput(name,value){
  ensureRanges();
  if(name==='repFrom'){ state.rep.from=value; state.rep.quick=''; render(); }
  else if(name==='repTo'){ state.rep.to=value; state.rep.quick=''; render(); }
  else if(name==='repDay'){ if(!value)return; var d=new Date(value+'T00:00'); if(isNaN(d))return; var mo=rMonday(d), su=rEod(new Date(mo.getFullYear(),mo.getMonth(),mo.getDate()+6)); state.rep={ from:rIsoDT(mo), to:rIsoDT(su), quick:'' }; render(); }
  else if(name==='feeFrom'){ state.fee.from=value; state.fee.quick=''; render(); }
  else if(name==='feeTo'){ state.fee.to=value; state.fee.quick=''; render(); }
}

let _loginBusy=false;
function tick(){
  if(!state.me) return;
  const c=document.getElementById('clock'); if(c) c.textContent=clockStr();
  // NOTE: we deliberately do NOT rebuild the kitchen board here. Rebuilding its
  // innerHTML every second swallowed taps mid-press. Ticket ages ("Xm") are
  // minute-granular and refresh on the 6s data poll — plenty often.
}
async function poll(){
  if(!state.me) return;
  // Always refresh orders + ring the new-order alarm regardless of which screen
  // is open — a kitchen alert must not depend on the active tab.
  await loadOrders();
  checkNewOrderAlert();
  const A=state.active;
  if(A!=='kitchen'&&A!=='billing'&&A!=='dashboard') return;
  if(A==='dashboard') await loadReportsToday();
  // Never tear down an open modal with live inputs (Settings / tender) via a
  // background refresh — only the kitchen board (no inputs) is safe to patch.
  if(state.settingsOpen||state.tender||state.importOpen){ if(A==='kitchen') refreshKitchenInPlace(); return; }
  if(A==='kitchen') refreshKitchenInPlace();
  else render();
}
function handle(act, ds, ev){
  switch(act){
    case 'nav': state.active=ds.screen; state.switcherOpen=false; render(); refreshActive(); break;
    case 'goKitchen': state.active='kitchen'; render(); refreshActive(); break;
    case 'advance': advance(ds.id, ds.next); break;
    case 'printTicket': printTicket(ds.id); break;
    case 'printReceipt': printReceipt(ds.id); break;
    case 'menuSelect': state.sel={cat:+ds.c,item:+ds.i}; render(); break;
    case 'priceUp': bump(0.5); break;
    case 'priceDown': bump(-0.5); break;
    case 'toggleAvail': toggleAvail(); break;
    case 'toggleNew': toggleNew(); break;
    case 'saveItem': saveItem(); break;
    case 'openImport': state.importOpen=true; render(); break;
    case 'closeImport': state.importOpen=false; render(); break;
    case 'runImport': runImport(); break;
    case 'billSelect': state.billSel=+ds.idx; render(); break;
    case 'openTender': state.tender=ds.id; render(); break;
    case 'tenderClose': state.tender=null; render(); break;
    case 'tenderPay': tenderPay(ds.method); break;
    case 'applyDiscount': applyDiscount(ds.id); break;
    case 'redeemLoyalty': redeemLoyalty(ds.id); break;
    case 'saveLoyalty': saveLoyalty(); break;
    case 'emailBill': emailBill(ds.id); break;
    case 'repRange': repQuick(ds.val); break;
    case 'feeRange': feeQuick(ds.val); break;
    case 'toggleSwitcher': state.switcherOpen=!state.switcherOpen; render(); break;
    case 'switchCafe': switchCafe(ds.slug); break;
    case 'openSettings': state.settingsOpen=true; state.setMsg=''; render(); break;
    case 'closeSettings': state.settingsOpen=false; state.setMsg=''; render(); break;
    case 'setAppearance': state.prefs.appearance=ds.val; lsSet(LS.prefs,state.prefs); applyTheme(); updateSeg('setAppearance',ds.val); refreshKitchenIfVisible(); break;
    case 'setAccent': state.prefs.accent=ds.val||null; lsSet(LS.prefs,state.prefs); applyTheme(); updateAccentSwatches(); refreshKitchenIfVisible(); break;
    case 'setDensity': state.prefs.density=ds.val; lsSet(LS.prefs,state.prefs); applyTheme(); updateSeg('setDensity',ds.val); break;
    case 'updateAccount': updateAccount(); break;
    case 'savePrinters': savePrinters(); break;
    case 'testStation': testStation(ds.key); break;
    case 'signOut': logout(); break;
  }
}
async function doLoginFromForm(){
  if(_loginBusy) return; _loginBusy=true;
  const lg=val('li-login').trim(), pw=val('li-pass');
  state.lastLogin=lg;
  const btn=document.getElementById('li-btn'); if(btn){ btn.innerHTML='<span class="spin"></span>'; btn.disabled=true; }
  try { await doLogin(lg, pw); }
  catch(e){ state.loginErr = e.status===401 ? 'Wrong login or password.' : (e.message||'Sign-in failed.'); render(); }
  finally { _loginBusy=false; }
}
function boot(){
  const p=lsJSON(LS.prefs); if(p) state.prefs={ appearance:p.appearance||'Dark', accent:p.accent||null, density:p.density||'Standard' };
  state.lastLogin = lsGet(LS.last) || '';
  SESSION = lsGet(LS.session) || '';

  const root=document.getElementById('root');
  root.addEventListener('click', function(e){
    unlockAudio();
    const el=e.target.closest('[data-act]'); if(!el) return;
    const act=el.getAttribute('data-act');
    if(act==='login') return;
    handle(act, el.dataset, e);
  });
  root.addEventListener('submit', function(e){
    const f=e.target.closest('form[data-act]'); if(!f) return;
    e.preventDefault();
    if(f.getAttribute('data-act')==='login') doLoginFromForm();
  });
  root.addEventListener('change', function(e){
    const el=e.target.closest('[data-input]'); if(!el) return;
    handleInput(el.getAttribute('data-input'), el.value);
  });

  applyTheme();
  render();
  setInterval(tick, 1000);
  setInterval(poll, 6000);

  // Resume an existing session.
  if(SESSION){
    afterAuth().catch(function(e){
      if(e.status===401){ SESSION=''; lsSet(LS.session,''); render(); }
      else { toast('Could not load your café — '+(e.message||''),'err'); }
    });
  }
}
boot();
</script>
