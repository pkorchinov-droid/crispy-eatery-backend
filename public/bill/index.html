<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crispy Eatery — Your Bill</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f4ede0;
      color: #2b1f17;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      width: 100%;
      max-width: 420px;
      padding: 24px 20px 40px;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 28px;
    }
    .header .brand {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.4em;
      color: #c25a3a;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .header h1 {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 32px;
      font-style: italic;
      font-weight: 400;
      color: #2b1f17;
    }

    /* Order info card */
    .card {
      background: #fbf6ec;
      border: 1px solid #e6dcc7;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 1px 0 #fff inset, 0 12px 30px -16px rgba(43,31,23,0.15);
    }

    .order-meta {
      display: flex;
      justify-content: space-between;
      padding-bottom: 14px;
      margin-bottom: 14px;
      border-bottom: 1px dotted #d6c8a8;
    }
    .order-meta .label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.3em;
      color: #8a7558;
    }
    .order-meta .value {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 20px;
      font-style: italic;
      font-weight: 500;
    }

    /* Items list */
    .item-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 8px 0;
      border-bottom: 1px dotted #e6dcc7;
    }
    .item-row:last-child { border-bottom: none; }
    .item-name {
      font-size: 14px;
      color: #2b1f17;
      flex: 1;
      padding-right: 12px;
    }
    .item-qty {
      font-size: 12px;
      color: #8a7558;
      margin-right: 4px;
    }
    .item-notes {
      font-size: 11px;
      color: #8a7558;
      font-style: italic;
      display: block;
      margin-top: 2px;
    }
    .item-price {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
    }

    /* Total */
    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 16px 0 0;
      margin-top: 12px;
      border-top: 2px solid #2b1f17;
    }
    .total-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.25em;
      font-weight: 600;
      color: #2b1f17;
    }
    .total-amount {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 28px;
      font-weight: 500;
      font-style: italic;
      color: #2b1f17;
    }

    /* Time */
    .order-time {
      text-align: center;
      font-size: 11px;
      color: #8a7558;
      margin-top: 12px;
      letter-spacing: 0.05em;
    }

    /* Email section */
    .email-section {
      margin-top: 24px;
    }
    .email-section .label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.3em;
      color: #8a7558;
      margin-bottom: 8px;
      display: block;
    }
    .email-input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid #e6dcc7;
      background: #fbf6ec;
      font-size: 16px;
      color: #2b1f17;
      outline: none;
      font-family: inherit;
      margin-bottom: 12px;
    }
    .email-input:focus {
      border-color: #c25a3a;
      box-shadow: 0 0 0 3px rgba(194,90,58,0.1);
    }
    .email-input::placeholder { color: #b6a988; }

    .send-btn {
      width: 100%;
      padding: 14px;
      border-radius: 50px;
      border: none;
      background: #2b1f17;
      color: #f4ede0;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.3em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .send-btn:hover { background: #3d2e22; }
    .send-btn:active { transform: scale(0.99); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Status messages */
    .status {
      text-align: center;
      padding: 14px;
      border-radius: 12px;
      font-size: 13px;
      margin-top: 12px;
    }
    .status.success {
      background: rgba(122,131,98,0.15);
      color: #5a6340;
    }
    .status.error {
      background: rgba(194,90,58,0.1);
      color: #8a3a25;
    }

    /* Loading state */
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: #8a7558;
      font-size: 14px;
    }

    /* Not found */
    .not-found {
      text-align: center;
      padding: 60px 20px;
    }
    .not-found h2 {
      font-family: Georgia, serif;
      font-size: 24px;
      font-style: italic;
      margin-bottom: 8px;
    }
    .not-found p { color: #8a7558; font-size: 13px; }

    /* Footer */
    .footer {
      text-align: center;
      margin-top: 32px;
      padding-top: 20px;
      border-top: 1px solid #e6dcc7;
    }
    .footer p {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.35em;
      color: #8a7558;
      line-height: 1.8;
    }

    /* Back link */
    .back-link {
      display: inline-block;
      margin-top: 16px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: #c25a3a;
      text-decoration: underline;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container" id="app">
    <div class="loading" id="loadingState">Loading your bill...</div>
  </div>

  <script>
    var BACKEND = window.location.origin;
    var orderId = null;

    // Read order ID from URL params
    var params = new URLSearchParams(window.location.search);
    orderId = params.get('order');

    function fmt(n) {
      return '$' + Number(n).toFixed(2);
    }

    function renderBill(order) {
      var app = document.getElementById('app');

      var itemsHtml = order.items.map(function(item) {
        var notes = item.notes ? '<span class="item-notes">"' + escHtml(item.notes) + '"</span>' : '';
        return '<div class="item-row">' +
          '<div class="item-name">' +
            '<span class="item-qty">' + item.qty + 'x</span> ' +
            escHtml(item.name) + (item.size ? ' <span style="color:#8a7558;font-size:12px">(' + escHtml(item.size) + ')</span>' : '') +
            notes +
          '</div>' +
          '<div class="item-price">' + fmt(item.price * item.qty) + '</div>' +
        '</div>';
      }).join('');

      var orderTime = new Date(order.createdAt).toLocaleString('en-NZ', {
        dateStyle: 'medium',
        timeStyle: 'short'
      });

      app.innerHTML =
        '<div class="header">' +
          '<div class="brand">Crispy Eatery</div>' +
          '<h1>Your Bill</h1>' +
        '</div>' +

        '<div class="card">' +
          '<div style="display:flex;justify-content:space-between;margin-bottom:14px">' +
            '<div><div class="order-meta"><div><div class="label">Order</div><div class="value">' + escHtml(order.id) + '</div></div></div></div>' +
            '<div><div class="order-meta" style="border:none;margin:0;padding:0"><div><div class="label">Table</div><div class="value">' + escHtml(String(order.tableNumber)) + '</div></div></div></div>' +
          '</div>' +
          '<div>' + itemsHtml + '</div>' +
          '<div class="total-row">' +
            '<span class="total-label">Total</span>' +
            '<span class="total-amount">' + fmt(order.total) + '</span>' +
          '</div>' +
        '</div>' +

        '<div class="order-time">' + orderTime + '</div>' +

        '<div class="email-section">' +
          '<label class="label">Email yourself a copy</label>' +
          '<input type="email" class="email-input" id="emailInput" placeholder="your@email.com" />' +
          '<button class="send-btn" id="sendBtn" onclick="sendBill()">Email My Bill</button>' +
          '<div id="statusMsg"></div>' +
        '</div>' +

        '<div class="footer">' +
          '<p>Crispy Eatery</p>' +
          '<p style="color:#b6a988">341 Remuera Road</p>' +
          '<p style="color:#b6a988">7 am — 3:30 pm · daily</p>' +
        '</div>';
    }

    function renderNotFound() {
      var app = document.getElementById('app');
      app.innerHTML =
        '<div class="header">' +
          '<div class="brand">Crispy Eatery</div>' +
          '<h1>Your Bill</h1>' +
        '</div>' +
        '<div class="not-found">' +
          '<h2>Order not found</h2>' +
          '<p>Please check your order number and try again.</p>' +
        '</div>' +
        '<div style="text-align:center;margin-top:20px">' +
          '<label class="label" style="display:block;font-size:10px;text-transform:uppercase;letter-spacing:0.3em;color:#8a7558;margin-bottom:8px">Enter your order number</label>' +
          '<input type="text" class="email-input" id="orderInput" placeholder="#001" style="max-width:160px;text-align:center;margin:0 auto 12px" />' +
          '<br/>' +
          '<button class="send-btn" style="max-width:200px;margin:0 auto" onclick="lookupOrder()">Look Up</button>' +
        '</div>';
    }

    function renderError(msg) {
      var app = document.getElementById('app');
      app.innerHTML =
        '<div class="header">' +
          '<div class="brand">Crispy Eatery</div>' +
          '<h1>Your Bill</h1>' +
        '</div>' +
        '<div class="not-found">' +
          '<h2>Something went wrong</h2>' +
          '<p>' + escHtml(msg) + '</p>' +
        '</div>';
    }

    function escHtml(str) {
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function lookupOrder() {
      var input = document.getElementById('orderInput');
      if (!input) return;
      var id = input.value.trim();
      if (!id) return;
      if (!id.startsWith('#')) id = '#' + id;
      window.location.search = '?order=' + encodeURIComponent(id);
    }

    async function loadOrder() {
      if (!orderId) {
        renderNotFound();
        return;
      }
      try {
        var res = await fetch(BACKEND + '/orders/' + encodeURIComponent(orderId));
        if (!res.ok) {
          renderNotFound();
          return;
        }
        var order = await res.json();
        renderBill(order);
      } catch (err) {
        renderError('Could not load the order. Please try again.');
      }
    }

    var EMAIL_RE = /^[^\s@<>"',;:\\]+@[^\s@<>"',;:\\]+\.[^\s@<>"',;:\\]{2,}$/;

    async function sendBill() {
      var emailInput = document.getElementById('emailInput');
      var sendBtn = document.getElementById('sendBtn');
      var statusMsg = document.getElementById('statusMsg');
      var email = emailInput.value.trim();

      if (!EMAIL_RE.test(email) || email.length > 254) {
        statusMsg.className = 'status error';
        statusMsg.textContent = 'Please enter a valid email address';
        return;
      }

      sendBtn.disabled = true;
      sendBtn.textContent = 'Sending...';
      statusMsg.innerHTML = '';

      try {
        var res = await fetch(BACKEND + '/orders/' + encodeURIComponent(orderId) + '/email-bill', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email })
        });

        var data = null;
        try { data = await res.json(); } catch (_) { /* non-JSON body */ }

        if (res.ok && data && data.success) {
          statusMsg.className = 'status success';
          statusMsg.textContent = 'Bill sent to ' + email + '!';
          sendBtn.textContent = 'Sent!';
        } else {
          statusMsg.className = 'status error';
          statusMsg.textContent = (data && data.error)
            ? data.error
            : ('Failed to send (HTTP ' + res.status + '). Please try again.');
          sendBtn.disabled = false;
          sendBtn.textContent = 'Email My Bill';
        }
      } catch (err) {
        statusMsg.className = 'status error';
        statusMsg.textContent = 'Connection error. Please try again.';
        sendBtn.disabled = false;
        sendBtn.textContent = 'Email My Bill';
      }
    }

    // Load on page ready
    loadOrder();
  </script>
</body>
</html>
