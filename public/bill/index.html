<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Bill</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f4ede0;
      color: #2b1f17;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      width: 100%;
      max-width: 420px;
      padding: 24px 20px 40px;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 28px;
    }
    .header .brand {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.4em;
      color: #c25a3a;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .header h1 {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 32px;
      font-style: italic;
      font-weight: 400;
      color: #2b1f17;
    }

    /* Order info card */
    .card {
      background: #fbf6ec;
      border: 1px solid #e6dcc7;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 1px 0 #fff inset, 0 12px 30px -16px rgba(43,31,23,0.15);
    }

    .order-meta {
      display: flex;
      justify-content: space-between;
      padding-bottom: 14px;
      margin-bottom: 14px;
      border-bottom: 1px dotted #d6c8a8;
    }
    .order-meta .label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.3em;
      color: #8a7558;
    }
    .order-meta .value {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 20px;
      font-style: italic;
      font-weight: 500;
    }

    /* Items list */
    .item-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 8px 0;
      border-bottom: 1px dotted #e6dcc7;
    }
    .item-row:last-child { border-bottom: none; }
    .item-name {
      font-size: 14px;
      color: #2b1f17;
      flex: 1;
      padding-right: 12px;
    }
    .item-qty {
      font-size: 12px;
      color: #8a7558;
      margin-right: 4px;
    }
    .item-notes {
      font-size: 11px;
      color: #8a7558;
      font-style: italic;
      display: block;
      margin-top: 2px;
    }
    .item-price {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
    }

    /* Total */
    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 16px 0 0;
      margin-top: 12px;
      border-top: 2px solid #2b1f17;
    }
    .total-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.25em;
      font-weight: 600;
      color: #2b1f17;
    }
    .total-amount {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 28px;
      font-weight: 500;
      font-style: italic;
      color: #2b1f17;
    }

    /* Time */
    .order-time {
      text-align: center;
      font-size: 11px;
      color: #8a7558;
      margin-top: 12px;
      letter-spacing: 0.05em;
    }

    /* Email section */
    .email-section {
      margin-top: 24px;
    }
    .email-section .label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.3em;
      color: #8a7558;
      margin-bottom: 8px;
      display: block;
    }
    .email-input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid #e6dcc7;
      background: #fbf6ec;
      font-size: 16px;
      color: #2b1f17;
      outline: none;
      font-family: inherit;
      margin-bottom: 12px;
    }
    .email-input:focus {
      border-color: #c25a3a;
      box-shadow: 0 0 0 3px rgba(194,90,58,0.1);
    }
    .email-input::placeholder { color: #b6a988; }

    .send-btn {
      width: 100%;
      padding: 14px;
      border-radius: 50px;
      border: none;
      background: #2b1f17;
      color: #f4ede0;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.3em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .send-btn:hover { background: #3d2e22; }
    .send-btn:active { transform: scale(0.99); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Status messages */
    .status {
      text-align: center;
      padding: 14px;
      border-radius: 12px;
      font-size: 13px;
      margin-top: 12px;
    }
    .status.success {
      background: rgba(122,131,98,0.15);
      color: #5a6340;
    }
    .status.error {
      background: rgba(194,90,58,0.1);
      color: #8a3a25;
    }

    /* Payment status chip */
    .pay-status {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 14px;
    }
    .pay-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 50px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
    }
    .pay-chip.paid {
      background: rgba(122,131,98,0.18);
      color: #5a6340;
    }
    .pay-chip.unpaid {
      background: rgba(194,90,58,0.12);
      color: #8a3a25;
    }
    .pay-chip.pending {
      background: rgba(194,90,58,0.10);
      color: #a06a3a;
    }
    .pay-chip .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
    }

    /* GST line */
    .gst-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 8px 0 0;
      font-size: 12px;
      color: #8a7558;
    }
    .gst-row .gst-amount {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 13px;
    }
    .gst-note {
      font-size: 10px;
      color: #b6a988;
      line-height: 1.5;
      margin-top: 6px;
    }

    /* Pay now button (accent) */
    .pay-btn {
      width: 100%;
      padding: 14px;
      border-radius: 50px;
      border: none;
      background: #c25a3a;
      color: #fbf6ec;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.3em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 16px;
    }
    .pay-btn:hover { background: #a84a2e; }
    .pay-btn:active { transform: scale(0.99); }

    /* Staff-payment note */
    .pay-note {
      text-align: center;
      font-size: 12px;
      color: #8a7558;
      margin-top: 14px;
      line-height: 1.5;
    }

    /* Inline form error text */
    .field-error {
      font-size: 12px;
      color: #8a3a25;
      margin-bottom: 12px;
      line-height: 1.4;
    }
    .email-input.invalid {
      border-color: #c25a3a;
      box-shadow: 0 0 0 3px rgba(194,90,58,0.1);
    }

    /* Loading state */
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: #8a7558;
      font-size: 14px;
    }

    /* Not found */
    .not-found {
      text-align: center;
      padding: 60px 20px;
    }
    .not-found h2 {
      font-family: Georgia, serif;
      font-size: 24px;
      font-style: italic;
      margin-bottom: 8px;
    }
    .not-found p { color: #8a7558; font-size: 13px; }

    /* Footer */
    .footer {
      text-align: center;
      margin-top: 32px;
      padding-top: 20px;
      border-top: 1px solid #e6dcc7;
    }
    .footer p {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.35em;
      color: #8a7558;
      line-height: 1.8;
    }

    /* Back link */
    .back-link {
      display: inline-block;
      margin-top: 16px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: #c25a3a;
      text-decoration: underline;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container" id="app">
    <div class="loading" id="loadingState">Loading your bill...</div>
  </div>

  <script>
    var BACKEND = window.location.origin;
    var orderId = null;
    var billToken = null;

    // Read order ID + token from URL params
    var params = new URLSearchParams(window.location.search);
    orderId = params.get('order');
    billToken = params.get('t');
    // Multi-tenant: the QR/bill link carries ?r=<slug>. Without it the backend's
    // resolveTenant falls back to DEFAULT_TENANT ("crispy"), which 404s/mis-resolves
    // for every non-Crispy tenant. When absent we behave as before (defaults to crispy).
    var tenantSlug = params.get('r');

    // Brand name shown in the header/footer. Resolved from the order/tenant once loaded;
    // until then (and when unavailable) we use a neutral generic — NOT "Crispy Eatery".
    var tenantName = '';
    function brandName() {
      return tenantName || 'Your Order';
    }

    // Append r=<slug> (and an existing query separator) to a backend URL when a slug
    // is present; otherwise leave the URL untouched so Crispy's existing links work.
    function withTenant(url) {
      if (!tenantSlug) return url;
      return url + (url.indexOf('?') === -1 ? '?' : '&') + 'r=' + encodeURIComponent(tenantSlug);
    }

    function fmt(n) {
      return '$' + Number(n).toFixed(2);
    }

    function renderBill(order) {
      var app = document.getElementById('app');

      var itemsHtml = order.items.map(function(item) {
        var notes = item.notes ? '<span class="item-notes">"' + escHtml(item.notes) + '"</span>' : '';
        return '<div class="item-row">' +
          '<div class="item-name">' +
            '<span class="item-qty">' + item.qty + 'x</span> ' +
            escHtml(item.name) + (item.size ? ' <span style="color:#8a7558;font-size:12px">(' + escHtml(item.size) + ')</span>' : '') +
            notes +
          '</div>' +
          '<div class="item-price">' + fmt(item.price * item.qty) + '</div>' +
        '</div>';
      }).join('');

      var orderTime = new Date(order.createdAt).toLocaleString('en-NZ', {
        dateStyle: 'medium',
        timeStyle: 'short'
      });

      // GST-inclusive amount = total * 3/23 (online prices already include GST + surcharge)
      var gstHtml =
        '<div class="gst-row">' +
          '<span>GST (incl.)</span>' +
          '<span class="gst-amount">' + fmt(order.total * 3 / 23) + '</span>' +
        '</div>' +
        '<div class="gst-note">Online prices include GST and a small service surcharge.</div>';

      // Payment status chip
      var pStatus = order.paymentStatus || 'unpaid';
      var pay = order.payment;
      var chipClass, chipText;
      if (pStatus === 'paid' || pay) {
        chipClass = 'paid';
        var scheme = (pay && pay.scheme) ? pay.scheme : 'Card';
        var last4 = (pay && pay.last4) ? (' ····' + escHtml(String(pay.last4))) : '';
        chipText = 'Paid · ' + escHtml(String(scheme)) + last4;
      } else if (pStatus === 'pending') {
        chipClass = 'pending';
        chipText = 'Payment pending';
      } else if (pStatus === 'failed') {
        chipClass = 'unpaid';
        chipText = 'Payment failed';
      } else if (pStatus === 'refunded') {
        chipClass = 'pending';
        chipText = 'Refunded';
      } else {
        chipClass = 'unpaid';
        chipText = 'Unpaid';
      }
      var chipHtml =
        '<div class="pay-status">' +
          '<span class="pay-chip ' + chipClass + '"><span class="dot"></span>' + chipText + '</span>' +
        '</div>';

      // Pay-now / staff-note logic (only for unpaid or failed states)
      var payActionHtml = '';
      if (pStatus === 'unpaid' || pStatus === 'failed') {
        var pi = order.paymentIntent;
        if (pi && pi.hostedUrl) {
          payActionHtml =
            '<button class="pay-btn" id="payBtn">Pay now</button>';
        } else if (pi && pi.clientSecret) {
          payActionHtml =
            '<div class="pay-note">Ask staff to take payment for this bill.</div>';
        }
      }

      // Footer: prefer the tenant's own address/hours (carried on the order); fall back
      // to Crispy's literals ONLY for Crispy's own no-?r links so its bill renders
      // identically. Other tenants without address/hours just show their name.
      var footerName = escHtml(brandName());
      var addr = order.address;
      var hoursDisplay = (order.hours && order.hours.display) ? order.hours.display : null;
      if (!addr && !hoursDisplay && !tenantSlug) {
        // Crispy default link (no slug): keep its original footer verbatim.
        addr = '341 Remuera Road';
        hoursDisplay = '7 am — 3:30 pm · daily';
      }
      var footerHtml =
        '<div class="footer">' +
          '<p>' + footerName + '</p>' +
          (addr ? '<p style="color:#b6a988">' + escHtml(String(addr)) + '</p>' : '') +
          (hoursDisplay ? '<p style="color:#b6a988">' + escHtml(String(hoursDisplay)) + '</p>' : '') +
        '</div>';

      app.innerHTML =
        '<div class="header">' +
          '<div class="brand">' + escHtml(brandName()) + '</div>' +
          '<h1>Your Bill</h1>' +
        '</div>' +

        '<div class="card">' +
          '<div style="display:flex;justify-content:space-between;margin-bottom:14px">' +
            '<div><div class="order-meta"><div><div class="label">Order</div><div class="value">' + escHtml(order.id) + '</div></div></div></div>' +
            '<div><div class="order-meta" style="border:none;margin:0;padding:0"><div>' +
              (order.orderType === 'pickup-drinks' || String(order.tableNumber).toUpperCase() === 'PICKUP'
                ? '<div class="label">Pickup</div><div class="value">' + escHtml(String(order.customerName || '')) + (order.pickupTime ? '<span style="display:block;font-size:12px;color:#8a7558">ready by ' + escHtml(String(order.pickupTime)) + '</span>' : '') + '</div>'
                : '<div class="label">Table</div><div class="value">' + escHtml(String(order.tableNumber)) + '</div>') +
            '</div></div></div>' +
          '</div>' +
          '<div>' + itemsHtml + '</div>' +
          '<div class="total-row">' +
            '<span class="total-label">Total</span>' +
            '<span class="total-amount">' + fmt(order.total) + '</span>' +
          '</div>' +
          gstHtml +
          chipHtml +
        '</div>' +

        payActionHtml +

        '<div class="order-time">' + orderTime + '</div>' +

        '<div class="email-section">' +
          '<form id="emailForm" novalidate>' +
            '<label class="label" for="emailInput">Email yourself a copy</label>' +
            '<input type="email" class="email-input" id="emailInput" name="email" placeholder="your@email.com" autocomplete="email" aria-label="Email address for your bill" />' +
            '<div class="field-error" id="emailError" aria-live="polite" hidden></div>' +
            '<button type="submit" class="send-btn" id="sendBtn">Email My Bill</button>' +
          '</form>' +
          '<div id="statusMsg" aria-live="polite"></div>' +
        '</div>' +

        footerHtml;

      // Wire up Pay-now redirect (avoids inline-quoting the URL)
      var payBtn = document.getElementById('payBtn');
      if (payBtn && order.paymentIntent && order.paymentIntent.hostedUrl) {
        payBtn.addEventListener('click', function() {
          window.location.href = order.paymentIntent.hostedUrl;
        });
      }

      // Wire up email form (Enter submits on mobile keyboards)
      var emailForm = document.getElementById('emailForm');
      if (emailForm) {
        emailForm.addEventListener('submit', function(e) {
          e.preventDefault();
          sendBill();
        });
      }
    }

    function renderNotFound() {
      var app = document.getElementById('app');
      app.innerHTML =
        '<div class="header">' +
          '<div class="brand">' + escHtml(brandName()) + '</div>' +
          '<h1>Your Bill</h1>' +
        '</div>' +
        '<div class="not-found">' +
          '<h2>Order not found</h2>' +
          '<p>We couldn\'t find that bill. Please rescan the QR code on your table or ask a staff member.</p>' +
        '</div>' +
        '<form id="lookupForm" novalidate style="text-align:center;margin-top:20px">' +
          '<label class="label" for="orderInput" style="display:block;font-size:10px;text-transform:uppercase;letter-spacing:0.3em;color:#8a7558;margin-bottom:8px">Enter your order number</label>' +
          '<input type="text" inputmode="numeric" class="email-input" id="orderInput" name="order" placeholder="#001" aria-label="Order number" style="max-width:160px;text-align:center;margin:0 auto 8px" />' +
          '<div class="field-error" id="orderError" aria-live="polite" hidden style="text-align:center"></div>' +
          '<button type="submit" class="send-btn" style="max-width:200px;margin:0 auto">Look Up</button>' +
        '</form>';

      var lookupForm = document.getElementById('lookupForm');
      if (lookupForm) {
        lookupForm.addEventListener('submit', function(e) {
          e.preventDefault();
          lookupOrder();
        });
      }
    }

    function renderError(msg) {
      var app = document.getElementById('app');
      app.innerHTML =
        '<div class="header">' +
          '<div class="brand">' + escHtml(brandName()) + '</div>' +
          '<h1>Your Bill</h1>' +
        '</div>' +
        '<div class="not-found">' +
          '<h2>Something went wrong</h2>' +
          '<p>' + escHtml(msg) + '</p>' +
        '</div>';
    }

    function escHtml(str) {
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function lookupOrder() {
      var input = document.getElementById('orderInput');
      if (!input) return;
      var id = input.value.trim();
      // N15: validate format strictly — only `#NNN` or `NNN` (1-4 digits) accepted.
      // Even with valid ID format, the backend requires a billToken for new orders,
      // so manual lookup will 404 unless the customer also has the token from the
      // QR-menu confirmation. That's intentional: prevents enumeration.
      var errEl = document.getElementById('orderError');
      var m = id.replace(/^#/, '').match(/^(\d{1,4})$/);
      if (!m) {
        input.classList.add('invalid');
        if (errEl) {
          errEl.textContent = 'Please enter your order number using digits only, e.g. 001.';
          errEl.hidden = false;
        }
        // Keep the user's typed value so they can correct it.
        input.focus();
        return;
      }
      input.classList.remove('invalid');
      if (errEl) errEl.hidden = true;
      // Preserve the tenant slug across the reload so the lookup hits the right tenant.
      var qs = '?order=' + encodeURIComponent('#' + m[1]);
      if (tenantSlug) qs += '&r=' + encodeURIComponent(tenantSlug);
      window.location.search = qs;
    }

    async function loadOrder() {
      if (!orderId) {
        renderNotFound();
        return;
      }
      try {
        var url = BACKEND + '/orders/' + encodeURIComponent(orderId);
        if (billToken) url += '?t=' + encodeURIComponent(billToken);
        url = withTenant(url); // pass ?r=<slug> so the backend resolves the right tenant
        var res = await fetch(url);
        if (!res.ok) {
          renderNotFound();
          return;
        }
        var order = await res.json();
        // Prefer the tenant/restaurant name carried by the order for the brand header.
        tenantName = order.restaurantName || order.tenantName || order.name || tenantName;
        if (tenantName) document.title = tenantName + ' — Your Bill';
        renderBill(order);
      } catch (err) {
        renderError('Could not load the order. Please try again.');
      }
    }

    var EMAIL_RE = /^[^\s@<>"',;:\\]+@[^\s@<>"',;:\\]+\.[^\s@<>"',;:\\]{2,}$/;

    async function sendBill() {
      var emailInput = document.getElementById('emailInput');
      var sendBtn = document.getElementById('sendBtn');
      var statusMsg = document.getElementById('statusMsg');
      var emailError = document.getElementById('emailError');
      var email = emailInput.value.trim();

      // Reset inline validation state (keep the typed value either way).
      emailInput.classList.remove('invalid');
      if (emailError) emailError.hidden = true;

      if (!EMAIL_RE.test(email) || email.length > 254) {
        emailInput.classList.add('invalid');
        if (emailError) {
          emailError.textContent = 'Please enter a valid email address, e.g. you@example.com.';
          emailError.hidden = false;
        }
        emailInput.focus();
        return;
      }

      sendBtn.disabled = true;
      sendBtn.textContent = 'Sending...';
      statusMsg.className = '';
      statusMsg.innerHTML = '';

      try {
        var body = { email: email };
        if (billToken) body.token = billToken;
        var res = await fetch(withTenant(BACKEND + '/orders/' + encodeURIComponent(orderId) + '/email-bill'), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });

        var data = null;
        try { data = await res.json(); } catch (_) { /* non-JSON body */ }

        if (res.ok && data && data.success) {
          statusMsg.className = 'status success';
          statusMsg.textContent = 'Sent to ' + email + '! Check your spam folder if it doesn\'t arrive.';
          sendBtn.textContent = 'Sent!';
          // Re-enable so a typo'd address can be retried (not a permanent dead-end).
          setTimeout(function() {
            var btn = document.getElementById('sendBtn');
            if (btn) {
              btn.disabled = false;
              btn.textContent = 'Send to another address';
            }
          }, 1500);
        } else {
          statusMsg.className = 'status error';
          statusMsg.textContent = (data && data.error)
            ? data.error
            : ('Failed to send (HTTP ' + res.status + '). Please try again.');
          sendBtn.disabled = false;
          sendBtn.textContent = 'Email My Bill';
        }
      } catch (err) {
        statusMsg.className = 'status error';
        statusMsg.textContent = 'Connection error. Please try again.';
        sendBtn.disabled = false;
        sendBtn.textContent = 'Email My Bill';
      }
    }

    // Load on page ready
    loadOrder();
  </script>
</body>
</html>
