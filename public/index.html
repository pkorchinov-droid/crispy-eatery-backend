<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #1a1510;
    color: #f5f0e8;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ââ Header âââââââââââââââââââââââââââââââââââââââ */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    background: #2a2318;
    border-bottom: 2px solid #b5753a;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 22px;
    font-weight: 700;
    color: #e8c477;
    letter-spacing: 1px;
  }

  .logo span {
    font-weight: 400;
    color: #c49a5c;
    font-size: 14px;
    margin-left: 10px;
    text-transform: uppercase;
    letter-spacing: 3px;
  }

  .stats {
    display: flex;
    gap: 20px;
    align-items: center;
  }

  .stat {
    text-align: center;
    padding: 4px 14px;
    background: #352c20;
    border-radius: 8px;
  }

  .stat-num {
    font-size: 24px;
    font-weight: 700;
    color: #e8c477;
    line-height: 1;
  }

  .stat-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #a09080;
    margin-top: 2px;
  }

  .status-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 6px;
    animation: pulse 2s infinite;
  }

  .status-dot.live { background: #4caf50; }
  .status-dot.error { background: #f44336; animation: none; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .conn-status {
    font-size: 12px;
    color: #a09080;
    display: flex;
    align-items: center;
  }

  /* ââ Order grid âââââââââââââââââââââââââââââââââââ */
  .orders-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 16px;
    padding: 20px 24px;
  }

  /* ââ Order card âââââââââââââââââââââââââââââââââââ */
  .order-card {
    background: #2a2318;
    border-radius: 12px;
    border: 1px solid #3d3428;
    overflow: hidden;
    transition: all 0.3s ease;
    animation: slideIn 0.4s ease;
  }

  .order-card.new-arrival {
    border-color: #e8c477;
    box-shadow: 0 0 20px rgba(232, 196, 119, 0.3);
  }

  .order-card.paid {
    border-color: #4caf50;
    box-shadow: 0 0 12px rgba(76, 175, 80, 0.15);
    opacity: 0.6;
  }

  .order-card.paid .card-header {
    background: #1e2e1e;
  }

  .order-card.paid .table-badge {
    background: #4caf50;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 18px;
    background: #352c20;
  }

  .table-badge {

    font-size: 20px;

    padding: 6px 16px;
    border-radius: 8px;
    min-width: 56px;
    text-align: center;
  }

    gap: 6px;
