<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crispy Eatery — Sales Reports</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #1a1510; color: #f5f0e8; min-height: 100vh; padding-bottom: 60px;
  }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 24px; background: #2a2318; border-bottom: 2px solid #b5753a;
    position: sticky; top: 0; z-index: 100;
  }
  .logo {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 22px; font-weight: 700; color: #e8c477; letter-spacing: 1px;
  }
  .logo span { font-weight: 400; color: #c49a5c; font-size: 14px; margin-left: 10px; text-transform: uppercase; letter-spacing: 3px; }
  .header-actions { display: flex; gap: 14px; align-items: center; }
  .header-actions a {
    color: #c49a5c; text-decoration: none; font-size: 12px;
    text-transform: uppercase; letter-spacing: 1.5px;
    padding: 7px 14px; border: 1px solid #4a3d2e; border-radius: 6px;
    transition: all 0.2s;
  }
  .header-actions a:hover { border-color: #b5753a; color: #e8c477; }

  /* Tabs */
  .tabs {
    display: flex; gap: 4px; padding: 12px 24px; background: #1a1510;
    border-bottom: 1px solid #2a2318;
    position: sticky; top: 70px; z-index: 90;
  }
  .tab {
    padding: 8px 18px; background: transparent; color: #a09080;
    border: 1px solid #3d3428; border-radius: 8px;
    font-size: 13px; cursor: pointer;
    text-transform: uppercase; letter-spacing: 1px; transition: all 0.2s;
  }
  .tab.active { background: #b5753a; border-color: #b5753a; color: #fff; font-weight: 600; }

  /* Stat cards */
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; padding: 20px 24px; }
  .stat {
    background: #2a2318; border: 1px solid #3d3428; border-radius: 10px;
    padding: 16px 18px;
  }
  .stat .label {
    font-size: 10px; color: #8a7a68; text-transform: uppercase; letter-spacing: 2px; font-weight: 600;
  }
  .stat .value {
    font-family: Georgia, serif; font-size: 32px; color: #e8c477;
    font-weight: 400; margin-top: 6px; line-height: 1;
  }
  .stat .sub { font-size: 11px; color: #8a7a68; margin-top: 4px; }

  /* Section heads */
  .section-head { padding: 18px 24px 8px; }
  .section-head h2 {
    font-family: Georgia, serif; font-size: 22px; color: #e8c477; font-weight: 400; font-style: italic;
  }
  .section-head .sub { font-size: 11px; color: #8a7a68; text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }

  /* Hourly heatmap (bar chart) */
  .hourly {
    margin: 0 24px; padding: 14px; background: #2a2318; border: 1px solid #3d3428; border-radius: 10px;
    display: grid; grid-template-columns: repeat(24, 1fr); gap: 3px; align-items: end; height: 180px;
  }
  .bar {
    position: relative; background: #3d3428; border-radius: 3px 3px 0 0;
    transition: background 0.2s; cursor: default;
  }
  .bar:hover { background: #b5753a; }
  .bar .tt {
    position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%);
    background: #1a1510; color: #f5f0e8; padding: 5px 9px; border-radius: 4px;
    border: 1px solid #4a3d2e; white-space: nowrap; font-size: 11px;
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
    margin-bottom: 6px; z-index: 5;
  }
  .bar:hover .tt { opacity: 1; }
  .hour-labels {
    display: grid; grid-template-columns: repeat(24, 1fr); gap: 3px;
    margin: 4px 24px 0; padding: 0 14px;
    font-size: 9px; color: #5a4a38; text-align: center;
  }

  /* Items table */
  .items-table {
    margin: 0 24px; background: #2a2318; border: 1px solid #3d3428; border-radius: 10px; overflow: hidden;
  }
  table { width: 100%; border-collapse: collapse; }
  th, td { padding: 11px 16px; text-align: left; font-size: 13px; }
  th {
    background: #1a1510; color: #c49a5c; font-size: 10px; text-transform: uppercase;
    letter-spacing: 1.5px; font-weight: 700; border-bottom: 1px solid #3d3428;
  }
  th.num, td.num { text-align: right; font-variant-numeric: tabular-nums; }
  tr { border-bottom: 1px solid #2a2318; }
  tr:last-child { border-bottom: none; }
  tr:hover { background: #322a1f; }
  td.qty { color: #e8c477; font-weight: 600; }
  td.rev { color: #4caf50; font-weight: 600; }

  /* Week bars */
  .week-bars {
    margin: 0 24px; padding: 18px; background: #2a2318; border: 1px solid #3d3428; border-radius: 10px;
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 12px; align-items: end; height: 200px;
  }
  .day {
    display: flex; flex-direction: column; align-items: center; height: 100%; justify-content: flex-end;
  }
  .day-val { font-size: 11px; color: #e8c477; margin-bottom: 4px; font-variant-numeric: tabular-nums; }
  .day-bar {
    width: 100%; background: linear-gradient(180deg, #b5753a 0%, #6b3f1e 100%);
    border-radius: 4px 4px 0 0; min-height: 4px; transition: background 0.2s;
  }
  .day:hover .day-bar { background: linear-gradient(180deg, #e8c477 0%, #b5753a 100%); }
  .day-label {
    font-size: 10px; color: #8a7a68; margin-top: 6px;
    text-transform: uppercase; letter-spacing: 1px; text-align: center;
  }

  .empty {
    padding: 40px; text-align: center; color: #5a4a38;
    font-family: Georgia, serif; font-style: italic; font-size: 16px;
  }
  .loading { padding: 40px; text-align: center; color: #8a7a68; font-size: 13px; }

  @media (max-width: 768px) {
    header { padding: 12px 16px; flex-wrap: wrap; gap: 8px; }
    .stats, .hourly, .items-table, .week-bars, .hour-labels { margin-left: 12px; margin-right: 12px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Crispy Eatery <span>Reports</span></div>
  <div class="header-actions">
    <a href="menu-admin.html" id="menuLink">Menu admin ↗</a>
    <a href="index-full-workflow.html" id="kitchenLink">Kitchen ↗</a>
    <a href="https://sparkling-lokum-4e28b8.netlify.app/" target="_blank" rel="noopener">Live menu ↗</a>
  </div>
</header>

<div class="tabs">
  <button class="tab active" id="tabToday" onclick="switchView('today')">Today</button>
  <button class="tab" id="tabWeek" onclick="switchView('week')">Last 7 days</button>
</div>

<div id="content"><div class="loading">Loading…</div></div>

<script>
(function() {
  var BACKEND = window.location.origin;
  var token = null;
  try {
    var url = new URL(window.location.href);
    var fromUrl = url.searchParams.get("token");
    if (fromUrl) {
      token = fromUrl;
      try { localStorage.setItem("staffToken", token); } catch (e) {}
      url.searchParams.delete("token");
      history.replaceState({}, "", url.pathname + (url.searchParams.toString() ? "?" + url.searchParams : ""));
    } else {
      try { token = localStorage.getItem("staffToken"); } catch (e) {}
    }
  } catch (e) {}
  if (!token) {
    document.body.innerHTML = '<div style="padding:40px;text-align:center;color:#e8c477;font-family:Georgia,serif;font-size:18px;font-style:italic;">No staff token. Open via the link from the kitchen dashboard.</div>';
    return;
  }
  // Preserve token in cross-page links
  ["menuLink", "kitchenLink"].forEach(function(id) {
    var el = document.getElementById(id);
    if (el && el.getAttribute("href")) el.href = el.getAttribute("href") + "?token=" + encodeURIComponent(token);
  });

  function fmt(n) { return "$" + Number(n).toFixed(2); }
  function fmtInt(n) { return Number(n).toLocaleString(); }
  function pad(h) { return String(h).padStart(2, "0"); }

  var view = "today";
  var data = { today: null, week: null };
  window.switchView = function(which) {
    view = which;
    document.getElementById("tabToday").classList.toggle("active", which === "today");
    document.getElementById("tabWeek").classList.toggle("active", which === "week");
    render();
  };

  function fetchReports() {
    Promise.all([
      fetch(BACKEND + "/reports/today", { headers: { Authorization: "Bearer " + token } }).then(function(r) { return r.json(); }),
      fetch(BACKEND + "/reports/week", { headers: { Authorization: "Bearer " + token } }).then(function(r) { return r.json(); }),
    ]).then(function(arr) {
      data.today = arr[0]; data.week = arr[1];
      render();
    }).catch(function(e) {
      document.getElementById("content").innerHTML = '<div class="empty">Couldn\'t load reports — check connection.</div>';
    });
  }

  function render() {
    var d = data[view];
    if (!d) { document.getElementById("content").innerHTML = '<div class="loading">Loading…</div>'; return; }
    var html = "";
    // Stats row
    if (view === "today") {
      html += '<div class="stats">' +
        statCard("Orders today", fmtInt(d.totalOrders), d.date) +
        statCard("Revenue", fmt(d.totalRevenue), d.totalOrders ? "since 00:00" : "no orders yet") +
        statCard("Avg order", fmt(d.avgOrder), "per ticket") +
        statCard("Tables served", fmtInt(d.tableCount), "unique") +
        '</div>';
    } else {
      html += '<div class="stats">' +
        statCard("Orders (7 days)", fmtInt(d.totalOrders), d.from + " → " + d.to) +
        statCard("Revenue", fmt(d.totalRevenue), "") +
        statCard("Avg order", fmt(d.avgOrder), "per ticket") +
        statCard("Daily avg revenue", fmt(d.totalRevenue / 7), "") +
        '</div>';
    }

    // Hourly heatmap (today) or weekly bars
    if (view === "today") {
      var max = Math.max.apply(null, d.hourly.map(function(h) { return h.revenue; }).concat([1]));
      html += '<div class="section-head"><h2>Hourly breakdown</h2><div class="sub">Bars scale to today\'s busiest hour</div></div>';
      html += '<div class="hourly">';
      for (var i = 0; i < 24; i++) {
        var h = d.hourly[i];
        var pct = max ? Math.max(2, Math.round((h.revenue / max) * 100)) : 2;
        html += '<div class="bar" style="height:' + pct + '%">' +
          '<div class="tt">' + pad(h.hour) + ':00 · ' + h.orders + ' orders · ' + fmt(h.revenue) + '</div>' +
          '</div>';
      }
      html += '</div>';
      html += '<div class="hour-labels">';
      for (var j = 0; j < 24; j++) {
        // Show every 3rd hour label to avoid clutter
        html += '<span>' + (j % 3 === 0 ? pad(j) : "") + '</span>';
      }
      html += '</div>';
    } else {
      var maxRev = Math.max.apply(null, d.days.map(function(x) { return x.revenue; }).concat([1]));
      html += '<div class="section-head"><h2>Last 7 days</h2><div class="sub">Daily revenue</div></div>';
      html += '<div class="week-bars">';
      d.days.forEach(function(day) {
        var pct = Math.max(2, Math.round((day.revenue / maxRev) * 100));
        html += '<div class="day">' +
          '<div class="day-val">' + (day.revenue > 0 ? fmt(day.revenue) : "—") + '</div>' +
          '<div class="day-bar" style="height:' + pct + '%" title="' + day.orders + ' orders"></div>' +
          '<div class="day-label">' + day.label + '<br>' + day.orders + ' ord</div>' +
          '</div>';
      });
      html += '</div>';
    }

    // Items table
    html += '<div class="section-head"><h2>Items sold</h2><div class="sub">Sorted by revenue</div></div>';
    if (!d.itemsSold.length) {
      html += '<div class="empty">No items sold ' + (view === "today" ? "today yet" : "this week") + '.</div>';
    } else {
      html += '<div class="items-table"><table>' +
        '<thead><tr><th>Item</th><th class="num">Qty</th><th class="num">Revenue</th></tr></thead><tbody>';
      d.itemsSold.forEach(function(it) {
        html += '<tr>' +
          '<td>' + escapeHtml(it.name) + '</td>' +
          '<td class="num qty">' + it.qty + '</td>' +
          '<td class="num rev">' + fmt(it.revenue) + '</td>' +
          '</tr>';
      });
      html += '</tbody></table></div>';
    }
    document.getElementById("content").innerHTML = html;
  }

  function statCard(label, value, sub) {
    return '<div class="stat">' +
      '<div class="label">' + label + '</div>' +
      '<div class="value">' + value + '</div>' +
      (sub ? '<div class="sub">' + escapeHtml(sub) + '</div>' : '') +
      '</div>';
  }
  function escapeHtml(s) {
    return String(s == null ? "" : s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }

  fetchReports();
  // Auto-refresh every 60s while the tab is visible
  setInterval(function() { if (document.visibilityState === "visible") fetchReports(); }, 60000);
})();
</script>

</body>
</html>
